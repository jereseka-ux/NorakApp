<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تطبيق نورك</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>✨ تطبيق نورك</h1>
  <p id="status">🔄 جاري التحميل...</p>

  <div class="card">
    <button onclick="login()">🔐 تسجيل الدخول عبر Pi</button>
    <button onclick="dailyReward()">🎁 مكافأة يومية</button>
    <button onclick="toggleMode()">🌙 تغيير الوضع</button>
  </div>

  <div class="card">
    <h2>💰 النقاط: <span id="points">0</span></h2>
  </div>

  <div class="card">
    <h2>📖 القرآن الكريم</h2>
    <button onclick="openQuran()">عرض القرآن</button>
  </div>

  <div class="card">
    <h2>💳 دعم التطبيق</h2>
    <button onclick="pay()">تبرع عبر Pi</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
