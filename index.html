<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norak App</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

    <div id="s-name"></div>
    <div id="s-content"></div>

    <script>
        // 1. تهيئة الـ SDK فور تحميل الصفحة لضمان التعرف على المتصفح
        const Pi = window.Pi;
        try {
            Pi.init({ version: "2.0", sandbox: false });
        } catch (err) {
            console.error("SDK initialization failed", err);
        }

        // 2. دالة استرجاع البيانات المحفوظة للمستخدم
        function loadM() {
            try {
                const saved = JSON.parse(localStorage.getItem('user_mark'));
                if (saved) {
                    const nameElem = document.getElementById('s-name');
                    const contentElem = document.getElementById('s-content');
                    
                    if (nameElem) nameElem.innerText = saved.n || "";
                    if (contentElem) contentElem.innerHTML = saved.c || "";
                    
                    window.scrollTo(0, 0);
                } else {
                    if (typeof toggleM === "function") toggleM();
                }
            } catch (e) {
                console.error("Error loading saved data", e);
            }
        }

        // 3. نظام الدفع الذكي المتوافق مع معايير Mainnet
        async function pay() {
            try {
                // تعريف الصلاحيات المطلوبة
                const scopes = ['payments'];
                
                // التعامل مع أي عمليات دفع سابقة لم تكتمل (شرط أساسي لـ Pi)
                const onIncompletePaymentFound = (payment) => {
                    console.log("Incomplete payment found:", payment.identifier);
                    // هنا يتم إرسال المعرف للسيرفر الخاص بك لإتمامها إذا لزم الأمر
                };

                // توثيق المستخدم داخل شبكة Pi
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                if (auth) {
                    // تنفيذ عملية الدفع الرسمية
                    Pi.createPayment({
                        amount: 0.1,
                        memo: "Support Norak App Development", // وصف رسمي وواضح
                        metadata: { 
                            orderId: "order_" + Date.now(),
                            app_name: "Norak"
                        }
                    }, {
                        onReadyForServerApproval: (paymentId) => {
                            // الموافقة من طرف التطبيق
                            return Pi.approvePayment(paymentId);
                        },
                        onReadyForServerCompletion: (paymentId, txid) => {
                            // إتمام العملية بعد تأكيد الشبكة
                            return Pi.completePayment(paymentId, txid);
                        },
                        onComplete: (paymentId) => {
                            alert("تمت عملية الدفع بنجاح. شكراً لدعمكم.");
                        },
                        onError: (error) => {
                            console.error("Payment Process Error:", error);
                            alert("عذراً، تعذر إتمام العملية حالياً.");
                        },
                        onCancel: (paymentId) => {
                            console.log("User cancelled payment:", paymentId);
                        }
                    });
                }
            } catch (e) {
                // رسالة ذكية تظهر فقط في حالة وجود خطأ حقيقي في البيئة
                console.error("Authentication failed", e);
                alert("يرجى التأكد من استخدام متصفح Pi الرسمي لإتمام هذه العملية.");
            }
        }

        // تشغيل الدالة الأساسية عند فتح التطبيق
        window.onload = loadM;
    </script>
</body>
</html>
