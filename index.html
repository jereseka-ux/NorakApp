<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - Norak Pro</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --text: #333; --primary: #673ab7; --accent: #ffc107; }
        .dark-mode { --bg: #1a1a1a; --card: #2d2d2d; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 80px; transition: 0.3s; text-align: center; }
        .header { background: linear-gradient(135deg, #673ab7, #9575cd); color: white; padding: 25px; border-radius: 0 0 25px 25px; }
        #mainSearch { width: 90%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 2px solid var(--primary); outline: none; }
        .pay-banner { background: var(--accent); margin: 15px; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; border: none; width: 90%; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { padding: 10px; display: grid; gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border-right: 8px solid var(--primary); }
        .read-btn { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 8px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .footer-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; }
        .nav-item { cursor: pointer; font-size: 0.9rem; opacity: 0.6; }
        .nav-item.active { color: var(--primary); opacity: 1; font-weight: bold; }
        /* ستايل عرض النص */
        .reader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .reader-content { text-align: justify; line-height: 2; font-size: 1.4rem; padding: 20px; }
        .close-btn { background: var(--primary); color: white; padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="reader" class="reader-overlay">
        <button class="close-btn" onclick="closeReader()">إغلاق العرض</button>
        <h2 id="reader-title"></h2>
        <div id="reader-body" class="reader-content">جاري التحميل...</div>
    </div>

    <div class="header"><h1>نُورك</h1><p>تطبيقك الروحاني المتكامل</p></div>
    
    <div class="search-area">
        <input type="text" id="mainSearch" onkeyup="search()" placeholder="ابحث عن سورة أو ذكر...">
    </div>

    <button class="pay-banner" onclick="startPay()">✨ تفعيل نسخة نُورك الكاملة (1 Pi)</button>

    <div id="content-area" class="container"></div>

    <div class="footer-nav">
        <div class="nav-item active" id="q-tab" onclick="showTab('quran')">📖 القرآن</div>
        <div class="nav-item" id="a-tab" onclick="showTab('azkar')">📿 الأذكار</div>
        <div class="nav-item" onclick="document.body.classList.toggle('dark-mode')">🌙 ليلي</div>
    </div>

<script>
    const surahs = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    window.onload = () => {
        try { Pi.init({ version: "2.0", sandbox: true }); } catch (e) {}
        showTab('quran');
    };

    function showTab(tab) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tab === 'quran' ? 'q-tab' : 'a-tab').classList.add('active');
        render(tab);
    }

    function render(tab) {
        const area = document.getElementById('content-area');
        let html = '';
        if(tab === 'quran') {
            surahs.forEach((s, i) => {
                html += `<div class="card"><h3>سورة ${s}</h3><p>قرآن كريم</p><button class="read-btn" onclick="fetchSurah(${i + 1}, '${s}')">قراءة السورة</button></div>`;
            });
        } else {
            html += `<div class="card"><h3>أذكار الصباح</h3><p>أذكار</p><button class="read-btn" onclick="showLocal('أذكار الصباح', 'أصبحنا وأصبح الملك لله...')">قراءة</button></div>`;
        }
        area.innerHTML = html;
    }

    // هنا "الذكاء" الحقيقي.. الربط مع المصحف كامل بضغطة واحدة
    async function fetchSurah(id, name) {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('reader-title').innerText = "سورة " + name;
        document.getElementById('reader-body').innerText = "جاري تحميل السورة من المصحف الشريف...";
        
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            const text = data.data.ayahs.map(a => a.text + ` (${a.numberInSurah}) `).join(' ');
            document.getElementById('reader-body').innerText = text;
        } catch (e) {
            document.getElementById('reader-body').innerText = "عفواً، تأكدي من الاتصال بالإنترنت لتحميل السورة.";
        }
    }

    function showLocal(title, text) {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('reader-title').innerText = title;
        document.getElementById('reader-body').innerText = text;
    }

    function closeReader() { document.getElementById('reader').style.display = 'none'; }

    async function startPay() {
        try {
            await Pi.createPayment({ amount: 1, memo: "تفعيل نسخة نورك الكاملة", metadata: { id: "norak_pro" } }, {
                onReadyForServerApproval: (id) => console.log(id),
                onReadyForServerCompletion: (id, tx) => alert("تم التفعيل بنجاح!"),
                onCancel: (id) => {}, onError: (e) => alert("افتحي من Pi Browser")
            });
        } catch (e) { alert("افتحي من Pi Browser"); }
    }

    function search() {
        let v = document.getElementById('mainSearch').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(v) ? 'block' : 'none');
    }
</script>
</body>
</html>
