<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - واحتك الإيمانية الذكية</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-grad: linear-gradient(135deg, #8e44ad, #6c5ce7); --bg-color: #f4f7f6; --card-bg: #ffffff; --text-main: #2d3436; --accent-color: #6c5ce7; }
        .dark-mode { --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #e0e0e0; --accent-color: #a29bfe; }
        * { box-sizing: border-box; transition: all 0.3s ease; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; padding-bottom: 90px; }
        header { background: var(--main-grad); color: white; padding: 45px 20px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 10px 20px rgba(108,92,231,0.2); }
        .search-bar { margin: -25px 25px 20px; background: var(--card-bg); border-radius: 15px; padding: 12px 20px; display: flex; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .search-bar input { border: none; width: 100%; background: transparent; color: var(--text-main); outline: none; font-size: 1rem; }
        .controls-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .control-btn { background: var(--card-bg); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { padding: 0 20px; }
        .sura-card, .zekr-item { background: var(--card-bg); margin-bottom: 12px; padding: 18px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .sura-num { background: var(--accent-color); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; }
        #reader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 2000; display: none; flex-direction: column; }
        .reader-header { padding: 15px 20px; background: var(--main-grad); color: white; display: flex; justify-content: space-between; align-items: center; }
        .reader-content { padding: 25px; overflow-y: auto; font-size: 1.6rem; line-height: 2.2; text-align: center; flex-grow: 1; white-space: pre-wrap; }
        nav { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; border-top: 1px solid rgba(0,0,0,0.05); }
        .nav-link { text-decoration: none; color: #b2bec3; text-align: center; font-size: 0.85rem; font-weight: 500; }
        .nav-link.active { color: var(--accent-color); font-weight: bold; }
        .upgrade-card { background: linear-gradient(45deg, #f1c40f, #f39c12); color: white; padding: 30px 20px; border-radius: 20px; text-align: center; margin-top: 10px; box-shadow: 0 8px 15px rgba(243,156,18,0.2); }
        .pay-btn { background: white; color: #d35400; border: none; padding: 12px 45px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        .hidden { display: none; }
    </style>
</head>
<body>
<header><h1>نورك</h1><p>واحتك الإيمانية الذكية</p></header>
<div class="search-bar"><input type="text" id="searchInput" placeholder="ابحث عن سورة أو ذكر..." onkeyup="filterContent()"></div>
<div class="controls-row">
    <button class="control-btn" onclick="toggleTheme()" title="تغيير الإضاءة">🌓</button>
    <button class="control-btn" onclick="goToBookmark()" title="العلامة المحفوظة">🔖</button>
    <button class="control-btn" onclick="shareApp()" title="مشاركة">📤</button>
</div>
<div class="container">
    <div id="quran-page" class="page"><h3>فهرس السور</h3><div id="surah-list"></div></div>
    <div id="azkar-page" class="page hidden">
        <h3>الأذكار والتحصين</h3>
        <div class="zekr-item" onclick="openZekr('morning')"><span>☀️ أذكار الصباح</span><span>⬅️</span></div>
        <div class="zekr-item" onclick="openZekr('evening')"><span>🌙 أذكار المساء</span><span>⬅️</span></div>
        <div class="zekr-item" onclick="openZekr('sleep')"><span>💤 أذكار النوم</span><span>⬅️</span></div>
    </div>
    <div id="upgrade-page" class="page hidden">
        <div class="upgrade-card"><h2>تفعيل ميزات Premium</h2><p>افتح البحث المتقدم ودعم التطبيق</p><button class="pay-btn" onclick="handlePiPayment()">دفع 1 Pi للتفعيل</button></div>
    </div>
</div>
<div id="reader-overlay">
    <div class="reader-header"><button onclick="closeReader()" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button><span id="reader-title"></span><button onclick="saveCurrentBookmark()" style="background:none; border:none; color:white;">حفظ 🔖</button></div>
    <div id="reader-body" class="reader-content"></div>
</div>
<nav>
    <a href="#" class="nav-link active" onclick="switchPage('quran', this)">📖<br>القرآن</a>
    <a href="#" class="nav-link" onclick="switchPage('azkar', this)">📿<br>الأذكار</a>
    <a href="#" class="nav-link" onclick="switchPage('upgrade', this)">✨<br>الترقية</a>
</nav>
<script>
    const surahs = ["الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس", "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه", "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم", "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر", "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق", "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة", "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج", "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس", "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد", "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات", "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر", "المسد", "الإخلاص", "الفلق", "الناس"];
    const azkar = {
        morning: "• أصبحنا وأصبح الملك لله والحمد لله.\n• اللهم بك أصبحنا وبك أمسينا وبك نحيا وبك نموت وإليك النشور.\n• رضيت بالله رباً وبالإسلام ديناً وبمحمد ﷺ نبياً.",
        evening: "• أمسينا وأمسى الملك لله والحمد لله.\n• اللهم بك أمسينا وبك أصبحنا وبك نحيا وبك نموت وإليك المصير.\n• بسم الله الذي لا يضر مع اسمه شيء في الأرض ولا في السماء.",
        sleep: "• باسمك ربي وضعت جنبي وبك أرفعه.\n• اللهم قني عذابك يوم تبعث عبادك.\n• آية الكرسي والمعوذات."
    };
    function renderSurahs() {
        const list = document.getElementById('surah-list');
        list.innerHTML = surahs.map((name, i) => `<div class="sura-card" onclick="openSura('${name}', ${i+1})"><div><span class="sura-num">${i+1}</span><span style="margin-right:12px; font-weight:500;">سورة ${name}</span></div><span>📖</span></div>`).join('');
    }
    function switchPage(p, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.add('hidden'));
        document.getElementById(p + '-page').classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        window.scrollTo(0, 0);
    }
    function openSura(name, id) {
        document.getElementById('reader-title').innerText = "سورة " + name;
        document.getElementById('reader-body').innerHTML = `<p style="color:var(--accent-color); font-weight:bold;">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</p><p>جاري تحميل النص... (التطبيق متوافق مع Pi Browser).</p>`;
        document.getElementById('reader-overlay').style.display = 'flex';
    }
    function openZekr(type) {
        const titles = {morning: 'أذكار الصباح', evening: 'أذكار المساء', sleep: 'أذكار النوم'};
        document.getElementById('reader-title').innerText = titles[type];
        document.getElementById('reader-body').innerText = azkar[type];
        document.getElementById('reader-overlay').style.display = 'flex';
    }
    function closeReader() { document.getElementById('reader-overlay').style.display = 'none'; }
    function filterContent() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.sura-card').forEach(card => card.style.display = card.innerText.toLowerCase().includes(input) ? "flex" : "none");
    }
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }
    function saveCurrentBookmark() { localStorage.setItem('quran_bookmark', document.getElementById('reader-title').innerText); alert('تم حفظ العلامة! 🔖'); }
    function goToBookmark() { let b = localStorage.getItem('quran_bookmark'); alert(b ? 'آخر علامة: ' + b : 'لا يوجد'); }
    function shareApp() { alert('رابطك: ' + window.location.href); }
    function handlePiPayment() { alert("جاري الاتصال بمحفظة Pi..."); }
    window.onload = () => { renderSurahs(); if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode'); };
</script>
</body>
</html>
