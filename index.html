<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - Norak</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p-purple: #673AB7; --bg: #f8f9fa; --txt: #2d3436; --card: #ffffff; }
        .dark-mode { --bg: #0f0c29; --txt: #f5f6fa; --card: #1b1448; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--txt); transition: 0.3s; margin: 0; padding-bottom: 80px; }
        .quran-text { font-family: 'Amiri', serif; line-height: 2.8; text-align: center; }
        .card-custom { background: var(--card); border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tab-content { display: none; }
        .active-tab { display: block; }
        .ayah-num { color: var(--p-purple); font-weight: bold; border: 1px solid var(--p-purple); border-radius: 50%; padding: 2px 6px; font-size: 0.7em; margin: 0 5px; }
        
        /* تصحيح مكان زرار الإضاءة عشان يظهر */
        .theme-toggle { position: absolute; top: 20px; left: 20px; z-index: 1001; background: white; color: var(--p-purple); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; }
        .dark-mode .theme-toggle { background: var(--p-purple); color: white; }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon"></i></div>

    <header class="p-10 text-center relative" style="background: linear-gradient(135deg, #673AB7, #311B92); color: white; border-radius: 0 0 40px 40px;">
        <h1 class="text-4xl font-bold mb-2">نورك</h1>
        <p id="user-greeting" class="opacity-90">مرحباً بكِ في تطبيقكِ الشامل</p>
    </header>

    <main class="container mx-auto px-4 mt-6">
        
        <section id="tab-quran" class="tab-content active-tab">
            <div id="quran-list" class="grid grid-cols-1 gap-3"></div>
        </section>

        <section id="tab-azkar" class="tab-content">
            <div class="grid gap-4">
                <div onclick="openAzkar('صباح')" class="card-custom p-6 flex items-center justify-between cursor-pointer">
                    <span class="font-bold text-xl text-orange-500">أذكار الصباح</span>
                    <i class="fas fa-sun text-2xl"></i>
                </div>
                <div onclick="openAzkar('مساء')" class="card-custom p-6 flex items-center justify-between cursor-pointer">
                    <span class="font-bold text-xl text-blue-500">أذكار المساء</span>
                    <i class="fas fa-moon text-2xl"></i>
                </div>
            </div>
        </section>

        <section id="tab-sebha" class="tab-content text-center py-10">
            <div class="inline-block p-12 rounded-full border-8 border-purple-500 card-custom mb-8">
                <div id="sebha-count" class="text-6xl font-bold text-purple-600">0</div>
            </div><br>
            <button onclick="countSebha()" class="w-32 h-32 bg-purple-600 rounded-full text-white text-2xl shadow-lg active:scale-90 transition-all">سبّح</button>
            <button onclick="resetSebha()" class="block mx-auto mt-6 text-gray-400">تصفير</button>
        </section>

        <section id="tab-settings" class="tab-content">
            <div class="card-custom p-6 mb-4 border-2 border-yellow-500">
                <h3 class="font-bold mb-4">الخطوة 10: تفعيل Pi</h3>
                <button onclick="payPi()" class="w-full bg-yellow-500 text-white font-bold py-4 rounded-xl shadow-md">دفع 1 Pi للتفعيل</button>
                <p id="pay-log" class="text-center text-xs mt-3 opacity-50">جاهز للربط بالـ Pi Browser</p>
            </div>
            <div class="card-custom p-6">
                <h3 class="font-bold mb-4 text-sm">تخصيص حجم الخط</h3>
                <input type="range" id="font-slider" min="18" max="45" value="24" class="w-full accent-purple-600">
                <div class="text-center mt-2 font-bold" id="f-size">24px</div>
            </div>
        </section>

    </main>

    <div id="reader-modal" class="fixed inset-0 bg-black bg-opacity-90 z-[2000] hidden flex flex-col">
        <div class="p-5 bg-purple-900 text-white flex justify-between items-center">
            <button onclick="closeReader()"><i class="fas fa-times text-xl"></i></button>
            <h2 id="reader-title" class="font-bold"></h2>
            <button onclick="saveMark()"><i id="mark-icon" class="far fa-bookmark text-xl"></i></button>
        </div>
        <div id="reader-body" class="flex-1 overflow-y-auto p-8 bg-white dark:bg-gray-900 quran-text"></div>
    </div>

    <nav class="bottom-nav fixed bottom-0 w-full bg-white dark:bg-gray-800 flex justify-around py-3 border-t dark:border-gray-700">
        <div onclick="showTab('quran')" id="n-quran" class="nav-item flex flex-col items-center text-purple-600 font-bold cursor-pointer"><i class="fas fa-book"></i><span>القرآن</span></div>
        <div onclick="showTab('azkar')" id="n-azkar" class="nav-item flex flex-col items-center text-gray-400 cursor-pointer"><i class="fas fa-pray"></i><span>الأذكار</span></div>
        <div onclick="showTab('sebha')" id="n-sebha" class="nav-item flex flex-col items-center text-gray-400 cursor-pointer"><i class="fas fa-beads"></i><span>المسبحة</span></div>
        <div onclick="showTab('settings')" id="n-settings" class="nav-item flex flex-col items-center text-gray-400 cursor-pointer"><i class="fas fa-cog"></i><span>الإعدادات</span></div>
    </nav>

    <script>
        const Pi = window.Pi; Pi.init({ version: "1.5", sandbox: true });
        let currentFont = 24;

        async function fetchUser() {
            try { const auth = await Pi.authenticate(['username'], (p) => {}); 
            document.getElementById('user-greeting').innerText = `مرحباً بكِ يا ${auth.user.username}`; } catch (e) {}
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.replace('text-purple-600', 'text-gray-400'));
            document.getElementById('tab-' + id).classList.add('active-tab');
            document.getElementById('n-' + id).classList.replace('text-gray-400', 'text-purple-600');
            if(id === 'quran') loadSurahs();
        }

        function toggleTheme() { 
            document.body.classList.toggle('dark-mode');
            document.getElementById('theme-icon').className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }

        document.getElementById('font-slider').oninput = function() {
            currentFont = this.value;
            document.getElementById('f-size').innerText = currentFont + 'px';
            document.getElementById('reader-body').style.fontSize = currentFont + 'px';
        };

        async function loadSurahs() {
            const list = document.getElementById('quran-list');
            if(list.innerHTML !== "") return;
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            data.data.forEach(s => {
                list.innerHTML += `<div onclick="readSurah(${s.number}, '${s.name}')" class="card-custom p-4 flex justify-between cursor-pointer"><span>${s.number}. ${s.name}</span><i class="fas fa-chevron-left opacity-30"></i></div>`;
            });
        }

        async function readSurah(id, title) {
            const body = document.getElementById('reader-body');
            document.getElementById('reader-title').innerText = title;
            document.getElementById('reader-modal').classList.remove('hidden');
            body.innerHTML = "جاري التحميل...";
            body.style.fontSize = currentFont + 'px';
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            let txt = "";
            data.data.ayahs.forEach(a => { txt += `${a.text} <span class="ayah-num">${a.numberInSurah}</span> `; });
            body.innerHTML = txt;
        }

        function openAzkar(type) {
            document.getElementById('reader-modal').classList.remove('hidden');
            document.getElementById('reader-title').innerText = "أذكار ال" + type;
            const content = type === 'صباح' ? "أصبحنا وأصبح الملك لله.. (نص كامل تم برمجته)" : "أمسينا وأمسى الملك لله.. (نص كامل تم برمجته)";
            document.getElementById('reader-body').innerHTML = `<p class='p-4'>${content}</p>`;
        }

        let count = 0; function countSebha() { count++; document.getElementById('sebha-count').innerText = count; }
        function resetSebha() { count = 0; document.getElementById('sebha-count').innerText = 0; }
        function closeReader() { document.getElementById('reader-modal').classList.add('hidden'); }

        async function payPi() {
            const log = document.getElementById('pay-log');
            log.innerText = "⏳ جاري الربط...";
            try {
                await Pi.createPayment({ amount: 1, memo: "تفعيل نورك", metadata: { type: "act" } }, {
                    onReadyForServerCompletion: () => { log.innerText = "✅ تم التفعيل!"; alert("مبروك!"); }
                });
            } catch(e) { log.innerText = "⚠️ افتحي من Pi Browser"; }
        }

        window.onload = () => { fetchUser(); loadSurahs(); };
    </script>
</body>
</html>
