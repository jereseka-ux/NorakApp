<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - Norak</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --pi-purple: #673AB7; 
            --pi-dark: #311B92; 
            --pi-accent: #FFC107;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2d3436;
        }
        .dark-mode {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #e9ecef;
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); color: var(--text-color); transition: 0.4s; }
        .quran-font { font-family: 'Amiri', serif; }
        .purple-gradient { background: linear-gradient(135deg, var(--pi-dark), var(--pi-purple)); }
        .nav-active { color: var(--pi-accent) !important; border-top: 3px solid var(--pi-accent); }
        .card { background: var(--card-bg); border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-content { display: none; animation: slideUp 0.4s ease-out; }
        .active-tab { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="pb-24">

    <header class="purple-gradient text-white p-6 rounded-b-[40px] shadow-2xl text-center relative">
        <button onclick="toggleTheme()" class="absolute right-6 top-6 text-xl opacity-80 hover:opacity-100">
            <i id="theme-icon" class="fas fa-moon"></i>
        </button>
        <h1 class="text-3xl font-bold mb-2">نورك</h1>
        <p class="text-sm opacity-90">تطبيقك الإسلامي المتكامل في شبكة Pi</p>
    </header>

    <main class="p-4 mt-4 container mx-auto max-w-lg">
        
        <section id="quran" class="tab-content active-tab">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-book-open text-purple-600"></i> القرآن الكريم (الأجزاء)</h2>
            <div id="quran-list" class="grid grid-cols-2 gap-3">
                </div>
        </section>

        <section id="azkar" class="tab-content">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-heart text-purple-600"></i> الأذكار والأدعية</h2>
            <div class="space-y-3">
                <div class="card p-5 cursor-pointer flex justify-between items-center hover:bg-purple-50 transition" onclick="openReader('أذكار الصباح', 'اللهم بك أصبحنا...')">
                    <span class="font-bold">أذكار الصباح</span> <i class="fas fa-sun text-yellow-500"></i>
                </div>
                <div class="card p-5 cursor-pointer flex justify-between items-center hover:bg-purple-50 transition" onclick="openReader('أذكار المساء', 'اللهم بك أمسينا...')">
                    <span class="font-bold">أذكار المساء</span> <i class="fas fa-moon text-blue-500"></i>
                </div>
                <div class="card p-5 cursor-pointer flex justify-between items-center hover:bg-purple-50 transition" onclick="openReader('أدعية من القرآن', 'رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً...')">
                    <span class="font-bold">أدعية قرآنية</span> <i class="fas fa-star text-purple-500"></i>
                </div>
            </div>
        </section>

        <section id="tasbih" class="tab-content">
            <div class="text-center py-10">
                <h2 class="text-2xl font-bold mb-6">المسبحة الإلكترونية</h2>
                <div id="counter" class="text-8xl font-bold mb-8 text-purple-600">0</div>
                <button onclick="incrementCounter()" class="w-48 h-48 rounded-full purple-gradient text-white text-3xl shadow-xl active:scale-90 transition mx-auto flex items-center justify-center border-8 border-white/20">
                    سبّح
                </button>
                <div class="mt-6 flex justify-center gap-4">
                    <button onclick="resetCounter()" class="px-6 py-2 bg-gray-400 text-white rounded-full text-sm">تصفير</button>
                </div>
            </div>
        </section>

        <section id="settings" class="tab-content">
            <h2 class="text-xl font-bold mb-4">الإعدادات والدعم</h2>
            <div class="card p-6 border-2 border-purple-200">
                <h3 class="font-bold text-lg mb-2 text-purple-700">دعم تطوير التطبيق</h3>
                <p class="text-sm opacity-70 mb-6">ساهم في استمرار "نورك" من خلال عملية دفع تجريبية (Testnet).</p>
                <button onclick="handlePiPayment()" class="w-full purple-gradient text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg">
                    <i class="fab fa-pi-network"></i> دعم بـ 1 Pi (تفعيل الخطوة 10)
                </button>
                <p id="payment-status" class="text-center text-xs mt-4 font-bold"></p>
            </div>
        </section>

    </main>

    <div id="modal" class="fixed inset-0 bg-black/80 z-[1000] hidden p-4 flex flex-col">
        <div class="flex justify-between items-center text-white mb-6">
            <h2 id="modal-title" class="text-xl font-bold"></h2>
            <button onclick="closeModal()" class="text-3xl">&times;</button>
        </div>
        <div class="bg-white rounded-3xl p-6 overflow-y-auto quran-font text-2xl text-center leading-loose text-gray-800" id="modal-content">
            جاري التحميل...
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-[#16213e] flex justify-around items-center p-3 border-t-2 border-purple-100 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('quran')" id="nav-quran" class="nav-active flex flex-col items-center gap-1 transition">
            <i class="fas fa-book-quran"></i><span class="text-[10px]">القرآن</span>
        </button>
        <button onclick="switchTab('azkar')" id="nav-azkar" class="flex flex-col items-center gap-1 opacity-50 transition">
            <i class="fas fa-pray"></i><span class="text-[10px]">الأذكار</span>
        </button>
        <button onclick="switchTab('tasbih')" id="nav-tasbih" class="flex flex-col items-center gap-1 opacity-50 transition">
            <i class="fas fa-beads"></i><span class="text-[10px]">المسبحة</span>
        </button>
        <button onclick="switchTab('settings')" id="nav-settings" class="flex flex-col items-center gap-1 opacity-50 transition">
            <i class="fas fa-cog"></i><span class="text-[10px]">الإعدادات</span>
        </button>
    </nav>

    <script>
        // 1. Pi SDK Setup
        const Pi = window.Pi;
        Pi.init({ version: "1.5", sandbox: true });

        async function handlePiPayment() {
            const status = document.getElementById('payment-status');
            status.innerText = "⏳ جاري الاتصال بشبكة Pi...";
            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "دعم تطبيق نورك - الخطوة 10",
                    metadata: { type: "support_donation" },
                }, {
                    onReadyForServerApproval: (id) => console.log("Payment ID:", id),
                    onReadyForServerCompletion: (id, txid) => {
                        status.className = "text-center text-xs mt-4 font-bold text-green-500";
                        status.innerText = "✅ تمت العملية بنجاح! راجعي الـ Checklist الآن.";
                        alert("تم تفعيل الخطوة 10 بنجاح!");
                    },
                    onCancel: () => { status.innerText = "❌ تم إلغاء العملية."; status.classList.add('text-red-500'); },
                    onError: (err) => { status.innerText = "⚠️ خطأ: " + err.message; status.classList.add('text-red-500'); }
                });
            } catch (e) { status.innerText = "يرجى فتح التطبيق من متصفح Pi Browser الرسمي."; }
        }

        // 2. Tab Navigation
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active-tab');
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('nav-active');
                b.classList.add('opacity-50');
            });
            document.getElementById('nav-' + tabId).classList.add('nav-active');
            document.getElementById('nav-' + tabId).classList.remove('opacity-50');
        }

        // 3. Quran Grid Loader
        function initQuran() {
            const grid = document.getElementById('quran-list');
            for(let i=1; i<=30; i++) {
                grid.innerHTML += `
                    <div class="card p-4 text-center cursor-pointer hover:border-purple-500 border-2 border-transparent transition" onclick="openReader('الجزء ${i}', 'هذا المحتوى مخصص للقراءة... سيتم ربطه بقاعدة البيانات الكاملة لاحقاً.')">
                        <span class="block text-xs opacity-50">الجزء</span>
                        <span class="text-xl font-bold text-purple-600">${i}</span>
                    </div>`;
            }
        }

        // 4. Utils
        let count = 0;
        function incrementCounter() { count++; document.getElementById('counter').innerText = count; }
        function resetCounter() { count = 0; document.getElementById('counter').innerText = 0; }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('theme-icon');
            icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }

        function openReader(title, content) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerText = content;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        window.onload = initQuran;
    </script>
</body>
</html>
