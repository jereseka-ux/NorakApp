<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - Norak App</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-p: #6c5ce7; --bg-soft: #f4f7fe; --card-w: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-soft); margin: 0; padding-bottom: 100px; }
        .ultra-card { background: var(--card-w); border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .tab-section { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .tab-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card-w); display: flex; justify-content: space-around; padding: 15px 0; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { color: #b2bec3; cursor: pointer; text-align: center; font-size: 12px; }
        .nav-item.active { color: var(--main-p); font-weight: bold; }
        .quran-v { font-family: 'Amiri', serif; line-height: 2.5; font-size: 22px; text-align: justify; }
        .ayah-num { color: var(--main-p); font-weight: bold; border: 1px solid; border-radius: 50%; padding: 2px 6px; font-size: 14px; margin: 0 5px; }
    </style>
</head>
<body>
    <header class="p-10 text-center" style="background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; border-radius: 0 0 50px 50px;">
        <h1 class="text-3xl font-black">نورك</h1>
        <p class="opacity-80">واحتك الإيمانية الذكية</p>
    </header>
    <main class="mt-6">
        <section id="sec-quran" class="tab-section tab-active">
            <h3 class="font-bold text-xl mb-4 px-4 text-purple-800">فهرس السور</h3>
            <div id="surah-list" class="grid gap-3 px-4"></div>
        </section>
        <section id="sec-azkar" class="tab-section">
            <h3 class="font-bold text-xl mb-4 px-4">أذكار المسلم</h3>
            <div class="grid gap-4 px-4">
                <div onclick="openAzkar('صباح')" class="ultra-card p-6 flex items-center gap-4 cursor-pointer">
                    <i class="fas fa-sun text-orange-400 text-2xl"></i>
                    <div><h4 class="font-bold">أذكار الصباح</h4><p class="text-xs opacity-50">نور لصباحك</p></div>
                </div>
                <div onclick="openAzkar('مساء')" class="ultra-card p-6 flex items-center gap-4 cursor-pointer">
                    <i class="fas fa-moon text-blue-400 text-2xl"></i>
                    <div><h4 class="font-bold">أذكار المساء</h4><p class="text-xs opacity-50">هدوء لليلك</p></div>
                </div>
            </div>
        </section>
        <section id="sec-sebha" class="tab-section text-center py-10">
            <div class="inline-block p-10 ultra-card rounded-full mb-6">
                <span id="s-val" class="text-6xl font-black text-purple-600">0</span>
            </div>
            <button onclick="countS()" class="block mx-auto w-28 h-28 bg-purple-600 rounded-full text-white text-3xl shadow-xl active:scale-90 transition">
                <i class="fas fa-plus"></i>
            </button>
            <button onclick="resetS()" class="mt-8 text-gray-400 text-sm underline">تصفير المسبحة</button>
        </section>
        <section id="sec-settings" class="tab-section">
            <div class="ultra-card p-6 mb-4">
                <h4 class="font-bold mb-4">تفعيل الخطوة 10</h4>
                <button onclick="payPi()" class="w-full bg-yellow-500 text-white py-4 rounded-2xl font-bold shadow-lg">دفع 1 Pi للتفعيل</button>
                <p id="pi-log" class="mt-2 text-[10px] text-center opacity-40 italic">Status: Ready</p>
            </div>
            <div class="ultra-card p-6">
                <h4 class="font-bold mb-4">حجم الخط: <span id="fz-val">22px</span></h4>
                <input type="range" id="fz-slider" min="18" max="45" value="22" class="w-full accent-purple-600">
            </div>
        </section>
    </main>
    <div id="reader" class="fixed inset-0 bg-white z-[2000] hidden flex flex-col">
        <div class="p-5 bg-purple-700 text-white flex justify-between items-center shadow-lg">
            <button onclick="closeReader()"><i class="fas fa-times"></i></button>
            <h2 id="r-title" class="font-bold text-lg"></h2>
            <div></div>
        </div>
        <div id="r-content" class="flex-1 overflow-y-auto p-8 quran-v bg-gray-50"></div>
    </div>
    <nav class="nav-bar">
        <div onclick="showTab('quran')" id="n-quran" class="nav-item active"><i class="fas fa-book-open text-xl"></i><br>القرآن</div>
        <div onclick="showTab('azkar')" id="n-azkar" class="nav-item"><i class="fas fa-pray text-xl"></i><br>الأذكار</div>
        <div onclick="showTab('sebha')" id="n-sebha" class="nav-item"><i class="fas fa-beads text-xl"></i><br>المسبحة</div>
        <div onclick="showTab('settings')" id="n-settings" class="nav-item"><i class="fas fa-cog text-xl"></i><br>الإعدادات</div>
    </nav>
    <script>
        const Pi = window.Pi; Pi.init({ version: "1.5", sandbox: true });
        let count = 0;
        function showTab(id) {
            document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('tab-active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('sec-'+id).classList.add('tab-active');
            document.getElementById('n-'+id).classList.add('active');
            if(id === 'quran') loadQuran();
        }
        async function loadQuran() {
            const list = document.getElementById('surah-list');
            if(list.innerHTML) return;
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            data.data.forEach(s => {
                list.innerHTML += `<div onclick="readS(${s.number}, '${s.name}')" class="ultra-card p-4 flex justify-between cursor-pointer border-r-4 border-purple-500">
                    <span>${s.number}. ${s.name}</span><i class="fas fa-chevron-left opacity-20"></i></div>`;
            });
        }
        async function readS(id, name) {
            const cont = document.getElementById('r-content');
            document.getElementById('r-title').innerText = name;
            document.getElementById('reader').classList.remove('hidden');
            cont.innerHTML = "جاري التحميل...";
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            let txt = "";
            data.data.ayahs.forEach(a => { txt += `${a.text} <span class="ayah-num">${a.numberInSurah}</span> `; });
            cont.innerHTML = txt;
        }
        function openAzkar(type) {
            document.getElementById('reader').classList.remove('hidden');
            document.getElementById('r-title').innerText = "أذكار " + (type === 'صباح' ? "الصباح" : "المساء");
            let db = {
                'صباح': 'أصبحنا وأصبح الملك لله، والحمد لله، لا إله إلا الله وحده لا شريك له.<br><br>اللهم أنت ربي لا إله إلا أنت، خلقتني وأنا عبدك، وأنا على عهدك ووعدك ما استطعت.',
                'مساء': 'أمسينا وأمسى الملك لله، والحمد لله، لا إله إلا الله وحده لا شريك له.<br><br>يا حي يا قيوم برحمتك أستغيث، أصلح لي شأني كله ولا تكلني إلى نفسي طرفة عين.'
            };
            document.getElementById('r-content').innerHTML = `<div class='text-center leading-loose py-10'>${db[type]}</div>`;
        }
        function countS() { count++; document.getElementById('s-val').innerText = count; }
        function resetS() { count = 0; document.getElementById('s-val').innerText = 0; }
        function closeReader() { document.getElementById('reader').classList.add('hidden'); }
        document.getElementById('fz-slider').oninput = function() {
            document.getElementById('fz-val').innerText = this.value + "px";
            document.getElementById('r-content').style.fontSize = this.value + "px";
        };
        async function payPi() {
            const log = document.getElementById('pi-log');
            log.innerText = "⏳ Connecting...";
            try {
                await Pi.createPayment({ amount: 1, memo: "Step 10 Activation", metadata: { step: "10" } }, {
                    onReadyForServerCompletion: () => { log.innerText = "✅ Success!"; alert("تم التفعيل!"); }
                });
            } catch(e) { log.innerText = "❌ Pi Browser Required"; alert("افتحي من Pi Browser"); }
        }
        window.onload = loadQuran;
    </script>
</body>
</html>
