<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - Norak</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p-purple: #673AB7; --bg: #f8f9fa; --txt: #2d3436; --card: #ffffff; }
        .dark-mode { --bg: #0f0c29; --txt: #f5f6fa; --card: #1b1448; }
        
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--txt); transition: 0.3s; margin: 0; padding-bottom: 80px; }
        .quran-text { font-family: 'Amiri', serif; line-height: 2.8; text-align: center; }
        .card-custom { background: var(--card); border-radius: 20px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tab-content { display: none; }
        .active-tab { display: block; }
        
        /* زرار الإضاءة اللي كان منسي */
        .theme-toggle { position: fixed; top: 25px; left: 20px; z-index: 1000; background: rgba(255,255,255,0.2); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); cursor: pointer; border: 1px solid rgba(255,255,255,0.3); }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(0,0,0,0.1); z-index: 500; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: #a1a1a1; cursor: pointer; }
        .nav-item.active { color: var(--p-purple); font-weight: bold; }
        
        /* زخرفة أرقام الآيات لمنع التداخل */
        .ayah-container { display: inline; position: relative; }
        .ayah-num { color: var(--p-purple); font-family: 'Tajawal'; font-size: 0.7em; margin: 0 8px; border: 1px solid var(--p-purple); border-radius: 50%; padding: 2px 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
    </div>

    <header class="p-8 pt-12 text-center" style="background: linear-gradient(135deg, #673AB7, #311B92); color: white; border-radius: 0 0 40px 40px;">
        <h1 class="text-4xl font-bold mb-2">نورك - Norak</h1>
        <p id="user-greeting" class="opacity-90 font-medium">مرحباً بكِ في تطبيقكِ الشامل</p>
    </header>

    <main class="container mx-auto px-4 mt-6">
        
        <section id="tab-quran" class="tab-content active-tab">
            <div class="flex bg-gray-200 dark:bg-gray-800 rounded-xl p-1 mb-6">
                <button onclick="switchView('surah')" id="btn-surah" class="flex-1 py-2 rounded-lg font-bold bg-white text-purple-700 shadow">السور</button>
                <button onclick="switchView('juz')" id="btn-juz" class="flex-1 py-2 rounded-lg font-bold text-gray-500">الأجزاء</button>
            </div>
            <div id="main-list" class="grid grid-cols-1 gap-3">
                </div>
        </section>

        <section id="tab-settings" class="tab-content">
            <div class="card-custom p-6 mb-4 border-2 border-yellow-400">
                <h3 class="font-bold mb-4 text-purple-800"><i class="fas fa-star"></i> الخطوة 10: التفعيل النهائي</h3>
                <button onclick="payPi()" class="w-full bg-yellow-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">
                    دفع 1 Pi للتفعيل
                </button>
                <p id="pay-log" class="text-center text-xs mt-3 text-gray-400 italic">بانتظار الربط مع المحفظة...</p>
            </div>

            <div class="card-custom p-6">
                <h3 class="font-bold mb-4"><i class="fas fa-sliders-h"></i> تخصيص القراءة</h3>
                <div class="flex justify-between text-sm mb-2">
                    <span>حجم الخط</span>
                    <span id="font-size-display" class="font-bold text-purple-600">24px</span>
                </div>
                <input type="range" id="font-slider" min="18" max="45" value="24" class="w-full accent-purple-600">
            </div>
        </section>

        <section id="tab-azkar" class="tab-content text-center py-20 opacity-50">قسم الأذكار قريباً...</section>
        <section id="tab-sebha" class="tab-content text-center py-20 opacity-50">المسبحة الإلكترونية قريباً...</section>

    </main>

    <div id="reader-modal" class="fixed inset-0 bg-black bg-opacity-90 z-[2000] hidden flex flex-col">
        <div class="flex justify-between items-center p-5 bg-purple-900 text-white">
            <button onclick="closeReader()" class="text-xl"><i class="fas fa-times"></i></button>
            <h2 id="reader-title" class="font-bold"></h2>
            <i class="fas fa-bookmark opacity-50"></i>
        </div>
        <div id="reader-body" class="flex-1 overflow-y-auto p-8 bg-white dark:bg-gray-900 quran-text transition-all">
            </div>
    </div>

    <nav class="bottom-nav shadow-2xl">
        <div onclick="showTab('quran')" id="nav-quran" class="nav-item active"><i class="fas fa-book-open text-xl mb-1"></i><span>القرآن</span></div>
        <div onclick="showTab('azkar')" id="nav-azkar" class="nav-item"><i class="fas fa-heart text-xl mb-1"></i><span>الأذكار</span></div>
        <div onclick="showTab('sebha')" id="nav-sebha" class="nav-item"><i class="fas fa-circle-notch text-xl mb-1"></i><span>المسبحة</span></div>
        <div onclick="showTab('settings')" id="nav-settings" class="nav-item"><i class="fas fa-cog text-xl mb-1"></i><span>الإعدادات</span></div>
    </nav>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "1.5", sandbox: true });

        let currentFont = 24;

        // جلب اسم المستخدم الحقيقي من باي
        async function fetchUser() {
            try {
                const auth = await Pi.authenticate(['username'], (p) => {});
                document.getElementById('user-greeting').innerText = `مرحباً بكِ يا ${auth.user.username} في تطبيقكِ الشامل`;
            } catch (e) { console.log("User not logged in"); }
        }

        // تبديل التابات
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active-tab');
            document.getElementById('nav-' + id).classList.add('active');
            if(id === 'quran') loadData('surah');
        }

        // نظام الإضاءة
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('theme-icon');
            icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }

        // تحكم حجم الخط
        document.getElementById('font-slider').oninput = function() {
            currentFont = this.value;
            document.getElementById('font-size-display').innerText = currentFont + 'px';
            document.getElementById('reader-body').style.fontSize = currentFont + 'px';
        };

        // جلب السور/الأجزاء ومنع تداخل النصوص
        async function loadData(mode) {
            const list = document.getElementById('main-list');
            list.innerHTML = '<p class="text-center p-10">جاري التحميل...</p>';
            const url = mode === 'surah' ? 'https://api.alquran.cloud/v1/surah' : 'https://api.alquran.cloud/v1/juz/30/quran-uthmani';
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                list.innerHTML = '';
                
                if(mode === 'surah') {
                    data.data.forEach(s => {
                        list.innerHTML += `
                        <div onclick="read('surah', ${s.number}, '${s.name}')" class="card-custom p-5 flex justify-between items-center cursor-pointer hover:border-purple-300 border border-transparent">
                            <div class="flex items-center gap-4">
                                <span class="text-purple-600 font-bold">${s.number}</span>
                                <h4 class="font-bold">${s.name}</h4>
                            </div>
                            <span class="text-xs text-gray-400">${s.numberOfAyahs} آية</span>
                        </div>`;
                    });
                }
            } catch(e) { list.innerHTML = 'خطأ في الاتصال.'; }
        }

        async function read(type, id, title) {
            const body = document.getElementById('reader-body');
            document.getElementById('reader-title').innerText = title;
            document.getElementById('reader-modal').classList.remove('hidden');
            body.innerHTML = 'جاري ترتيب الآيات...';
            body.style.fontSize = currentFont + 'px';

            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
                const data = await res.json();
                let text = "";
                data.data.ayahs.forEach(a => {
                    text += `${a.text} <span class="ayah-num">${a.numberInSurah}</span> `;
                });
                body.innerHTML = text;
            } catch(e) { body.innerHTML = 'عذراً، تعذر تحميل النص.'; }
        }

        function closeReader() { document.getElementById('reader-modal').classList.add('hidden'); }

        // تفعيل الدفع (الخطوة 10)
        async function payPi() {
            const log = document.getElementById('pay-log');
            log.innerText = "⏳ يرجى التأكيد في متصفح Pi...";
            try {
                await Pi.createPayment({
                    amount: 1,
                    memo: "تفعيل الخطوة 10 - تطبيق نورك",
                    metadata: { type: "activation" }
                }, {
                    onReadyForServerCompletion: (id) => { 
                        log.innerText = "✅ تم التفعيل بنجاح!";
                        alert("مبروك التفعيل!"); 
                    },
                    onCancel: () => { log.innerText = "❌ تم الإلغاء."; },
                    onError: (e) => { log.innerText = "⚠️ خطأ في الدفع."; }
                });
            } catch(e) { log.innerText = "⚠️ يجب فتح التطبيق من متصفح Pi."; }
        }

        window.onload = () => { fetchUser(); loadData('surah'); };
    </script>
</body>
</html>
