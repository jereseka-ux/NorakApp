<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>نُورك - Norak App</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p: #bb86fc; --bg: #0d0d0d; --c: #1a1a1a; --t: #f0f0f0; }
        body { background: var(--bg); color: var(--t); font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        .h { background: var(--c); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 9; }
        .user { font-size: 0.7rem; border: 1px solid var(--p); padding: 2px 8px; border-radius: 10px; }
        .main { padding: 15px; }
        .card { background: var(--c); padding: 18px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #333; }
        .q-view { line-height: 2.2; font-size: 1.3rem; text-align: justify; background: var(--c); padding: 15px; border-radius: 15px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--c); display: flex; padding: 10px 0; border-top: 1px solid #333; }
        .n-btn { flex: 1; border: none; background: none; color: #888; font-size: 0.8rem; cursor: pointer; }
        .n-btn.active { color: var(--p); font-weight: bold; }
        .n-btn i { display: block; font-size: 1.4rem; margin-bottom: 3px; }
        .sb { width: 180px; height: 180px; border-radius: 50%; border: 6px solid var(--p); margin: 30px auto; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; box-shadow: 0 0 15px var(--p); }
    </style>
</head>
<body>
    <div class="h">
        <div id="u" class="user">جاري التحقق...</div>
        <h3 style="margin:0">نُورك</h3>
        <i class="fas fa-moon" style="color:var(--p)"></i>
    </div>
    <div id="app" class="main"></div>
    <nav class="nav">
        <button class="n-btn active" onclick="sh('q')"><i class="fas fa-quran"></i>القرآن</button>
        <button class="n-btn" onclick="sh('a')"><i class="fas fa-hands-praying"></i>الأذكار</button>
        <button class="n-btn" onclick="sh('s')"><i class="fas fa-fingerprint"></i>المسبحة</button>
        <button class="n-btn" onclick="pay()" style="color:#ffcc00"><i class="fas fa-heart"></i>دعم</button>
    </nav>
<script>
    const Pi = window.Pi;
    let ct = parseInt(localStorage.getItem('nk_c')) || 0;
    async function init() {
        try {
            await Pi.init({ version: "2.0", sandbox: false });
            const a = await Pi.authenticate(['username', 'payments'], (p)=>{});
            document.getElementById('u').innerText = a.user.username;
        } catch(e) { document.getElementById('u').innerText = "زائر"; }
        sh('q');
    }
    function sh(p) {
        document.querySelectorAll('.n-btn').forEach((b,i)=>b.classList.toggle('active', ['q','a','s'].indexOf(p)===i));
        const v = document.getElementById('app');
        if(p==='q') {
            v.innerHTML = '<h4>أجزاء القرآن الكريم</h4>';
            for(let i=1; i<=30; i++) v.innerHTML += `<div class="card" onclick="getJ(${i})">الجزء ${i} <i class="fas fa-angle-left"></i></div>`;
        } else if(p==='a') {
            v.innerHTML = '<h4>الأذكار اليومية</h4><div class="card">أذكار الصباح</div><div class="card">أذكار المساء</div>';
        } else if(p==='s') {
            v.innerHTML = `<div style="text-align:center;"><div class="sb" onclick="tp()">${ct}</div><button onclick="rs()" style="color:var(--p); background:none; border:none; margin-top:10px;">إعادة تصفير</button></div>`;
        }
    }
    async function getJ(n) {
        const v = document.getElementById('app');
        v.innerHTML = '<p>جاري تحميل الآيات...</p>';
        try {
            const r = await fetch(`https://api.alquran.cloud/v1/juz/${n}/quran-uthmani`);
            const d = await r.json();
            let t = `<button class="card" onclick="sh('q')" style="width:100%">عودة للفهرس</button><div class="q-view">`;
            d.data.ayahs.forEach(a => { t += a.text + ` <span style="color:var(--p)">(${a.numberInSurah})</span> `; });
            v.innerHTML = t + '</div>';
            window.scrollTo(0,0);
        } catch(e) { v.innerHTML = 'حدث خطأ في الشبكة'; }
    }
    function tp() { ct++; document.querySelector('.sb').innerText = ct; localStorage.setItem('nk_c', ct); }
    function rs() { ct = 0; document.querySelector('.sb').innerText = 0; localStorage.setItem('nk_c', 0); }
    async function pay() {
        try {
            await Pi.createPayment({ amount: 0.1, memo: "دعم نُورك", metadata: {app: "norak"} }, 
            { onReadyForServerApproval: (id) => console.log(id), 
              onReadyForServerCompletion: (id, tx) => alert("تقبل الله منك!"),
              onCancel: (id) => {}, onError: (e) => alert(e.message)
            });
        } catch(e) { alert("افتح من Pi Browser"); }
    }
    window.onload = init;
</script>
</body>
</html>
