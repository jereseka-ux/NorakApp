<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - Norak</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #1a202c; color: white; }
        .quran-text { font-family: 'Amiri', serif; font-size: 1.5rem; line-height: 2.5rem; }
        .card { background: #2d3748; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-right: 5px solid #ecc94b; }
    </style>
</head>
<body>

    <header class="bg-gray-800 p-4 sticky top-0 z-50 shadow-lg text-center">
        <h1 class="text-3xl font-bold text-yellow-500 mb-2">نورك - Norak</h1>
        <p class="text-sm text-gray-400 mb-4">مرحباً بكِ يا ياسمين في تطبيقك الشامل</p>
        
        <button id="pay-btn" onclick="transferPi()" class="bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-2 px-6 rounded-full shadow-md transition duration-300">
            تفعيل الخطوة 10 (تجربة دفع 1 Pi)
        </button>
        <p id="status" class="text-xs mt-2 text-yellow-200"></p>
    </header>

    <main class="p-4 mb-20">
        <section id="quran-section">
            <h2 class="text-xl font-bold mb-4 text-yellow-400 border-b border-yellow-400 pb-2">القرآن الكريم كاملًا</h2>
            <div id="quran-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </section>

        <section id="azkar-section" class="mt-8">
            <h2 class="text-xl font-bold mb-4 text-yellow-400 border-b border-yellow-400 pb-2">الأذكار والأدعية</h2>
            <div class="card" onclick="alert('أذكار الصباح تفتح هنا')">أذكار الصباح</div>
            <div class="card" onclick="alert('أذكار المساء تفتح هنا')">أذكار المساء</div>
            <div class="card" onclick="alert('أدعية من الكتاب والسنة')">أدعية مختارة</div>
        </section>
    </main>

    <script>
        // 1. إعداد الـ Pi SDK
        const Pi = window.Pi;
        Pi.init({ version: "1.5", sandbox: true }); // Sandbox true للتجربة

        async function transferPi() {
            document.getElementById('status').innerText = "جاري الاتصال بالمحفظة...";
            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "تفعيل تطبيق نورك - الخطوة 10",
                    metadata: { app: "norak" },
                }, {
                    onReadyForServerApproval: (paymentId) => { console.log("Approved", paymentId); },
                    onReadyForServerCompletion: (paymentId, txid) => { 
                        document.getElementById('status').innerText = "تمت العملية بنجاح! مبروك الخطوة 10";
                        alert("مبروك! العملية تمت بنجاح، اذهبي الآن للـ Checklist");
                    },
                    onCancel: (paymentId) => { document.getElementById('status').innerText = "تم إلغاء العملية"; },
                    onError: (error, payment) => { document.getElementById('status').innerText = "خطأ: " + error.message; },
                });
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "تأكدي من فتح التطبيق داخل Pi Browser";
            }
        }

        // 2. تحميل القرآن (مثال للأجزاء)
        const quranContainer = document.getElementById('quran-container');
        for (let i = 1; i <= 30; i++) {
            const div = document.createElement('div');
            div.className = 'card cursor-pointer hover:bg-gray-700';
            div.innerHTML = `<h3 class="font-bold text-lg">الجزء ${i}</h3><p class="text-sm text-gray-400">اضغط للقراءة</p>`;
            quranContainer.appendChild(div);
        }
    </script>
</body>
</html>
