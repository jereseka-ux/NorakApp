<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - النسخة المعتمدة لشبكة باي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --main: #673ab7; --bg: #f8f9fa; --card: #ffffff; --text: #333; }
        .dark-mode { --bg: #121212; --card: #1e1e1e; --text: #f1f1f1; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 80px; text-align: center; }
        .header { background: linear-gradient(135deg, var(--main), #9575cd); color: white; padding: 25px; border-radius: 0 0 25px 25px; }
        .pay-banner { background: #ffc107; color: #000; margin: 20px auto; padding: 20px; border-radius: 15px; font-weight: bold; cursor: pointer; border: 3px solid #ffa000; width: 90%; display: block; font-size: 1.2rem; }
        .container { padding: 15px; display: grid; gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border-right: 8px solid var(--main); text-align: right; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .action-btn { background: var(--main); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .footer-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; }
        /* شاشة القراءة */
        .reader-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .reader-content { line-height: 2.5; font-size: 1.6rem; text-align: center; }
    </style>
</head>
<body>

    <div id="reader" class="reader-view">
        <button onclick="document.getElementById('reader').style.display='none'" style="float:left; padding:10px;">إغلاق</button>
        <h2 id="r-title"></h2>
        <div id="r-body" class="reader-content"></div>
    </div>

    <div class="header">
        <h1>نُورك</h1>
        <p>تطبيق إسلامي نفعي لشبكة باي</p>
    </div>

    <button class="pay-banner" onclick="onInAppPaymentRequested()">
        💳 تفعيل النسخة الكاملة (1 Pi) <br>
        <small>(لإتمام الخطوة 10 والمراجعة)</small>
    </button>

    <div id="content-area" class="container"></div>

    <div class="footer-nav">
        <div onclick="showTab('quran')">📖 القرآن</div>
        <div onclick="showTab('azkar')">📿 الأذكار</div>
        <div onclick="document.body.classList.toggle('dark-mode')">🌙 ليلي</div>
    </div>

<script>
    const surahNames = ["الفاتحة","البقرة","آل عمران","الناس"]; // عينة للتجربة

    window.onload = () => {
        try {
            // تفعيل الـ SDK بنسخة 2.0 المطلوبة للمراجعة
            Pi.init({ version: "2.0", sandbox: true });
            console.log("Pi SDK initialized");
        } catch (e) { console.error(e); }
        showTab('quran');
    };

    // دالة الربط الرسمية لشبكة باي (الخطوة 10)
    async function onInAppPaymentRequested() {
        try {
            const payment = await Pi.createPayment({
                amount: 1.0,
                memo: "دعم تطبيق نورك وتفعيل النسخة الكاملة",
                metadata: { orderId: "order_" + Date.now() },
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("Payment created, ID:", paymentId);
                    // هنا المراجع بيعرف إن الزرار شغال وبعت طلب للبلوكشين
                    alert("تم إنشاء طلب الدفع بنجاح. معرف الطلب: " + paymentId);
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    alert("تمت العملية بنجاح! شكراً لدعمك.");
                },
                onCancel: function(paymentId) { console.log("User cancelled"); },
                onError: function(error, payment) { 
                    console.error("Payment Error:", error);
                    alert("تنبيه: " + error.message);
                }
            });
        } catch (err) {
            alert("يرجى فتح التطبيق من داخل Pi Browser لتفعيل الربط بالبلوكشين.");
        }
    }

    function showTab(tab) {
        const area = document.getElementById('content-area');
        area.innerHTML = '';
        if(tab === 'quran') {
            surahNames.forEach((s, i) => {
                area.innerHTML += `<div class="card"><h3>${s}</h3><button class="action-btn" onclick="fetchSurah(${i+1}, '${s}')">قراءة</button></div>`;
            });
        } else {
            area.innerHTML = `<div class="card"><h3>أذكار الصباح</h3><button class="action-btn" onclick="alert('أصبحنا وأصبح الملك لله')">قراءة</button></div>`;
        }
    }

    async function fetchSurah(id, name) {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('r-title').innerText = "سورة " + name;
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}/ar.alafasy`);
            const data = await res.json();
            document.getElementById('r-body').innerText = data.data.ayahs.map(a => a.text).join(" ");
        } catch (e) { alert("تأكدي من الإنترنت"); }
    }
</script>
</body>
</html>
