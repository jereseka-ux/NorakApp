<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - Norak</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #bb86fc; --gold: #ffd700; }
        body.light { --bg: #f5f5f6; --card: #ffffff; --text: #1a1a1a; --accent: #6200ee; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; transition: 0.3s; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .user-card { background: var(--card); padding: 20px; border-radius: 20px; text-align: center; border-bottom: 4px solid var(--accent); margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .welcome-text { font-size: 1.3rem; font-weight: bold; color: var(--accent); }
        .btn-vip { background: linear-gradient(90deg, #bb86fc, #6200ee); color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(187, 134, 252, 0.3); }
        .tools { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .tool-box { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .count-num { font-size: 2.2rem; color: var(--gold); font-weight: bold; display: block; }
        .main-content { background: var(--card); border-radius: 20px; padding: 15px; min-height: 400px; }
        .surah-list-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .surah-list-item:hover { background: rgba(187, 134, 252, 0.1); border-radius: 10px; }
        .reading-view { display: none; padding: 10px; }
        .quran-text { line-height: 2.4; font-size: 24px; text-align: justify; direction: rtl; }
        .btn-sm { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: var(--text); cursor: pointer; font-size: 0.9rem; }
        .logo { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 10px; }
    </style>
</head>
<body id="mainBody">

<div class="container">
    <div class="user-card">
        <img src="logo.png" alt="Norak Logo" class="logo">
        <div id="userName" class="welcome-text">جاري الربط بشبكة Pi...</div>
        <small id="status" style="color:var(--gold)">نورك متصل بالشبكة ✅</small>
    </div>

    <button class="btn-vip" onclick="requestPayment()">دفع Pi 1 للتفعيل</button>

    <div class="tools">
        <div class="tool-box">
            <span id="tally" class="count-num">0</span>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <button class="btn-sm" onclick="addTasbih()">تسبيح</button>
                <button class="btn-sm" onclick="resetTasbih()">تصفير</button>
            </div>
        </div>
        <div class="tool-box">
            <div style="display:flex; flex-direction:column; gap:5px;">
                <button class="btn-sm" onclick="toggleDark()">تبديل المظهر 🌙</button>
                <button class="btn-sm" onclick="saveBookmark()">حفظ التطبيق 🔖</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 id="title">الفهرس الشريف</h3>
            <button id="backBtn" onclick="backToMenu()" style="display:none;" class="btn-sm">عودة للفهرس</button>
        </div>
        <hr style="opacity:0.1">
        <div id="surahContainer">جاري تحميل المصحف...</div>
        <div id="readingView" class="reading-view">
            <div id="quranContent" class="quran-text"></div>
        </div>
    </div>
</div>

<script>
    const Pi = window.Pi;
    let username = "ياسمين";

    // التعديل 2: تشغيل الـ SDK بشكل يضمن قبول Vercel والـ Pi Browser
    async function startApp() {
        try {
            Pi.init({ version: "2.0", sandbox: true }); 
            const auth = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
            username = auth.user.username;
            document.getElementById('userName').innerText = `مرحباً بكِ يا ${username}`;
        } catch (e) {
            document.getElementById('userName').innerText = "مرحباً بكِ في تطبيق نورك";
            console.error("Auth failed", e);
        }
        loadAllSurahs();
    }

    async function loadAllSurahs() {
        try {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const result = await res.json();
            let listHtml = '';
            result.data.forEach(s => {
                listHtml += `<div class="surah-list-item" onclick="openSurah(${s.number}, '${s.name}')">
                    <span><strong>${s.number}.</strong> ${s.name}</span>
                    <small style="color:var(--gold)">${s.numberOfAyahs} آية</small>
                </div>`;
            });
            document.getElementById('surahContainer').innerHTML = listHtml;
        } catch (err) { 
            document.getElementById('surahContainer').innerText = "خطأ في جلب البيانات"; 
        }
    }

    async function openSurah(id, name) {
        document.getElementById('surahContainer').style.display = 'none';
        document.getElementById('readingView').style.display = 'block';
        document.getElementById('backBtn').style.display = 'block';
        document.getElementById('title').innerText = name;
        document.getElementById('quranContent').innerText = "جاري تحميل الآيات...";
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            document.getElementById('quranContent').innerText = data.data.ayahs.map(a => `${a.text} ﴿${a.numberInSurah}﴾`).join(' ');
            window.scrollTo(0,0);
        } catch (e) { alert("خطأ في الاتصال بالمكتبة"); }
    }

    function backToMenu() {
        document.getElementById('surahContainer').style.display = 'block';
        document.getElementById('readingView').style.display = 'none';
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('title').innerText = "الفهرس الشريف";
    }

    function addTasbih() { let n = document.getElementById('tally'); n.innerText = parseInt(n.innerText) + 1; }
    function resetTasbih() { document.getElementById('tally').innerText = 0; }
    function toggleDark() { document.getElementById('mainBody').classList.toggle('light'); }
    function saveBookmark() { alert('تم حفظ مكانك الحالي بنجاح يا ياسمين ✨'); }

    // التعديل 3: دالة الدفع الاحترافية لفتح المحفظة فوراً
    async function requestPayment() {
        try {
            const payment = await Pi.createPayment({
                amount: 1.0,
                memo: "دعم تطبيق نورك لتطوير المحتوى",
                metadata: { orderId: "norak_" + Date.now() }
            }, {
                onReadyForServerApproval: (paymentId) => { console.log("Waiting Approval", paymentId); },
                onReadyForServerCompletion: (paymentId, txid) => { alert("تم الدفع بنجاح 🎉"); },
                onCancel: (paymentId) => { console.log("Cancelled"); },
                onError: (error) => { 
                    console.error(error);
                    alert("تأكدي من توثيق الدومين في Pi Developer Portal.");
                }
            });
        } catch (err) {
            console.error(err);
        }
    }

    function onIncompletePaymentFound(payment) { console.log("Pending", payment); }

    startApp();
</script>
</body>
</html>
