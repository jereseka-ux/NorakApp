<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - Norak</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #ffffff; --txt: #212121; --p: #4a148c; --accent: #ffa000; }
        [data-theme="dark"] { --bg: #121212; --txt: #e0e0e0; --p: #bb86fc; --accent: #ffb300; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 80px; }
        .header { display: flex; justify-content: space-between; padding: 15px; background: #eee; position: sticky; top: 0; z-index: 1000; }
        .main { padding: 25px; text-align: center; }
        #s-name { font-size: 24px; color: var(--p); font-weight: bold; border-bottom: 2px solid var(--p); }
        #s-content { font-size: 20px; line-height: 1.8; margin-top: 20px; text-align: justify; white-space: pre-wrap; }
        #lib { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; padding: 20px; overflow-y: auto; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #eee; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ccc; }
        .b { border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .pay { background: var(--accent); }
    </style>
</head>
<body data-theme="light">

    <div class="header">
        <button class="b" onclick="sh(true)">☰ الفهرس</button>
        <strong>نورك</strong>
        <button class="b" onclick="tk()">☀️/🌙</button>
    </div>

    <div id="lib">
        <button class="b" onclick="sh(false)" style="float:left">إغلاق ×</button>
        <h3>المكتبة الخارجية</h3>
        <div style="padding:15px; border-bottom:1px solid #ddd;" onclick="upd('سورة الفاتحة', 'بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ...')">سورة الفاتحة</div>
        <div style="padding:15px; border-bottom:1px solid #ddd;" onclick="upd('أذكار الصباح', 'أصبحنا وأصبح الملك لله...')">أذكار الصباح</div>
    </div>

    <div class="main">
        <div id="s-name">مرحباً بك</div>
        <div id="s-content">اختر من الفهرس للبدء..</div>
    </div>

    <div class="nav">
        <button class="b" onclick="sv()">📌 حفظ</button>
        <button class="b" onclick="ld()">🏠 العودة</button>
        <button class="b pay" id="pBtn">π تبرع</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        function sh(v) { document.getElementById('lib').style.display = v ? 'block' : 'none'; }

        function upd(n, c) {
            document.getElementById('s-name').innerText = n;
            document.getElementById('s-content').innerText = c;
            sh(false);
        }

        function sv() {
            const d = { n: document.getElementById('s-name').innerText, c: document.getElementById('s-content').innerText };
            localStorage.setItem('nrk_data', JSON.stringify(d));
            alert("تم الحفظ 📌");
        }

        function ld() {
            const s = JSON.parse(localStorage.getItem('nrk_data'));
            if(s) { document.getElementById('s-name').innerText = s.n; document.getElementById('s-content').innerText = s.c; }
        }

        function tk() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }

        // تم إصلاح زرار الدفع بربطه بـ ID مباشر لضمان الاستجابة
        document.getElementById('pBtn').onclick = async () => {
            try {
                const auth = await Pi.authenticate(['payments'], (p) => {});
                if (auth) {
                    await Pi.createPayment({
                        amount: 0.1,
                        memo: "Support Norak App Development",
                        metadata: { orderId: "n_" + Date.now() }
                    }, {
                        onReadyForServerApproval: (id) => Pi.approvePayment(id),
                        onReadyForServerCompletion: (id, tx) => Pi.completePayment(id, tx),
                        onComplete: (id) => alert("شكراً لدعمك!"),
                        onError: (err) => alert("خطأ في الدفع")
                    });
                }
            } catch (e) { alert("افتحي من Pi Browser"); }
        };

        window.onload = ld;
    </script>
</body>
</html>
