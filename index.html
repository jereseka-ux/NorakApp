<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نورك - Norak</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { --primary:#ecc94b; --bg:#1a202c; --card:#2d3748; --text:#fff;}
.light-mode { --primary:#d69e2e; --bg:#f7fafc; --card:#fff; --text:#2d3748;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);margin:0;padding-bottom:80px;}
.quran-font{font-family:'Amiri',serif;}
.nav-card{background:var(--card);border-radius:20px;padding:15px;text-align:center;cursor:pointer;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;justify-content:space-around;padding:15px;}
.tab-content{display:none;}
.active-content{display:block;}
</style>
</head>

<body>

<header style="padding:10px;display:flex;justify-content:space-between;">
<h2>نورك</h2>
<button onclick="toggleTheme()">🌙</button>
</header>

<main style="padding:15px;">

<button onclick="transferPi()">🔥 تفعيل التطبيق</button>
<p id="pi-status"></p>

<div id="quran-tab" class="tab-content active-content">
<h3>القرآن الكريم</h3>
<div id="quran-grid"></div>
</div>

<div id="azkar-tab" class="tab-content">
<h3>الأذكار</h3>
<button onclick="showZikr('صباح')">أذكار الصباح</button>
<button onclick="showZikr('مساء')">أذكار المساء</button>
</div>

<div id="tasbih-tab" class="tab-content">
<h3 id="counter">0</h3>
<button onclick="countUp()">سبّح</button>
</div>

</main>

<div id="reader-modal" style="display:none;">
<h3 id="modal-title"></h3>
<p id="modal-content"></p>
<button onclick="closeModal()">إغلاق</button>
</div>

<nav class="bottom-nav">
<button onclick="switchTab('quran')">قرآن</button>
<button onclick="switchTab('azkar')">أذكار</button>
<button onclick="switchTab('tasbih')">مسبحة</button>
</nav>

<script>

/* =========================
🔥 Pi Setup + Login
========================= */
const Pi = window.Pi;
Pi.init({ version:"1.5", sandbox:true });

let currentUser = null;

async function loginPi(){
try{
currentUser = await Pi.authenticate(['username','payments']);
console.log(currentUser);
}catch(e){
console.log(e);
}
}
loginPi();

/* =========================
🔥 Payment
========================= */
async function transferPi(){
const status=document.getElementById('pi-status');

if(!currentUser){
status.innerText="اعملي تسجيل دخول من Pi Browser";
return;
}

status.innerText="جاري الدفع...";

try{
await Pi.createPayment({
amount:1,
memo:"Norak App",
metadata:{user:currentUser.username}
},{
onReadyForServerApproval:(id)=>console.log("approve",id),
onReadyForServerCompletion:(id,txid)=>{
status.innerText="✅ تم الدفع بنجاح";
},
onCancel:()=>status.innerText="❌ تم الإلغاء",
onError:(err)=>status.innerText="⚠️ "+err.message
});
}catch(e){
status.innerText="افتحي من Pi Browser";
}
}

/* =========================
🔥 Quran API
========================= */
function loadQuran(){
const grid=document.getElementById('quran-grid');

for(let i=1;i<=30;i++){
grid.innerHTML+=`<div class="nav-card" onclick="readJuz(${i})">الجزء ${i}</div>`;
}
}

async function readJuz(n){
document.getElementById('modal-title').innerText="الجزء "+n;
document.getElementById('modal-content').innerText="جارِ التحميل...";
document.getElementById('reader-modal').style.display="block";

try{
const res=await fetch(`https://api.alquran.cloud/v1/juz/${n}/ar.alafasy`);
const data=await res.json();

let text="";
data.data.ayahs.forEach(a=>text+=a.text+" ");

document.getElementById('modal-content').innerText=text;
localStorage.setItem("lastJuz",n);

}catch(e){
document.getElementById('modal-content').innerText="خطأ في التحميل";
}
}

/* =========================
🔥 Azkar
========================= */
function showZikr(type){
let text="";

if(type==="صباح"){
text="اللهم بك أصبحنا وبك أمسينا...";
}else{
text="أمسينا وأمسى الملك لله...";
}

document.getElementById('modal-title').innerText="الأذكار";
document.getElementById('modal-content').innerText=text;
document.getElementById('reader-modal').style.display="block";
}

function closeModal(){
document.getElementById('reader-modal').style.display="none";
}

/* =========================
🔥 Tasbih
========================= */
let count=0;
function countUp(){
count++;
document.getElementById('counter').innerText=count;
}

/* =========================
🔥 UI
========================= */
function toggleTheme(){
document.body.classList.toggle('light-mode');
}

function switchTab(tab){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active-content'));
document.getElementById(tab+'-tab').classList.add('active-content');
}

window.onload=loadQuran;

</script>

</body>
</html>
