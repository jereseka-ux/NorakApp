<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - Nourk</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        img { width: 100%; max-width: 250px; border-radius: 10px; margin-bottom: 15px; }
        h1 { color: #673ab7; }
        p { font-size: 18px; line-height: 1.6; }
        .btn { background-color: #673ab7; color: white; border: none; padding: 15px 25px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background-color: #512da8; }
        #status { margin-top: 15px; color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <img src="IMG-20260327-WA0001.jpg" alt="Nourk Logo">
    
    <h1>مرحباً بك في Nourk</h1>
    <p>رحلتك نحو النور والمعرفة تبدأ من هنا.</p>

    <img src="IMG-20260327-WA0002.jpg" alt="Nourk App" style="max-width: 150px;">

    <div id="status">جاري الاتصال بشبكة باي...</div>

    <button class="btn" id="finalConnectBtn">تفعيل الربط النهائي</button>
    
    <button class="btn" style="background-color: #444;" onclick="testPayment()">تجربة دفع (Test Pi)</button>
</div>

<script>
    // تهيئة الـ SDK الخاص بباي
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true }); // sandbox للمراجعة والـ Test

    // فانكشن الربط النهائي
    document.getElementById('finalConnectBtn').onclick = function() {
        try {
            Pi.authenticate(['payments', 'username', 'wallet_address']).then(function(auth) {
                alert("تم إرسال إشارة الربط لشبكة باي بنجاح!\nمرحباً: " + auth.user.username);
                document.getElementById('status').innerText = "تم الربط بنجاح مع: " + auth.user.username;
            }).catch(function(error) {
                alert("حدث خطأ أثناء الربط، تأكد من فتح التطبيق داخل Pi Browser");
                console.error(error);
            });
        } catch (e) {
            alert("خطأ تقني: " + e.message);
        }
    };

    // فانكشن تجربة الدفع
    function testPayment() {
        alert("بدء تجربة دفع بقيمة 0.1 Pi...");
        // هنا يتم إضافة كود Pi.createPayment لاحقاً عند تفعيل المطورين
    }
</script>

</body>
</html>
