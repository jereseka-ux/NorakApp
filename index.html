<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق القرآن الكريم</title>

    <style>
        /* --- CSS --- */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #ecf0f1;
            --accent-color: #3498db;
            --font-color: #333;
            --bg-color: #fff;
        }

       .dark-mode {
            --primary-color: #ecf0f1;
            --secondary-color: #2c3e50;
            --font-color: #ecf0f1;
            --bg-color: #34495e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--secondary-color);
            color: var(--font-color);
            transition: background-color 0.3s, color 0.3s;
        }

        #app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            transition: margin-right 0.3s ease-in-out;
            background-color: var(--bg-color);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10;
        }

        header h1 {
            font-size: 1.2em;
        }

        header button {
            background: none;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }

        #reading-area {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 1.5em; /* Default font size */
            line-height: 2;
        }

        footer {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            border-top: 1px solid var(--secondary-color);
            background-color: var(--bg-color);
        }

        footer button {
            padding: 10px 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }

        #side-menu {
            width: 280px;
            background-color: var(--bg-color);
            border-left: 1px solid #bdc3c7;
            position: fixed;
            right: -280px;
            top: 0;
            height: 100%;
            transition: right 0.3s ease-in-out;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        #side-menu.open {
            right: 0;
        }

        #side-menu h3 {
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
        }

        #index-content {
            overflow-y: auto;
            flex-grow: 1;
        }
