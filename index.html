<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - Norak</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        :root { --bg-color: #f4f4f9; --text-color: #333; --card-bg: #ffffff; }
        .dark-mode { --bg-color: #1a1a2e; --text-color: #e0e0e0; --card-bg: #16213e; }
        
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; transition: 0.3s; }
        header { background: #6d28d9; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        
        .main-container { padding: 20px; text-align: center; }
        .logo-img { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; }
        
        /* تصميم الزراير اللي كانت ظاهرة في تطبيقك */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .nav-item { background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .nav-item:active { transform: scale(0.95); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 10px; }
        
        .btn-support { background: #fbbf24; color: #000; font-weight: bold; padding: 15px; border-radius: 12px; margin-top: 20px; border: none; width: 100%; cursor: pointer; }
        
        #user-info { font-size: 0.9em; background: rgba(0,0,0,0.1); padding: 5px 10px; border-radius: 20px; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body id="bodyTag">

    <header>
        <div onclick="toggleDarkMode()" style="cursor:pointer; font-size: 20px;">🌙</div>
        <div style="font-size: 22px; font-weight: bold;">نورك - Norak</div>
        <div style="cursor:pointer; font-size: 20px;">⚙️</div>
    </header>

    <div class="main-container">
        <img src="logo.png" class="logo-img" alt="Norak Logo" onerror="this.src='https://via.placeholder.com/100?text=NOURK'">
        
        <div id="user-status">جاري الاتصال بـ Pi...</div>
        
        <div class="nav-grid">
            <div class="nav-item" onclick="alert('قريباً: المصحف الكامل')">📖 <br> القرآن</div>
            <div class="nav-item" onclick="alert('قريباً: أذكار الصباح والمساء')">📿 <br> الأذكار</div>
            <div class="nav-item" onclick="alert('قريباً: أدعية مختارة')">🤲 <br> أدعية</div>
            <div class="nav-item" onclick="toggleDarkMode()">💡 <br> الإضاءة</div>
        </div>

        <button class="btn-support" onclick="startPayment()">دعم المشروع بـ 1 Pi</button>
    </div>

    <script>
        // 2. تفعيل الربط مع باي (السطر اللي هيخضر رقم 6)
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        // 3. كود تسجيل دخول المستخدم عشان يظهر اسمه
        async function login() {
            try {
                const scopes = ['username', 'payments'];
                const auth = await Pi.authenticate(scopes, (payment) => {});
                document.getElementById('user-status').innerHTML = `<span id="user-info">أهلاً بك: ${auth.user.username}</span>`;
            } catch (err) {
                document.getElementById('user-status').innerHTML = "يرجى الفتح من Pi Browser";
            }
        }
        login();

        // 4. كود الدفع الفعال
        async function startPayment() {
            try {
                await Pi.createPayment({
                    amount: 1,
                    memo: "دعم تطبيق نورك",
                    metadata: { order: "support_01" }
                }, {
                    onReadyForServerApproval: (id) => console.log("Approval:", id),
                    onReadyForServerCompletion: (id, tx) => alert("تم الدعم بنجاح! شكراً لك."),
                    onCancel: (id) => console.log("تم الإلغاء"),
                    onError: (err) => console.error("خطأ:", err)
                });
            } catch (err) {
                console.error(err);
            }
        }

        // 5. كود الإضاءة اللي طلبتيه
        function toggleDarkMode() {
            document.getElementById('bodyTag').classList.toggle('dark-mode');
        }
    </script>
</body>
</html>
