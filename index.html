<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Norak App</title>

  <!-- Theme & Manifest -->
  <meta name="theme-color" content="#22c55e">
  <link rel="manifest" href="manifest.json">

  <!-- CSS أساسي -->
  <style>
    body { font-family: Arial, sans-serif; background-color: #f3f4f6; color: #111827; margin: 0; padding: 0; }
    header { background-color: #22c55e; color: #fff; padding: 15px; text-align: center; font-size: 1.5rem; }
    main { padding: 10px; }
    button { padding: 10px 15px; margin: 5px; background-color: #22c55e; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background-color: #16a34a; }
  </style>
</head>
<body>

<header>Norak App</header>

<main>
  <h2>القرآن الكريم - 30 جزء</h2>
  <p>هنا محتوى التطبيق + المكتبة الخارجية + الأدعية والأذكار والبوكمارك.</p>

  <button onclick="toggleDarkMode()">تغيير الإضاءة</button>
  <button onclick="showBookmarks()">البوكمارك</button>
  <button onclick="initPayment()">ادفع الآن</button>
</main>

<script>
  // === الوضع الليلي / النهاري ===
  function toggleDarkMode() {
    document.body.style.backgroundColor =
      document.body.style.backgroundColor === 'black' ? '#f3f4f6' : 'black';
    document.body.style.color =
      document.body.style.color === 'white' ? '#111827' : 'white';
  }

  // === البوكمارك ===
  function showBookmarks() {
    alert('هذه البوكمارك الخاصة بك!');
  }

  // === ربط Pi Network الدفع ===
  function initPayment() {
    if(window.Pi) {
      window.Pi.requestPayment({
        amount: 0.1, // مثال
        memo: "دفع لمحتوى Norak App"
      }).then(tx => {
        alert("تم الدفع بنجاح! TxID: " + tx.transactionId);
      }).catch(err => {
        alert("فشل الدفع: " + err.message);
      });
    } else {
      alert("Pi Network غير متاح. افتح التطبيق من Pi Browser.");
    }
  }

  // === Service Worker PWA ===
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker مسجل: ', reg))
        .catch(err => console.log('فشل تسجيل SW: ', err));
    });
  }
</script>

</body>
</html>
