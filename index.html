<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تطبيق نُورك - Norak Official Pro</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --accent: #bb86fc; --text: #f0f0f0; --sub: #888; --gold: #ffcc00; }
        [data-theme="light"] { --bg: #ffffff; --card: #f5f5f5; --accent: #6200ee; --text: #121212; --sub: #555; --gold: #b8860b; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 80px; transition: 0.3s; overflow-x: hidden; }
        .header { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--accent); }
        .user-info { font-size: 0.8rem; color: var(--accent); border: 1px solid var(--accent); padding: 4px 12px; border-radius: 20px; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); margin-bottom: 12px; padding: 20px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s; }
        .card:active { transform: translateY(2px); opacity: 0.8; }
        .quran-container { background: var(--card); padding: 20px; border-radius: 15px; line-height: 2.5; font-size: 1.5rem; text-align: justify; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { flex: 1; text-align: center; color: var(--sub); cursor: pointer; font-size: 0.8rem; border: none; background: none; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .nav-item i { display: block; font-size: 1.5rem; margin-bottom: 4px; }
        .sebha-btn { width: 200px; height: 200px; border-radius: 50%; border: 8px solid var(--accent); margin: 40px auto; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; background: none; color: var(--text); cursor: pointer; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body data-theme="dark">

<div class="header">
    <div class="user-info" id="pi_user">جاري التحميل...</div>
    <h3 style="margin:0;">نُورك</h3>
    <i class="fas fa-adjust" onclick="toggleTheme()" style="cursor:pointer; font-size: 1.3rem;"></i>
</div>

<div class="container" id="main_content"></div>

<nav class="nav-bar">
    <button class="nav-item" onclick="showQuran()"><i class="fas fa-quran"></i>القرآن</button>
    <button class="nav-item" onclick="showAzkar()"><i class="fas fa-pray"></i>الأذكار</button>
    <button class="nav-item" onclick="showSebha()"><i class="fas fa-bead-tree"></i>المسبحة</button>
    <button class="nav-item" onclick="startPayment()" style="color:var(--gold)"><i class="fas fa-star"></i>دعم</button>
</nav>

<script>
    const Pi = window.Pi;
    let count = parseInt(localStorage.getItem('norak_sebha')) || 0;

    async function initPi() {
        try {
            await Pi.init({ version: "2.0", sandbox: false });
            const auth = await Pi.authenticate(['username', 'payments'], (p) => {});
            document.getElementById('pi_user').innerText = auth.user.username;
        } catch (e) { document.getElementById('pi_user').innerText = "زائر"; }
        showQuran();
    }

    // نظام القرآن الكريم - الربط بـ API لضمان الـ 30 جزء كاملين
    function showQuran() {
        updateNav(0);
        let html = '<h4 style="color:var(--accent)">أجزاء القرآن الكريم</h4>';
        for(let i=1; i<=30; i++) {
            html += `<div class="card" onclick="loadJuz(${i})"><span>الجزء ${i}</span><i class="fas fa-angle-left"></i></div>`;
        }
        document.getElementById('main_content').innerHTML = html;
    }

    async function loadJuz(num) {
        const content = document.getElementById('main_content');
        content.innerHTML = '<p>جاري تحميل كلام الله...</p>';
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/juz/${num}/quran-uthmani`);
            const data = await res.json();
            let text = `<button class="btn-action" onclick="showQuran()">عودة للفهرس</button><div class="quran-container">`;
            data.data.ayahs.forEach(ayah => {
                text += ayah.text + ` <span style="color:var(--accent); font-size:1rem;">(${ayah.numberInSurah})</span> `;
            });
            content.innerHTML = text + '</div>';
            window.scrollTo(0,0);
        } catch(e) { content.innerHTML = '<p>تأكد من الاتصال بالإنترنت</p>'; }
    }

    // نظام الأذكار
    const azkar = {
        "أذكار الصباح": ["أصبحنا وأصبح الملك لله والحمد لله", "اللهم بك أصبحنا وبك أمسينا", "يا حي يا قيوم برحمتك أستغيث"],
        "أذكار المساء": ["أمسينا وأمسى الملك لله والحمد لله", "اللهم بك أمسينا وبك أصبحنا", "أعوذ بكلمات الله التامات من شر ما خلق"],
        "أدعية عامة": ["ربنا آتنا في الدنيا حسنة", "اللهم إنك عفو تحب العفو فاعف عني", "يا مقلب القلوب ثبت قلبي على دينك"]
    };

    function showAzkar() {
        updateNav(1);
        let html = '<h4 style="color:var(--accent)">الأذكار والأدعية</h4>';
        Object.keys(azkar).forEach(cat => {
            html += `<div class="card" onclick="viewList('${cat}')"><span>${cat}</span><i class="fas fa-book-open"></i></div>`;
        });
        document.getElementById('main_content').innerHTML = html;
    }

    function viewList(cat) {
        let html = `<button class="btn-action" onclick="showAzkar()">عودة</button><h3>${cat}</h3>`;
        azkar[cat].forEach(item => { html += `<div class="card" style="display:block; text-align:center;">${item}</div>`; });
        document.getElementById('main_content').innerHTML = html;
    }

    // المسبحة
    function showSebha() {
        updateNav(2);
        document.getElementById('main_content').innerHTML = `
            <div style="text-align:center;">
                <button class="sebha-btn" onclick="tapSebha()">${count}</button>
                <br><button class="btn-action" onclick="resetSebha()">تصفير</button>
            </div>`;
    }

    function tapSebha() { count++; document.querySelector('.sebha-btn').innerText = count; localStorage.setItem('norak_sebha', count); }
    function resetSebha() { count = 0; document.querySelector('.sebha-btn').innerText = count; localStorage.setItem('norak_sebha', 0); }

    // الـ Utility: نظام الدفع في شبكة باي
    async function startPayment() {
        try {
            const payment = await Pi.createPayment({
                amount: 0.1,
                memo: "دعم تطبيق نُورك ❤️",
                metadata: { appId: "norak-app" }
            }, {
                onReadyForServerApproval: (id) => { console.log("Approved:", id); },
                onReadyForServerCompletion: (id, tx) => { alert("تم الدعم، جزاك الله خيراً!"); },
                onCancel: (id) => {},
                onError: (error) => { alert("خطأ: " + error.message); }
            });
        } catch(e) { alert("افتح التطبيق من داخل Pi Browser"); }
    }

    function updateNav(idx) {
        const items = document.querySelectorAll('.nav-item');
        items.forEach(el => el.classList.remove('active'));
        items[idx].classList.add('active');
    }

    function toggleTheme() {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    window.onload = initPi;
</script>
</body>
</html>
