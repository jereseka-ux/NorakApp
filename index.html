<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق نورك - Norak</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
:root { --bg:#121212; --card:#1e1e1e; --text:#fff; --accent:#4CAF50; }
body{margin:0;font-family:sans-serif;background:var(--bg);color:var(--text)}
header{padding:15px;text-align:center;font-size:20px;background:#000}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:var(--accent);color:#fff}
.hidden{display:none}
#surahList .row{padding:10px;border-bottom:1px solid #333;cursor:pointer}
#ayatBox{padding:15px;line-height:2}
</style>
</head>

<body>

<header>📖 تطبيق نورك</header>

<div style="text-align:center">
<button onclick="loadSurahs()">📚 عرض السور</button>
<button onclick="pay()">💰 تفعيل VIP</button>
<p id="status"></p>
</div>

<div id="surahList"></div>
<div id="ayatBox" class="hidden"></div>

<script>

// ================= تحميل السور =================
async function loadSurahs(){
 let res=await fetch('https://api.alquran.cloud/v1/surah');
 let data=await res.json();
 let html="";
 data.data.forEach(s=>{
 html+=`<div class="row" onclick="loadAyat(${s.number})">
 ${s.number} - ${s.name}
 </div>`;
 });
 document.getElementById("surahList").innerHTML=html;
}

// ================= تحميل الآيات =================
async function loadAyat(id){
 let res=await fetch(`https://api.alquran.cloud/v1/surah/${id}/ar.alafasy`);
 let data=await res.json();
 let html="<div>";
 data.data.ayahs.forEach(a=>{
 html+=a.text+" ";
 });
 html+="</div>";
 let box=document.getElementById("ayatBox");
 box.innerHTML=html;
 box.classList.remove("hidden");
}

// ================= Pi Payment =================
const Pi = window.Pi;
Pi.init({version:"2.0", sandbox:true});

async function pay(){
 let st=document.getElementById("status");

 try{
 let auth=await Pi.authenticate(['payments','username']);
 let user=auth.user.username;

 await Pi.createPayment({
 amount:0.5,
 memo:"VIP",
 metadata:{user:user}
 },{
 onReadyForServerApproval: async (pid)=>{
 await fetch('/api/approve',{
 method:'POST',
 body:JSON.stringify({paymentId:pid})
 });
 },
 onReadyForServerCompletion: async (pid,tx)=>{
 await fetch('/api/complete',{
 method:'POST',
 body:JSON.stringify({paymentId:pid,txid:tx})
 });
 unlockVIP();
 },
 onCancel:()=>st.innerText="تم الإلغاء",
 onError:()=>st.innerText="خطأ"
 });

 }catch(error){
 st.innerText="حصل خطأ";
 console.error(error);
 }
}

// ================= فتح VIP =================
function unlockVIP(){
 document.body.style.background="#003300";
 document.getElementById("status").innerText="تم تفعيل VIP ✅";
}

</script>

</body>
</html>
