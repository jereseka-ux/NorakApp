<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - Norak</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-purple: #673AB7;
            --deep-purple: #311B92;
            --accent-gold: #FFC107;
            --soft-bg: #f8f9fa;
            --card-white: #ffffff;
            --text-main: #2d3436;
        }

        .dark-mode {
            --soft-bg: #0f0c29;
            --card-white: #1a1a2e;
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--soft-bg);
            color: var(--text-main);
            transition: all 0.3s ease;
            margin: 0;
            padding-bottom: 90px;
        }

        .quran-text { font-family: 'Amiri', serif; line-height: 2.2; }
        .glass-effect { background: rgba(103, 58, 183, 0.9); backdrop-filter: blur(10px); }
        .purple-gradient { background: linear-gradient(135deg, var(--deep-purple), var(--primary-purple)); }
        
        /* تصميم الكروت الاحترافي */
        .app-card {
            background: var(--card-white);
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(103, 58, 183, 0.1);
            transition: transform 0.2s;
        }
        .app-card:active { transform: scale(0.98); }

        /* تفعيل التابات */
        .tab-content { display: none; animation: fadeIn 0.5s ease-in-out; }
        .active-content { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* الناف بار السفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card-white);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid rgba(103, 58, 183, 0.2);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            z-index: 1000;
        }
        .nav-item { color: #b2bec3; text-align: center; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--primary-purple); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }

        /* زرار الدعم الاحترافي */
        .support-btn {
            background: var(--accent-gold);
            color: #000;
            font-weight: bold;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
        }
    </style>
</head>
<body>

    <header class="purple-gradient text-white p-6 rounded-b-[40px] shadow-xl relative overflow-hidden">
        <div class="flex justify-between items-center relative z-10">
            <div>
                <h1 class="text-3xl font-bold">نورك</h1>
                <p class="text-xs opacity-80" id="user-welcome">مرحباً بكِ في تطبيقكِ المتكامل</p>
            </div>
            <div class="flex gap-4">
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
                    <i id="theme-icon" class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="p-4 mt-2 container mx-auto max-w-lg">
        
        <section id="tab-quran" class="tab-content active-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">المصحف الشريف</h2>
                <span class="text-xs bg-purple-100 text-purple-700 px-3 py-1 rounded-full">30 جزء</span>
            </div>
            <div id="quran-grid" class="grid grid-cols-2 gap-4">
                </div>
        </section>

        <section id="tab-azkar" class="tab-content">
            <h2 class="text-xl font-bold mb-4 text-purple-800">حصن المسلم</h2>
            <div class="space-y-4">
                <div class="app-card p-5 flex items-center gap-4 cursor-pointer" onclick="loadZikr('morning')">
                    <div class="w-12 h-12 rounded-xl bg-orange-100 flex items-center justify-center text-orange-500 text-xl">
                        <i class="fas fa-sun"></i>
                    </div>
                    <div>
                        <h3 class="font-bold">أذكار الصباح</h3>
                        <p class="text-xs opacity-60">نور لنهارك</p>
                    </div>
                </div>
                <div class="app-card p-5 flex items-center gap-4 cursor-pointer" onclick="loadZikr('evening')">
                    <div class="w-12 h-12 rounded-xl bg-indigo-100 flex items-center justify-center text-indigo-600 text-xl">
                        <i class="fas fa-moon"></i>
                    </div>
                    <div>
                        <h3 class="font-bold">أذكار المساء</h3>
                        <p class="text-xs opacity-60">طمأنينة لليلك</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-tasbih" class="tab-content">
            <div class="text-center py-12">
                <div class="relative inline-block">
                    <svg class="w-64 h-64">
                        <circle cx="128" cy="128" r="120" stroke="currentColor" stroke-width="8" fill="transparent" class="text-purple-100" />
                        <circle id="progress" cx="128" cy="128" r="120" stroke="currentColor" stroke-width="8" fill="transparent" class="text-purple-600" stroke-dasharray="753" stroke-dashoffset="753" stroke-linecap="round" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="counter" class="text-6xl font-bold text-purple-700">0</span>
                        <span class="text-sm opacity-50 mt-2">استغفر الله</span>
                    </div>
                </div>
                <div class="mt-10 flex justify-center gap-6">
                    <button onclick="count()" class="w-24 h-24 purple-gradient rounded-full text-white shadow-2xl active:scale-90 transition">
                        <i class="fas fa-plus text-2xl"></i>
                    </button>
                    <button onclick="resetCount()" class="w-24 h-24 bg-white border-2 border-purple-200 rounded-full text-purple-600 active:scale-90 transition">
                        <i class="fas fa-undo"></i>
                    </button>
                </div>
            </div>
        </section>

        <section id="tab-settings" class="tab-content">
            <h2 class="text-xl font-bold mb-4">الإعدادات</h2>
            <div class="app-card p-6 mb-6">
                <h3 class="font-bold text-purple-800 mb-2">دعم استمرارية التطبيق</h3>
                <p class="text-sm opacity-70 mb-5">ساهم في تطوير "نورك" وتفعيل المزايا المتقدمة عبر شبكة Pi.</p>
                <button onclick="payPi()" class="support-btn w-full flex items-center justify-center gap-3">
                    <i class="fab fa-pi-network text-xl"></i>
                    دعم بـ 1 Pi (تفعيل نهائي)
                </button>
                <div id="payment-log" class="mt-4 text-center text-xs font-bold"></div>
            </div>
            
            <div class="app-card p-4 space-y-4">
                <div class="flex justify-between items-center">
                    <span>حجم الخط</span>
                    <input type="range" class="accent-purple-600" min="16" max="32" onchange="changeFontSize(this.value)">
                </div>
                <hr>
                <p class="text-[10px] opacity-40 text-center">الإصدار 1.0.0 - مطور بواسطة ياسمين</p>
            </div>
        </section>

    </main>

    <div id="reader-modal" class="fixed inset-0 bg-black/50 z-[2000] hidden flex items-end">
        <div class="bg-white w-full h-[85vh] rounded-t-[40px] p-6 overflow-hidden flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-xl font-bold text-purple-900"></h3>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modal-body" class="overflow-y-auto quran-text text-center text-xl pb-10">
                </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button onclick="openTab('quran')" id="btn-quran" class="nav-item active"><i class="fas fa-quran"></i>القرآن</button>
        <button onclick="openTab('azkar')" id="btn-azkar" class="nav-item"><i class="fas fa-pray"></i>الأذكار</button>
        <button onclick="openTab('tasbih')" id="btn-tasbih" class="nav-item"><i class="fas fa-beads"></i>المسبحة</button>
        <button onclick="openTab('settings')" id="btn-settings" class="nav-item"><i class="fas fa-cog"></i>الإعدادات</button>
    </nav>

    <script>
        // --- 1. Pi SDK Logic ---
        const Pi = window.Pi;
        Pi.init({ version: "1.5", sandbox: true });

        async function payPi() {
            const log = document.getElementById('payment-log');
            log.innerText = "⏳ جاري تحضير العملية...";
            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "دعم تطبيق نورك وتفعيله - الخطوة 10",
                    metadata: { developer: "Yasmine" },
                }, {
                    onReadyForServerApproval: (id) => console.log("Approved ID:", id),
                    onReadyForServerCompletion: (id, txid) => {
                        log.innerHTML = "<span class='text-green-600'>✅ تم التفعيل بنجاح! راجعي صفحة الخطوات الآن.</span>";
                        alert("مبروك! تمت العملية بنجاح.");
                    },
                    onCancel: () => log.innerText = "❌ تم إلغاء العملية.",
                    onError: (e) => log.innerText = "⚠️ خطأ: " + e.message
                });
            } catch (e) { log.innerText = "افتحي التطبيق من Pi Browser"; }
        }

        // --- 2. Quran API Integration ---
        function initQuran() {
            const grid = document.getElementById('quran-grid');
            for(let i=1; i<=30; i++) {
                grid.innerHTML += `
                    <div class="app-card p-6 text-center cursor-pointer border-b-4 border-purple-500" onclick="fetchJuz(${i})">
                        <span class="text-xs opacity-50 block mb-1">الجزء</span>
                        <span class="text-2xl font-bold text-purple-700">${i}</span>
                    </div>`;
            }
        }

        async function fetchJuz(id) {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "الجزء رقم " + id;
            body.innerHTML = "⏳ جاري تحميل كلام الله...";
            document.getElementById('reader-modal').classList.remove('hidden');
            
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/juz/${id}/quran-uthmani`);
                const data = await res.json();
                let fullText = "";
                data.data.ayahs.forEach(ayah => {
                    fullText += ` ${ayah.text} <span class="text-purple-500 font-bold mx-1">(${ayah.numberInSurah})</span> `;
                });
                body.innerHTML = `<div class="text-right p-2">${fullText}</div>`;
            } catch (e) { body.innerHTML = "حدث خطأ في الاتصال، تأكدي من الإنترنت."; }
        }

        // --- 3. App Logic (Tabs, Theme, Tasbih) ---
        function openTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-content'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active-content');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        let tasbihCount = 0;
        function count() {
            tasbihCount++;
            document.getElementById('counter').innerText = tasbihCount;
            const offset = 753 - (tasbihCount % 33) * (753 / 33);
            document.getElementById('progress').style.strokeDashoffset = offset;
            if(tasbihCount % 33 == 0) navigator.vibrate(100);
        }
        function resetCount() { tasbihCount = 0; document.getElementById('counter').innerText = 0; document.getElementById('progress').style.strokeDashoffset = 753; }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('theme-icon');
            icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }

        function closeModal() { document.getElementById('reader-modal').classList.add('hidden'); }

        window.onload = initQuran;
    </script>
</body>
</html>
