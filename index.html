<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نورك - القرآن الكريم</title>
    <script src="https://sdk.pi.network/v2/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6a1b9a; --bg: #f9f9fb; --txt: #2c3e50; --card: #ffffff; --size: 24px; }
        body.dark { --bg: #121212; --txt: #e0e0e0; --card: #1e1e1e; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 80px; transition: 0.3s; }
        header { background: var(--p); color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .icon-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .sidebar { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: var(--card); z-index: 2001; transition: 0.4s; overflow-y: auto; box-shadow: -5px 0 15px rgba(0,0,0,0.3); }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; }
        .overlay.active { display: block; }
        .s-item { padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; font-weight: bold; }
        .quran-container { max-width: 800px; margin: 15px auto; padding: 25px; background: var(--card); border-radius: 15px; text-align: center; }
        #s-name { font-family: 'Amiri', serif; font-size: 32px; color: var(--p); border-bottom: 2px solid #eee; margin-bottom: 15px; }
        #s-content { font-family: 'Amiri', serif; font-size: var(--size); line-height: 2.2; text-align: justify; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-link { text-align: center; font-size: 11px; font-weight: bold; cursor: pointer; color: var(--txt); }
        .nav-link span { display: block; font-size: 22px; }
    </style>
</head>
<body>

<header>
    <button class="icon-btn" onclick="toggleM()">☰</button>
    <strong>نورك</strong>
    <button class="icon-btn" onclick="toggleD()">🌙</button>
</header>

<div class="overlay" id="over" onclick="toggleM()"></div>
<div class="sidebar" id="side">
    <div style="padding:20px; background:var(--p); color:white;">فهرس السور</div>
    <div id="surah-list"></div>
</div>

<div class="quran-container">
    <h2 id="s-name">بِسْمِ اللَّهِ</h2>
    <div id="s-content">افتح الفهرس وابدأ القراءة..</div>
</div>

<div class="bottom-nav">
    <div class="nav-link" onclick="saveM()"><span>📌</span>حفظ</div>
    <div class="nav-link" onclick="loadM()"><span>📖</span>العودة</div>
    <div class="nav-link" onclick="pay()" style="color: gold;"><span>π</span>تبرع</div>
</div>

<script>
    // تهيئة الـ SDK
    window.onload = function() {
        try {
            // ملاحظة: Sandbox: false للـ Mainnet، و true للتجربة
            Pi.init({ version: "2.0", sandbox: false });
            getIndex();
        } catch(e) { console.error("SDK Init failed"); }
    };

    async function getIndex() {
        try {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            const list = document.getElementById('surah-list');
            list.innerHTML = ""; // تنظيف القائمة
            data.data.forEach(s => {
                let d = document.createElement('div');
                d.className = 's-item';
                d.innerText = s.number + ". " + s.name;
                d.onclick = () => loadS(s.number, s.name);
                list.appendChild(d);
            });
        } catch(e) { console.error("Error fetching index"); }
    }

    async function loadS(id, name) {
        if(document.getElementById('side').classList.contains('active')) toggleM();
        document.getElementById('s-name').innerText = "سورة " + name;
        document.getElementById('s-content').innerHTML = "جاري التحميل...";
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            let txt = "";
            data.data.ayahs.forEach(a => { txt += a.text + " <span style='color:var(--p)'>(" + a.numberInSurah + ")</span> "; });
            document.getElementById('s-content').innerHTML = txt;
            window.scrollTo(0,0);
        } catch(e) { document.getElementById('s-content').innerHTML = "عفواً، حدث خطأ في التحميل."; }
    }

    function toggleM() { document.getElementById('side').classList.toggle('active'); document.getElementById('over').classList.toggle('active'); }
    function toggleD() { document.body.classList.toggle('dark'); }

    // تعديل زر الحفظ
    function saveM() {
        const sName = document.getElementById('s-name').innerText;
        if(sName === "بِسْمِ اللَّهِ" || sName === "") {
            alert("اختر سورة أولاً لكي تحفظها!");
            return;
        }
        const mark = { n: sName, c: document.getElementById('s-content').innerHTML };
        localStorage.setItem('q_mark', JSON.stringify(mark));
        alert("تم حفظ مكانك بنجاح! 📌");
    }

    // تعديل زر العودة (حل المشكلة اللي في الصورة)
    function loadM() {
        const saved = JSON.parse(localStorage.getItem('q_mark'));
        if(saved && saved.n !== "بِسْمِ اللَّهِ") {
            document.getElementById('s-name').innerText = saved.n;
            document.getElementById('s-content').innerHTML = saved.c;
            window.scrollTo(0,0);
        } else {
            alert("لا توجد علامة محفوظة حالياً. ابدئي قراءة أي سورة ثم اضغطي 'حفظ'.");
        }
    }

    // كود الدفع المطور لتخطي الخطوة 10
    async function pay() {
        try {
            const scopes = ['payments'];
            function onIncompletePaymentFound(payment) {
                // دالة مهمة جداً لـ Pi لإنهاء المدفوعات المعلقة
                console.log("Incomplete payment found", payment);
            };

            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            if (auth) {
                Pi.createPayment({
                    amount: 0.1,
                    memo: "دعم تطبيق نورك - صدقة جارية",
                    metadata: { orderId: "norak_" + Date.now() }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        console.log("Payment Ready for Approval", paymentId);
                        // هنا السيستم بيعرف إنك جاهزة
                        alert("طلب الدفع تم إرساله بنجاح!");
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        console.log("Payment Ready for Completion", paymentId, txid);
                    },
                    onComplete: (paymentId) => {
                        alert("تقبل الله منك! تم التبرع بنجاح.");
                    },
                    onCancel: (paymentId) => { console.log("Payment Cancelled"); },
                    onError: (error, payment) => {
                        alert("حدث خطأ: " + error.message);
                    }
                });
            }
        } catch(e) {
            alert("تأكدي من فتح التطبيق داخل Pi Browser."); 
        }
    }
</script>
</body>
</html>
