<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نوراك (Norak)</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root { --bg: #121212; --text: #ffffff; --card: #1e1e26; --accent: #f1c40f; }
        body.light-mode { --bg: #f4f4f9; --text: #333; --card: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; transition: 0.3s; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-toggle { background: #6c5ce7; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; float: left; }
        .section { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; cursor: pointer; }
        .btn-read { background: #27ae60; color: white; }
        .btn-pay { background: linear-gradient(45deg, #f39c12, #e67e22); color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4); }
        .content-display { background: #000; padding: 20px; border-radius: 10px; min-height: 100px; color: var(--accent); line-height: 1.8; font-size: 18px; border: 1px solid #333; white-space: pre-wrap; }
    </style>
</head>
<body id="mainBody">

<div class="container">
    <button class="btn-toggle" onclick="toggleTheme()">🌓</button>
    <h1>تطبيق نوراك (Norak)</h1>

    <div class="section">
        <h3>📖 المكتبة الإسلامية</h3>
        <select id="mainSelect">
            <option value="">-- اختر المحتوى --</option>
            <optgroup label="سور القرآن">
                <option value="1">سورة الفاتحة</option>
                <option value="112">سورة الإخلاص</option>
                <option value="113">سورة الفلق</option>
                <option value="114">سورة الناس</option>
            </optgroup>
            <optgroup label="الأذكار">
                <option value="az1">أذكار الصباح</option>
                <option value="az2">أذكار المساء</option>
            </optgroup>
        </select>
        <button class="btn-read" onclick="handleDisplay()">عرض الآن</button>
        <div class="content-display" id="outBox">مرحباً بك في نوراك.. اختر محتوى للبدء</div>
    </div>

    <div class="section">
        <h3>تفعيل الخطوة 10 النهائية</h3>
        <p style="font-size: 13px;">دعم استمرارية المشروع (0.01 Pi)</p>
        <button class="btn-pay" onclick="runPayment()">🎁 تفعيل الخطوة 10</button>
        <p style="font-size: 11px; color: #888;">تأكد من فتح التطبيق عبر Pi Browser</p>
    </div>
</div>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    function toggleTheme() {
        document.getElementById('mainBody').classList.toggle('light-mode');
    }

    async function handleDisplay() {
        const val = document.getElementById('mainSelect').value;
        const box = document.getElementById('outBox');
        if (!val) return;
        
        if (val.startsWith('az')) {
            box.innerText = val === 'az1' ? "أصبحنا وأصبح الملك لله، والحمد لله، لا إله إلا الله وحده لا شريك له..." : "أمسينا وأمسى الملك لله، والحمد لله، أعوذ بكلمات الله التامات من شر ما خلق...";
        } else {
            box.innerText = "جاري التحميل...";
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${val}`);
                const d = await res.json();
                box.innerText = d.data.ayahs.map(a => a.text).join(' ');
            } catch (e) {
                box.innerText = "حدث خطأ في جلب المحتوى، يرجى المحاولة لاحقاً.";
            }
        }
    }

    function onIncompletePaymentFound(payment) {
        return axios.post('https://norak-app.vercel.app/api/incomplete', { payment });
    }

    async function runPayment() {
        try {
            const auth = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
            
            const paymentData = {
                amount: 0.01,
                memo: "تفعيل الخطوة 10 - تطبيق نوراك",
                metadata: { orderId: "norak_" + Date.now() }
            };

            const callbacks = {
                onReadyForServerApproval: (id) => {
                    return axios.post('https://norak-app.vercel.app/api/approve', { paymentId: id });
                },
                onReadyForServerCompletion: (id, tx) => {
                    return axios.post('https://norak-app.vercel.app/api/complete', { paymentId: id, txid: tx });
                },
                onCancel: (id) => console.log("Payment Cancelled"),
                onError: (err) => {
                    console.error(err);
                    alert("فشلت العملية، يرجى التأكد من رصيد المحفظة.");
                }
            };

            await Pi.createPayment(paymentData, callbacks);
        } catch (e) {
            console.error(e);
            alert("يرجى فتح التطبيق من داخل متصفح Pi الرسمي.");
        }
    }
</script>
</body>
</html>
