<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق نورك - الإصدار الملكي الشامل</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --p: #6c5ce7;
            --s: #a29bfe;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2d3436;
            --sub: #636e72;
            --gold: #f1c40f;
        }

        .dark-mode {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #f5f5f5;
            --sub: #b2bec3;
        }

        * {
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
            user-select: none;
        }

        /* Header Area */
        header {
            background: linear-gradient(135deg, var(--p), var(--s));
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 35px 35px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        header h1 { margin: 0; font-size: 2rem; font-weight: 900; }
        header p { margin: 10px 0 0; opacity: 0.9; font-size: 0.9rem; }

        /* Search Bar */
        .search-box {
            margin: -25px 20px 20px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 20px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            font-size: 1rem;
            outline: none;
            background: var(--card);
            color: var(--text);
        }

        /* Content Sections */
        .container { padding: 0 15px; max-width: 600px; margin: auto; }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 5px 10px;
            border-right: 5px solid var(--p);
            padding-right: 12px;
        }

        .section-header h3 { margin: 0; font-size: 1.2rem; }

        /* Card Styling */
        .list-container { display: flex; flex-direction: column; gap: 10px; }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.03);
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.01);
        }

        .card:active { transform: scale(0.97); }

        .card-right { display: flex; align-items: center; gap: 15px; }

        .index-box {
            background: var(--p);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Reader View Overlay */
        #reader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .reader-nav {
            background: var(--p);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reader-body {
            padding: 40px 25px;
            overflow-y: auto;
            text-align: center;
            line-height: 2.2;
            white-space: pre-wrap;
            flex: 1;
        }

        /* Bottom Nav */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .nav-tab {
            text-decoration: none;
            color: var(--sub);
            text-align: center;
            font-size: 0.8rem;
            flex: 1;
        }

        .nav-tab.active { color: var(--p); font-weight: bold; }
        .nav-tab i { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        /* Settings & Premium */
        .premium-box {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            border-radius: 25px;
            padding: 30px;
            color: white;
            text-align: center;
            margin-top: 15px;
        }

        .pi-btn {
            background: white;
            color: #d35400;
            border: none;
            padding: 12px 35px;
            border-radius: 25px;
            font-weight: 900;
            margin-top: 15px;
            cursor: pointer;
        }

        .setting-item {
            background: var(--card);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>نورك</h1>
    <p>بوابتك الإيمانية الحقيقية على شبكة Pi</p>
</header>

<div class="search-box">
    <input type="text" id="qSearch" placeholder="بحث سريع في السور والأذكار..." onkeyup="doSearch()">
</div>

<div class="container">
    <div id="view-quran" class="view">
        <div class="section-header">
            <h3>📖 الفهرس الشامل (114 سورة)</h3>
        </div>
        <div id="quran-list" class="list-container"></div>
    </div>

    <div id="view-azkar" class="view hidden">
        <div class="section-header">
            <h3>📿 حصن المسلم</h3>
        </div>
        <div id="azkar-list" class="list-container">
            <div class="card" onclick="openReader('أذكار الصباح', 'أصبحنا وأصبح الملك لله، والحمد لله، لا إله إلا الله وحده لا شريك له...')">
                <div class="card-right"><div class="index-box">☀️</div><span>أذكار الصباح</span></div>
                <span>◀</span>
            </div>
            <div class="card" onclick="openReader('أذكار المساء', 'أمسينا وأمسى الملك لله، والحمد لله، لا إله إلا الله وحده لا شريك له...')">
                <div class="card-right"><div class="index-box">🌙</div><span>أذكار المساء</span></div>
                <span>◀</span>
            </div>
        </div>
    </div>

    <div id="view-settings" class="view hidden">
        <div class="premium-box">
            <h2>تفعيل النسخة الكاملة</h2>
            <p>افتح جميع السور وادعم المشروع بـ 1 Pi فقط</p>
            <button class="pi-btn" onclick="piPay()">شراء الآن عبر Pi</button>
        </div>

        <div class="section-header"><h3>⚙️ الإعدادات</h3></div>
        
        <div class="setting-item">
            <span>الوضع الليلي</span>
            <button onclick="toggleMode()" style="background:var(--p); color:white; border:none; padding:5px 15px; border-radius:10px;">تبديل</button>
        </div>

        <div class="setting-item">
            <span>حجم الخط</span>
            <input type="range" min="16" max="40" value="22" oninput="updateFont(this.value)">
        </div>

        <div class="card" onclick="goBookmark()">
            <div class="card-right"><span>🔖 الانتقال لآخر علامة قراءة</span></div>
        </div>
    </div>
</div>

<div id="reader">
    <div class="reader-nav">
        <button onclick="closeReader()" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button>
        <span id="r-title" style="font-weight:bold;">اسم السورة</span>
        <button onclick="saveMark()" style="background:none; border:none; color:white; font-size:1.2rem;">🔖</button>
    </div>
    <div id="r-text" class="reader-body"></div>
</div>

<nav>
    <a class="nav-tab active" onclick="nav('quran', this)"><i>📖</i><span>القرآن</span></a>
    <a class="nav-tab" onclick="nav('azkar', this)"><i>📿</i><span>الأذكار</span></a>
    <a class="nav-tab" onclick="nav('settings', this)"><i>⚙️</i><span>المزيد</span></a>
</nav>

<script>
    // Pi SDK Initialization
    try {
        Pi.init({ version: "2.0" });
    } catch(e) { console.log("Pi SDK Offline"); }

    const surahs = ["الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس", "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه", "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم", "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر", "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق", "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة", "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج", "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس", "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد", "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات", "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر", "المسد", "الإخلاص", "الفلق", "الناس"];

    const qTexts = {
        "الفاتحة": "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ (1)\nالْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ (2) الرَّحْمَنِ الرَّحِيمِ (3) مَالِكِ يَوْمِ الدِّينِ (4) إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ (5) اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ (6) صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ (7)",
        "الإخلاص": "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ\nقُلْ هُوَ اللَّهُ أَحَدٌ (1) اللَّهُ الصَّمَدُ (2) لَمْ يَلِدْ وَلَمْ يُولَدْ (3) وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ (4)"
    };

    function build() {
        const list = document.getElementById('quran-list');
        list.innerHTML = surahs.map((s, i) => `
            <div class="card" onclick="openReader('سورة ${s}', '${qTexts[s] || 'نص السورة سيكون متاحاً بالكامل في النسخة المدفوعة لدعم استمرار التطبيق.'}')">
                <div class="card-right">
                    <div class="index-box">${i+1}</div>
                    <span>سورة ${s}</span>
                </div>
                <span>📖</span>
            </div>
        `).join('');
    }

    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + id).classList.remove('hidden');
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    function openReader(title, text) {
        document.getElementById('r-title').innerText = title;
        document.getElementById('r-text').innerText = text;
        document.getElementById('reader').style.display = 'flex';
    }

    function closeReader() { document.getElementById('reader').style.display = 'none'; }

    function doSearch() {
        const query = document.getElementById('qSearch').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(query) ? 'flex' : 'none';
        });
    }

    function toggleMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('mode', document.body.classList.contains('dark-mode'));
    }

    function updateFont(v) {
        document.getElementById('r-text').style.fontSize = v + 'px';
    }

    function saveMark() {
        const t = document.getElementById('r-title').innerText;
        localStorage.setItem('lastRead', t);
        alert('تم حفظ ' + t + ' كعلامة قراءة 🔖');
    }

    function goBookmark() {
        const b = localStorage.getItem('lastRead');
        if(b) alert('آخر سورة كنت تقرأها: ' + b);
        else alert('لا توجد علامات محفوظة.');
    }

    function piPay() {
        alert("سيتم الآن فتح واجهة دفع Pi لخصم 1 Pi لتفعيل النسخة الكاملة.");
    }

    window.onload = () => {
        build();
        if(localStorage.getItem('mode') === 'true') document.body.classList.add('dark-mode');
    };
</script>
</body>
</html>
