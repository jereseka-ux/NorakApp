<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - Norak</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="path-to-your-external-quran-library.css">
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --highlight: #f39c12;
        }
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: var(--bg);
            color: var(--text);
        }
        header, footer { padding:10px; text-align:center; background-color:var(--card); }
        main { padding:10px; }
        button {
            padding:10px 15px;
            margin:5px;
            background-color: var(--highlight);
            border:none;
            border-radius:5px;
            color:#000;
            cursor:pointer;
        }
        .card {
            background-color: var(--card);
            padding:10px;
            margin:10px 0;
            border-radius:10px;
        }
        .bookmark { float:left; cursor:pointer; color:var(--highlight); }
        #settings-panel { display:none; background-color:var(--card); padding:10px; border-radius:10px; margin-bottom:10px; }
        .light-mode {
            --bg:#ffffff; --card:#f0f0f0; --text:#000000; --highlight:#f39c12;
        }
    </style>
</head>
<body>
<header>
    <h1>تطبيق نورك</h1>
    <button id="toggle-light">تغيير الإضاءة</button>
    <button id="toggle-settings">الإعدادات</button>
</header>

<div id="settings-panel">
    <h3>الإعدادات</h3>
    <label>حجم الخط:
        <input type="range" id="font-size" min="12" max="28" value="16">
    </label>
</div>

<main>
    <div id="content">
        <!-- القرآن كامل مرتبط بالمكتبة الخارجية -->
        <div id="quran-container"></div>

        <!-- أدعية وأذكار -->
        <div class="card">
            <h2>أدعية وأذكار يومية</h2>
            <div id="azkar-container"></div>
        </div>

        <!-- زر الدفع -->
        <div class="card">
            <h2>الدفع</h2>
            <button id="pay-button">ادفع الآن</button>
            <p id="pay-status"></p>
        </div>
    </div>
</main>

<footer>&copy; 2026 تطبيق نورك</footer>

<script src="path-to-your-external-quran-library.js"></script>
<script>
    // تغيير الإضاءة
    const toggleLightBtn = document.getElementById('toggle-light');
    toggleLightBtn.addEventListener('click', () => { document.body.classList.toggle('light-mode'); });

    // فتح وغلق الإعدادات
    const toggleSettingsBtn = document.getElementById('toggle-settings');
    const settingsPanel = document.getElementById('settings-panel');
    toggleSettingsBtn.addEventListener('click', () => {
        settingsPanel.style.display = settingsPanel.style.display === 'block' ? 'none' : 'block';
    });

    // تغيير حجم الخط
    const fontSizeInput = document.getElementById('font-size');
    fontSizeInput.addEventListener('input', () => {
        document.body.style.fontSize = fontSizeInput.value + 'px';
    });

    // تحميل القرآن من المكتبة الخارجية
    const quranContainer = document.getElementById('quran-container');
    QuranLibrary.loadAllParts().then(parts => {
        parts.forEach((part, index) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.id = 'quran-part-' + (index+1);
            div.innerHTML = `<span class="bookmark" onclick="toggleBookmark(${index+1})">★</span>
                             <h2>الجزء ${index+1}</h2><p>${part.text}</p>`;
            quranContainer.appendChild(div);
        });
    });

    // تحميل الأذكار
    const azkarContainer = document.getElementById('azkar-container');
    AzkarLibrary.loadDaily().then(azkar => {
        azkar.forEach(z => {
            const p = document.createElement('p');
            p.textContent = z;
            azkarContainer.appendChild(p);
        });
    });

    // بوكمارك
    function toggleBookmark(part) {
        const el = document.getElementById('quran-part-' + part);
        el.querySelector('.bookmark').classList.toggle('active');
        alert('تم التمييز على الجزء ' + part);
    }

    // تفعيل الدفع عبر Pi
    const payBtn = document.getElementById('pay-button');
    const payStatus = document.getElementById('pay-status');
    payBtn.addEventListener('click', async () => {
        payStatus.textContent = 'جارٍ معالجة الدفع...';
        try {
            const payment = await Pi.createPayment({
                amount: 1.0, 
                currency: 'PI',
                memo: 'تبرع لتطبيق نورك'
            });
            if(payment.status === 'success'){
                payStatus.textContent = 'تم الدفع بنجاح!';
            } else {
                payStatus.textContent = 'فشل الدفع، حاول مرة أخرى.';
            }
        } catch(e){
            console.error(e);
            payStatus.textContent = 'حدث خطأ أثناء الدفع.';
        }
    });
</script>
</body>
</html>
