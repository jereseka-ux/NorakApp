<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - Norak App</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #bb86fc; --gold: #ffd700; }
        body.light { --bg: #f5f5f6; --card: #ffffff; --text: #1a1a1a; --accent: #6200ee; }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; transition: 0.3s; margin: 0; padding: 0; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        
        /* Header & User Profile */
        .user-card { background: var(--card); padding: 20px; border-radius: 20px; text-align: center; border-bottom: 4px solid var(--accent); margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .welcome-text { font-size: 1.3rem; font-weight: bold; color: var(--accent); margin: 5px 0; }
        
        /* Premium Button */
        .btn-vip { background: linear-gradient(90deg, #bb86fc, #6200ee); color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .btn-vip:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--accent); }

        /* Tools Grid */
        .tools { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .tool-box { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .count-num { font-size: 2rem; color: var(--gold); font-weight: bold; display: block; }
        
        /* Quran Section */
        .main-content { background: var(--card); border-radius: 20px; padding: 15px; min-height: 400px; }
        .surah-list-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .surah-list-item:hover { background: rgba(187, 134, 252, 0.1); border-radius: 10px; }
        
        .reading-view { display: none; padding: 10px; text-align: center; }
        .quran-text { line-height: 2.2; font-size: 24px; text-align: justify; direction: rtl; }
        
        .nav-buttons { display: flex; gap: 5px; margin-top: 10px; }
        .btn-sm { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: var(--text); cursor: pointer; }
    </style>
</head>
<body id="mainBody">

<div class="container">
    <div class="user-card">
        <div id="userName" class="welcome-text">جاري الربط بـ Pi...</div>
        <small id="status">الحالة: متصل بالشبكة ✅</small>
    </div>

    <button class="btn-vip" onclick="requestPayment()">تفعيل ميزات VIP بـ 1 Pi</button>

    <div class="tools">
        <div class="tool-box">
            <span id="tally" class="count-num">0</span>
            <button class="btn-sm" onclick="addTasbih()">تسبيح</button>
            <button class="btn-sm" style="font-size:10px" onclick="resetTasbih()">تصفير</button>
        </div>
        <div class="tool-box">
            <label style="font-size: 0.8rem;">حجم الخط</label>
            <input type="range" min="18" max="45" value="24" style="width:100%" oninput="updateFont(this.value)">
            <button class="btn-sm" style="width:100%; margin-top:5px;" onclick="toggleDark()">تغيير الثيم 🌓</button>
        </div>
    </div>

    <div class="main-content">
        <div id="quranHeader" style="display:flex; justify-content:space-between;">
            <h3 id="title">فهرس السور</h3>
            <button id="backBtn" onclick="backToMenu()" style="display:none;" class="btn-sm">عودة</button>
        </div>
        <hr style="opacity:0.1">
        
        <div id="surahContainer">جاري تحميل المصحف...</div>
        
        <div id="readingView" class="reading-view">
            <div id="quranContent" class="quran-text"></div>
        </div>
    </div>
</div>

<script>
    const Pi = window.Pi;
    let username = "ياسمين";

    // 1. تشغيل شبكة Pi وسحب البيانات
    async function startApp() {
        try {
            // تفعيل الـ SDK
            Pi.init({ version: "2.0", sandbox: true }); 
            const scopes = ['username', 'payments'];
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            username = auth.user.username;
            document.getElementById('userName').innerText = `أهلاً بكِ، ${username} ✨`;
        } catch (e) {
            document.getElementById('userName').innerText = "أهلاً بكِ في تطبيق نورك";
            console.log("الفتح خارج متصفح Pi");
        }
        loadAllSurahs();
    }

    // 2. جلب قائمة السور من المكتبة الخارجية
    async function loadAllSurahs() {
        try {
            const response = await fetch('https://api.alquran.cloud/v1/surah');
            const result = await response.json();
            let listHtml = '';
            result.data.forEach(s => {
                listHtml += `
                    <div class="surah-list-item" onclick="openSurah(${s.number}, '${s.name}')">
                        <span>${s.number}. ${s.name}</span>
                        <small style="color:var(--gold)">${s.numberOfAyahs} آية</small>
                    </div>`;
            });
            document.getElementById('surahContainer').innerHTML = listHtml;
        } catch (err) {
            document.getElementById('surahContainer').innerText = "حدث خطأ في تحميل البيانات.";
        }
    }

    // 3. فتح السورة وقراءتها
    async function openSurah(id, name) {
        document.getElementById('surahContainer').style.display = 'none';
        document.getElementById('readingView').style.display = 'block';
        document.getElementById('backBtn').style.display = 'block';
        document.getElementById('title').innerText = name;
        document.getElementById('quranContent').innerText = "جاري جلب الآيات...";

        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            const text = data.data.ayahs.map(a => `${a.text} ﴿${a.numberInSurah}﴾`).join(' ');
            document.getElementById('quranContent').innerText = text;
            localStorage.setItem('last_surah', name); // حفظ تلقائي (Bookmark)
        } catch (e) {
            alert("خطأ في الاتصال بالمكتبة");
        }
    }

    function backToMenu() {
        document.getElementById('surahContainer').style.display = 'block';
        document.getElementById('readingView').style.display = 'none';
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('title').innerText = "فهرس السور";
    }

    // 4. وظائف المسبحة والإعدادات
    function addTasbih() {
        let n = document.getElementById('tally');
        n.innerText = parseInt(n.innerText) + 1;
    }
    function resetTasbih() { document.getElementById('tally').innerText = 0; }

    function updateFont(v) { document.getElementById('quranContent').style.fontSize = v + 'px'; }

    function toggleDark() { document.getElementById('mainBody').classList.toggle('light'); }

    // 5. زر الدفع (الربط بـ Pi Wallet)
    async function requestPayment() {
        try {
            const payment = await Pi.createPayment({
                amount: 1.0,
                memo: "دعم تطبيق نورك - تفعيل حساب VIP",
                metadata: { orderId: 12345 }
            });
            alert("تم الدفع بنجاح يا " + username);
        } catch (err) {
            alert("يرجى فتح التطبيق من متصفح Pi Browser لإتمام عملية الدفع.");
        }
    }

    function onIncompletePaymentFound(payment) { /* لمعالجة المدفوعات المعلقة */ }

    // تشغيل التطبيق
    startApp();
</script>

</body>
</html>
