<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - الإصدار المعتمد</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0a1a; --card: #1e162d; --accent: #bb86fc; --text: #e0e0e0; --pay: #fed900; }
        .light-mode { --bg: #f5f5f5; --card: #ffffff; --accent: #6200ee; --text: #121212; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; transition: 0.3s; }
        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .user-badge { background: rgba(187, 134, 252, 0.2); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--accent); font-size: 0.9em; }
        
        .app-page { padding: 10px; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        /* الفهرس المطور */
        .juz-item { margin-bottom: 8px; border: 1px solid rgba(187, 134, 252, 0.3); border-radius: 10px; overflow: hidden; }
        .juz-header { width: 100%; padding: 12px; background: rgba(187, 134, 252, 0.1); border: none; color: var(--text); text-align: right; display: flex; justify-content: space-between; cursor: pointer; }
        .surah-container { display: none; background: rgba(0,0,0,0.2); padding: 5px; }
        .surah-link { padding: 10px; display: block; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--accent); text-decoration: none; cursor: pointer; }

        #quran-viewer { display: none; font-family: 'Amiri', serif; font-size: 1.4em; line-height: 2; text-align: center; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .btn-tool { background: var(--card); border: 1px solid var(--accent); color: var(--text); padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        .subha-area { text-align: center; padding: 30px 0; }
        .counter { width: 150px; height: 150px; border: 5px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3em; margin: 0 auto 20px; cursor: pointer; }

        .btn-pay { background: var(--pay); color: #000; width: 80%; padding: 15px; border-radius: 30px; border: none; font-weight: bold; font-size: 1.1em; cursor: pointer; display: block; margin: 20px auto; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--accent); }
        .nav-link { color: #888; text-align: center; font-size: 0.8em; cursor: pointer; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { display: block; font-size: 1.5em; }
    </style>
</head>
<body id="bdy">

<header>
    <div class="user-badge" id="user-display">تحقق...</div>
    <div style="font-family:'Amiri'; font-size: 1.5em;">نورك</div>
    <i class="fas fa-adjust" onclick="toggleMode()" style="cursor:pointer; color:var(--accent);"></i>
</header>

<div id="quran-page" class="app-page">
    <div class="controls">
        <button class="btn-tool" onclick="changeFontSize(2)"><i class="fas fa-plus"></i></button>
        <button class="btn-tool" onclick="changeFontSize(-2)"><i class="fas fa-minus"></i></button>
        <button class="btn-tool" onclick="backToIndex()"><i class="fas fa-list"></i> الفهرس</button>
    </div>

    <div id="quran-viewer" class="card"></div>

    <div id="fihris">
        </div>
</div>

<div id="subha-page" class="app-page" style="display:none;">
    <div class="subha-area">
        <div class="counter" id="count-box" onclick="hitSubha()">0</div>
        <button class="btn-tool" onclick="resetSubha()">إعادة تصفير</button>
    </div>
</div>

<div id="pay-page" class="app-page" style="display:none; text-align:center;">
    <div class="card">
        <h3>تفعيل مميزات المطور</h3>
        <p>دعم المحتوى والربط المباشر بالمكتبة</p>
        <button class="btn-pay" onclick="payNow()">دفع 0.1 Pi</button>
        <p id="pay-status" style="font-size: 0.8em; color: var(--accent);"></p>
    </div>
</div>

<nav>
    <div class="nav-link active" onclick="switchTab('quran-page')"><i class="fas fa-book"></i>القرآن</div>
    <div class="nav-link" onclick="switchTab('subha-page')"><i class="fas fa-fingerprint"></i>المسبحة</div>
    <div class="nav-link" onclick="switchTab('pay-page')"><i class="fas fa-wallet"></i>الدفع</div>
</nav>

<script>
    const Pi = window.Pi;
    let currentCount = parseInt(localStorage.getItem('nrk_c')) || 0;
    let fSize = parseInt(localStorage.getItem('nrk_fs')) || 22;

    async function initApp() {
        try {
            await Pi.init({ version: "2.0", sandbox: false });
            const auth = await Pi.authenticate(['username', 'payments'], (p) => {});
            document.getElementById('user-display').innerText = auth.user.username;
        } catch (e) { document.getElementById('user-display').innerText = "زائر"; }
        
        generateFihris();
        applySettings();
    }

    function generateFihris() {
        const fihris = document.getElementById('fihris');
        const data = [
            {j: 1, s: ["الفاتحة", "البقرة"]},
            {j: 2, s: ["البقرة (تتمة)"]},
            {j: 30, s: ["النبأ", "النازعات", "عبس", "التكوير", "الإنفطار", "المطففين", "الإنشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد", "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات", "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر", "المسد", "الإخلاص", "الفلق", "الناس"]}
        ];

        for(let i=1; i<=30; i++) {
            let item = data.find(x => x.j == i) || {j: i, s: ["سورة من الجزء " + i]};
            let html = `
                <div class="juz-item">
                    <button class="juz-header" onclick="toggleJuz(${i})">الجزء ${i} <i class="fas fa-chevron-down"></i></button>
                    <div id="juz-${i}" class="surah-container">
                        ${item.s.map(s => `<div class="surah-link" onclick="loadSurah('${s}')">${s}</div>`).join('')}
                    </div>
                </div>`;
            fihris.innerHTML += html;
        }
    }

    async function loadSurah(name) {
        const viewer = document.getElementById('quran-viewer');
        viewer.innerHTML = "جارٍ التحميل من المكتبة...";
        viewer.style.display = "block";
        document.getElementById('fihris').style.display = "none";
        
        // محاكاة جلب البيانات (يمكن ربطها بـ API حقيقي هنا)
        viewer.innerHTML = `<h3>${name}</h3><p>بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ <br> النص الكامل للسورة يظهر هنا عند اكتمال الربط...</p>`;
    }

    function backToIndex() {
        document.getElementById('quran-viewer').style.display = "none";
        document.getElementById('fihris').style.display = "block";
    }

    async function payNow() {
        const status = document.getElementById('pay-status');
        status.innerText = "بانتظار تأكيد المحفظة...";
        try {
            const payment = await Pi.createPayment({
                amount: 0.1, memo: "تفعيل تطبيق نورك الكامل", metadata: { type: "activation" }
            }, {
                onReadyForServerApproval: (id) => { status.innerText = "تمت الموافقة.. جارٍ التأكيد النهائي"; },
                onReadyForServerCompletion: (id, txid) => { status.innerText = "تم التفعيل بنجاح!"; alert("شكراً لدعمك!"); },
                onCancel: (id) => { status.innerText = "تم إلغاء العملية."; },
                onError: (e) => { status.innerText = "خطأ في الاتصال بالمحفظة."; }
            });
        } catch (e) { alert("يرجى الفتح من Pi Browser"); }
    }

    function toggleMode() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('nrk_m', document.body.classList.contains('light-mode') ? 'L' : 'D');
    }

    function applySettings() {
        if(localStorage.getItem('nrk_m') === 'L') document.body.classList.add('light-mode');
        document.getElementById('count-box').innerText = currentCount;
    }

    function hitSubha() {
        currentCount++;
        document.getElementById('count-box').innerText = currentCount;
        localStorage.setItem('nrk_c', currentCount);
        if(navigator.vibrate) navigator.vibrate(40);
    }

    function resetSubha() { currentCount = 0; document.getElementById('count-box').innerText = 0; localStorage.setItem('nrk_c', 0); }

    function changeFontSize(v) {
        fSize += v;
        document.getElementById('quran-viewer').style.fontSize = fSize + "px";
        localStorage.setItem('nrk_fs', fSize);
    }

    function toggleJuz(id) {
        const el = document.getElementById(`juz-${id}`);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function switchTab(id) {
        document.querySelectorAll('.app-page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    window.onload = initApp;
</script>
</body>
</html>
