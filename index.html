<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - القرآن الكريم</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://sdk.pi.network/v2/pi-sdk.js"></script>

    <style>
        :root {
            --bg-color: #f9f9fb;
            --text-color: #2c3e50;
            --card-bg: #ffffff;
            --accent-color: #6a1b9a;
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --card-bg: #2d2d2d;
            --accent-color: #bb86fc;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: all 0.3s ease;
        }

        /* الهيدر والتحكم */
        header {
            background-color: var(--accent-color);
            color: white;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* منطقة المحتوى (القرآن) */
        .quran-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            min-height: 60vh;
            font-family: 'Amiri', serif;
            font-size: 24px;
            line-height: 2;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* الفهرس الجانبي */
        .sidebar {
            position: fixed;
            right: -250px;
            top: 0;
            width: 250px;
            height: 100%;
            background: var(--card-bg);
            transition: 0.3s;
            z-index: 200;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
            padding-top: 60px;
        }

        .sidebar.active { right: 0; }

        .surah-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: 0.2s;
        }

        .surah-item:hover { background: var(--accent-color); color: white; }

        /* الأزرار والأدوات */
        .controls {
            display: flex;
            gap: 10px;
            padding: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-pay { background: gold; color: black; }
        .btn-theme { background: #34495e; color: white; }
        
        #status-bar {
            font-size: 12px;
            padding: 5px;
            text-align: center;
            background: rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<header>
    <button onclick="toggleSidebar()">☰ الفهرس</button>
    <div style="font-weight: bold;">تطبيق نورك</div>
    <button onclick="toggleTheme()" class="btn-theme">🌙/☀️</button>
</header>

<div id="status-bar">جاري الاتصال بـ Pi Network...</div>

<div class="controls">
    <button onclick="saveBookmark()" title="حفظ العلامة">📌 حفظ</button>
    <button onclick="goToBookmark()" title="الذهاب للعلامة">📖 العودة</button>
    <button onclick="startPiPayment()" class="btn-pay">دعم التطبيق (π)</button>
</div>

<div id="sidebar" class="sidebar">
    <h3 style="text-align:center">السور</h3>
    <div id="surah-list">
        </div>
</div>

<div class="quran-container" id="quran-display">
    بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ
    <br>
    (اختر سورة من الفهرس للبدء)
</div>

<script>
    // --- 1. إعدادات Pi Network ---
    Pi.init({ version: "2.0", sandbox: true });

    async function startPiPayment() {
        const status = document.getElementById('status-bar');
        try {
            const auth = await Pi.authenticate(['payments'], (p) => console.log("تحصيل معلق:", p));
            status.innerText = `أهلاً ${auth.user.username}.. جاري إنشاء الطلب`;

            Pi.createPayment({
                amount: 0.1,
                memo: "دعم تطبيق نورك - القرآن الكريم",
                metadata: { type: "donation" }
            }, {
                onReadyForServerApproval: (id) => {
                    status.innerText = "بانتظار موافقة السيرفر (ID: " + id + ")";
                    Pi.approvePayment(id); // في النسخة التجريبية
                },
                onReadyForServerCompletion: (id, txid) => Pi.completePayment(id, txid),
                onComplete: (p) => { status.innerText = "شكراً لدعمك الكريم!"; status.style.color = "green"; },
                onCancel: (id) => status.innerText = "تم إلغاء الدفع.",
                onError: (err) => status.innerText = "خطأ في الدفع: " + err.message
            });
        } catch (e) {
            status.innerText = "يرجى فتح التطبيق من Pi Browser";
        }
    }

    // --- 2. منطق المحتوى والفهرس ---
    const surahs = ["الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة"]; // مثال
    const surahList = document.getElementById('surah-list');
    
    surahs.forEach((s, index) => {
        let div = document.createElement('div');
        div.className = 'surah-item';
        div.innerText = `${index + 1}. سورة ${s}`;
        div.onclick = () => loadSurah(s);
        surahList.appendChild(div);
    });

    function loadSurah(name) {
        document.getElementById('quran-display').innerText = `جاري تحميل سورة ${name}... (هنا تضعي نص السورة)`;
        toggleSidebar();
    }

    // --- 3. الأدوات (إضاءة، بوكمارك، فهرس) ---
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    function saveBookmark() {
        const text = document.getElementById('quran-display').innerText;
        localStorage.setItem('quran_bookmark', text);
        alert("تم حفظ مكانك الحالي!");
    }

    function goToBookmark() {
        const saved = localStorage.getItem('quran_bookmark');
        if(saved) {
            document.getElementById('quran-display').innerText = saved;
        } else {
            alert("لا يوجد علامة محفوظة.");
        }
    }

    // استعادة الإعدادات عند الفتح
    window.onload = () => {
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    };
</script>

</body>
</html>
