<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #0f0a1a;
            --card-bg: #1e162d;
            --accent-color: #bb86fc;
            --text-color: #e0e0e0;
            --danger-color: #cf6679;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding-bottom: 70px;
            transition: all 0.3s ease;
        }

        /* الهيدر والترحيب */
        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(180deg, #1e162d 0%, transparent 100%);
        }

        .user-badge {
            float: left;
            background: rgba(187, 134, 252, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--accent-color);
            font-size: 0.9em;
        }

        h1 { font-family: 'Amiri', serif; color: var(--accent-color); margin-top: 40px; }

        /* منطقة الأذكار اليومية */
        .daily-dhikr {
            margin: 15px;
            padding: 20px;
            background: var(--card-bg);
            border: 1px dashed var(--accent-color);
            border-radius: 15px;
            text-align: center;
        }

        /* الفهرس المطور */
        .index-section { margin: 15px; }
        .juz-box {
            background: var(--card-bg);
            margin-bottom: 10px;
            border-radius: 8px;
            overflow: hidden;
        }
        .juz-header {
            width: 100%;
            padding: 15px;
            background: none;
            border: none;
            color: white;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            font-size: 1.1em;
        }
        .surah-list {
            background: rgba(0,0,0,0.2);
            display: none;
            padding: 10px;
        }
        .surah-item {
            padding: 8px 15px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
        }

        /* المسبحة */
        .subha-section {
            text-align: center;
            padding: 40px 20px;
        }
        .counter-circle {
            width: 150px;
            height: 150px;
            border: 5px solid var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            font-size: 3em;
            cursor: pointer;
        }

        /* شريط التنقل السفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1e162d;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #333;
        }
        .nav-item { color: #888; text-decoration: none; text-align: center; font-size: 0.8em; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item i { display: block; font-size: 1.5em; margin-bottom: 3px; }

        /* أزرار الإجراءات */
        .btn-pay {
            background: var(--accent-color);
            color: var(--primary-bg);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            margin: 20px;
            cursor: pointer;
        }
        .btn-reset { background: var(--danger-color); color: white; border: none; padding: 5px 15px; border-radius: 5px; }

        /* إعدادات حجم الخط */
        .font-controls { text-align: center; margin: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="user-badge">
            <i class="fas fa-user"></i> <span id="username-display">زائر</span>
        </div>
        <i class="fas fa-moon" id="theme-toggle" style="float: right; font-size: 1.5em;"></i>
        <h1>نورك</h1>
    </header>

    <div id="quran-page">
        <div class="daily-dhikr">
            <small>ذكر اليوم</small>
            <p id="daily-text">"ربنا لا تزغ قلوبنا بعد إذ هديتنا وهب لنا من لدنك رحمة"</p>
        </div>

        <div class="font-controls">
            <button onclick="changeFontSize(-2)">A-</button>
            <button onclick="changeFontSize(2)">A+</button>
            <i class="fas fa-bookmark" onclick="saveBookmark()" style="margin-right: 15px;"></i>
        </div>

        <div class="index-section">
            <h3 style="padding-right: 15px;">الفهرس</h3>
            <div class="juz-box">
                <button class="juz-header" onclick="toggleSection('juz1')">
                    الجزء الأول <span><i class="fas fa-chevron-down"></i></span>
                </button>
                <div id="juz1" class="surah-list">
                    <div class="surah-item"><span>1. الفاتحة</span> <small>ص 1</small></div>
                    <div class="surah-item"><span>2. البقرة</span> <small>ص 2</small></div>
                </div>
            </div>
            <div class="juz-box">
                <button class="juz-header" onclick="toggleSection('juz2')">
                    الجزء الثاني <span><i class="fas fa-chevron-down"></i></span>
                </button>
                <div id="juz2" class="surah-list">
                    <div class="surah-item"><span>تتمة سورة البقرة</span> <small>ص 22</small></div>
                </div>
            </div>
        </div>
    </div>

    <div id="subha-page" style="display:none;">
        <div class="subha-section">
            <h2>المسبحة الإلكترونية</h2>
            <div class="counter-circle" id="counter" onclick="incrementCounter()">0</div>
            <button class="btn-reset" onclick="resetCounter()">إعادة التصفير</button>
        </div>
    </div>

    <div id="support-page" style="display:none; text-align: center;">
        <div style="padding: 50px 20px;">
            <i class="fas fa-heart" style="font-size: 4em; color: var(--accent-color);"></i>
            <h3>دعم تطبيق نورك</h3>
            <p>مساهمتك تساعدنا على الاستمرار وتطوير التطبيق</p>
            <button class="btn-pay" onclick="payPi(0.1)">تبرع بـ 0.1 Pi</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('quran')"><i class="fas fa-quran"></i>القرآن</div>
        <div class="nav-item" onclick="showPage('subha')"><i class="fas fa-fingerprint"></i>المسبحة</div>
        <div class="nav-item" onclick="showPage('support')"><i class="fas fa-heart"></i>دعم نورك</div>
    </nav>

    <script>
        const Pi = window.Pi;
        let count = 0;
        let currentFontSize = 18;

        // 1. تهيئة Pi SDK وسحب اسم المستخدم
        async function initPi() {
            try {
                await Pi.init({ version: "2.0", sandbox: false });
                const auth = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
                document.getElementById('username-display').innerText = auth.user.username;
            } catch (err) {
                console.error(err);
                // إذا لم يفتح من Pi Browser تظهر رسالة احترافية
                if(!window.Pi) {
                    alert("للحصول على كامل مميزات نورك وسحب هويتك، يرجى فتح التطبيق من متصفح Pi Browser");
                }
            }
        }

        // 2. وظيفة الدفع
        async function payPi(amount) {
            try {
                const payment = await Pi.createPayment({
                    amount: amount,
                    memo: "دعم تطبيق نورك - صدقة جارية",
                    metadata: { type: "donation" },
                }, {
                    onReadyForServerApproval: (id) => console.log("Approved:", id),
                    onReadyForServerCompletion: (id, tx) => alert("تقبل الله منك! تم الدفع بنجاح"),
                    onCancel: (id) => console.log("Canceled"),
                    onError: (err) => alert("حدث خطأ في عملية الدفع"),
                });
            } catch (err) {
                alert("يرجى التأكد من الاتصال بـ Pi Browser");
            }
        }

        function onIncompletePaymentFound(payment) { /* للتعامل مع العمليات المعلقة */ }

        // 3. وظائف المسبحة والتنقل
        function incrementCounter() {
            count++;
            document.getElementById('counter').innerText = count;
            if ('vibrate' in navigator) navigator.vibrate(50);
        }

        function resetCounter() {
            count = 0;
            document.getElementById('counter').innerText = count;
        }

        function showPage(pageId) {
            document.getElementById('quran-page').style.display = pageId === 'quran' ? 'block' : 'none';
            document.getElementById('subha-page').style.display = pageId === 'subha' ? 'block' : 'none';
            document.getElementById('support-page').style.display = pageId === 'support' ? 'block' : 'none';
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function toggleSection(id) {
            const list = document.getElementById(id);
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
        }

        function changeFontSize(delta) {
            currentFontSize += delta;
            document.getElementById('quran-page').style.fontSize = currentFontSize + 'px';
        }

        function saveBookmark() {
            alert("تم حفظ مكان القراءة بنجاح");
        }

        // تشغيل التهيئة عند التحميل
        window.onload = initPi;
    </script>
</body>
</html>
