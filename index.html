<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - Noork</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --accent: #bb86fc; --text: #f0f0f0; }
        .light-mode { --bg: #f5f5f5; --card: #ffffff; --accent: #6200ee; --text: #000000; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; transition: 0.3s; margin: 0; padding-bottom: 70px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-bottom: 1px solid var(--accent); }
        .content { padding: 20px; text-align: center; }
        .counter-box { font-size: 5rem; font-weight: bold; margin: 20px 0; color: var(--accent); }
        .main-btn { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto; cursor: pointer; user-select: none; }
        .main-btn:active { transform: scale(0.95); background: var(--accent); color: white; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { flex: 1; text-align: center; font-size: 0.8rem; cursor: pointer; color: #888; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 3px; }
        .settings-panel { display: none; padding: 20px; }
    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-cog" onclick="showSettings()"></i>
    <h2 style="margin:0;">نورك</h2>
    <span id="username">تحميل...</span>
</div>

<div id="main_content" class="content">
    <div id="sebha_view">
        <div class="counter-box" id="count">0</div>
        <div class="main-btn" onclick="increment()">سبّح</div>
        <br>
        <button onclick="resetCounter()" style="background:none; border:1px solid #888; color:#888; padding:5px 15px; border-radius:15px;">تصفير العداد</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item" onclick="showQuran()"><i class="fas fa-book"></i>القرآن</div>
    <div class="nav-item" onclick="showAzkar()"><i class="fas fa-moon"></i>الأذكار</div>
    <div class="nav-item active" onclick="location.reload()"><i class="fas fa-fingerprint"></i>المسبحة</div>
    <div class="nav-item" onclick="handlePayment()" style="color: gold;"><i class="fas fa-heart"></i>دعم</div>
</nav>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    // سحب اسم المستخدم
    async function initPi() {
        try {
            const auth = await Pi.authenticate(['username', 'payments'], onIncompletePayment);
            document.getElementById('username').innerText = auth.user.username;
        } catch (err) {
            console.error(err);
        }
    }

    // العداد والمسبحة
    let counter = localStorage.getItem('count') || 0;
    document.getElementById('count').innerText = counter;

    function increment() {
        counter++;
        document.getElementById('count').innerText = counter;
        localStorage.setItem('count', counter);
        if(navigator.vibrate) navigator.vibrate(50);
    }

    function resetCounter() {
        counter = 0;
        document.getElementById('count').innerText = counter;
        localStorage.setItem('count', 0);
    }

    // الإضاءة (Dark/Light Mode)
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
    }

    // الدفع والربط بشبكة باي
    async function handlePayment() {
        try {
            const payment = await Pi.createPayment({
                amount: 1, 
                memo: "دعم مشروع نورك",
                metadata: { type: "donation" }
            }, {
                onReadyForServerApproval: (id) => {
                    return fetch('/api/approve', { // الربط مع ملف approve.js في جيتهاب
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: id })
                    });
                },
                onReadyForServerCompletion: (id, txid) => {
                    return fetch('/api/complete', { // الربط مع ملف complete.js في جيتهاب
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: id, txid: txid })
                    });
                },
                onCancel: (id) => { console.log("Payment Cancelled"); },
                onError: (error, id) => { console.error("Payment Error", error); }
            });
        } catch (e) {
            alert("يرجى فتح التطبيق من داخل Pi Browser");
        }
    }

    function onIncompletePayment(payment) { /* للتعامل مع أي دفع معلق */ }

    window.onload = initPi;
</script>
</body>
</html>
