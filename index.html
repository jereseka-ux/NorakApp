<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - الإصدار الاحترافي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0a1a; --card: #1e162d; --accent: #bb86fc; --text: #e0e0e0; --pay: #fed900; }
        .light-mode { --bg: #f9f9f9; --card: #ffffff; --accent: #6200ee; --text: #121212; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; transition: 0.3s; }
        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .user-badge { background: rgba(187, 134, 252, 0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--accent); font-size: 0.85em; }
        
        .page { display: none; padding: 15px; animation: fadeIn 0.5s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(187, 134, 252, 0.1); }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        
        .quran-text { font-family: 'Amiri', serif; font-size: 1.4em; line-height: 2.2; text-align: center; white-space: pre-wrap; }
        .btn-action { background: var(--card); border: 1px solid var(--accent); color: var(--text); padding: 10px; border-radius: 8px; cursor: pointer; margin: 5px; }
        
        .subha-circle { width: 180px; height: 180px; border: 8px solid var(--accent); border-radius: 50%; margin: 40px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 3em; cursor: pointer; transition: 0.1s; }
        .subha-circle:active { transform: scale(0.95); background: rgba(187, 134, 252, 0.1); }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--accent); }
        .nav-item { color: #888; text-align: center; font-size: 0.75em; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .nav-item i { display: block; font-size: 1.4em; margin-bottom: 4px; }
    </style>
</head>
<body>

<header>
    <div class="user-badge"><i class="fas fa-user-circle"></i> <span id="username">تحقق...</span></div>
    <div style="font-family:'Amiri'; font-size: 1.4em; color: var(--accent);">نُورك</div>
    <i class="fas fa-moon" id="theme-icon" onclick="toggleTheme()" style="cursor:pointer;"></i>
</header>

<div id="quran-p" class="page active-page">
    <div id="quran-viewer" style="display:none;">
        <button class="btn-action" onclick="closeViewer()"><i class="fas fa-arrow-right"></i> عودة للفهرس</button>
        <div class="card quran-text" id="content-box"></div>
    </div>
    <div id="fihris-list">
        <h3><i class="fas fa-list-ol"></i> فهرس الأجزاء (30 جزء)</h3>
        </div>
</div>

<div id="azkar-p" class="page">
    <h3><i class="fas fa-pray"></i> الأذكار والأدعية</h3>
    <div class="card item-row" onclick="showZikr('صباح')">أذكار الصباح <i class="fas fa-sun"></i></div>
    <div class="card item-row" onclick="showZikr('مساء')">أذكار المساء <i class="fas fa-moon"></i></div>
    <div class="card item-row" onclick="showZikr('نوم')">أذكار النوم <i class="fas fa-bed"></i></div>
    <div class="card item-row" onclick="showZikr('رقية')">الرقية الشرعية <i class="fas fa-shield-alt"></i></div>
</div>

<div id="subha-p" class="page" style="text-align:center;">
    <div class="subha-circle" onclick="countUp()">
        <span id="counter-val">0</span>
        <small style="font-size: 0.3em; margin-top: 5px;">تبيح</small>
    </div>
    <button class="btn-action" onclick="resetCount()">إعادة تصفير</button>
</div>

<div id="pay-p" class="page" style="text-align:center;">
    <div class="card">
        <i class="fas fa-gem" style="font-size: 3em; color: var(--pay);"></i>
        <h2>دعم تطبيق نورك</h2>
        <p>فعل النسخة الكاملة وساهم في استمرار التطبيق</p>
        <button onclick="requestPayment()" style="background:var(--pay); color:#000; border:none; padding:15px 40px; border-radius:30px; font-weight:bold; width:100%; cursor:pointer;">دفع 0.1 Pi</button>
        <p id="pay-log" style="margin-top:20px; font-size:0.8em; color:var(--accent);"></p>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="navTo('quran-p', this)"><i class="fas fa-book-open"></i>القرآن</div>
    <div class="nav-item" onclick="navTo('azkar-p', this)"><i class="fas fa-hands"></i>الأذكار</div>
    <div class="nav-item" onclick="navTo('subha-p', this)"><i class="fas fa-fingerprint"></i>المسبحة</div>
    <div class="nav-item" onclick="navTo('pay-p', this)"><i class="fas fa-wallet"></i>الدفع</div>
</nav>

<script>
    const Pi = window.Pi;
    let count = localStorage.getItem('subha_val') || 0;
    
    // بيانات الأذكار (جزء من المحتوى الثابت)
    const azkarData = {
        'صباح': "أصبحنا وأصبح الملك لله والحمد لله...\nآية الكرسي\nسورة الإخلاص (3 مرات)\nالمعوذتين (3 مرات)",
        'مساء': "أمسينا وأمسى الملك لله والحمد لله...\nآية الكرسي\nخواتيم سورة البقرة",
        'رقية': "بِسْمِ اللَّهِ أَرْقِيكَ، مِنْ كُلِّ شَيْءٍ يُؤْذِيكَ...\nالفاتحة\nآية الكرسي\nالإخلاص والمعوذتين"
    };

    async function init() {
        try {
            await Pi.init({ version: "2.0", sandbox: false });
            const auth = await Pi.authenticate(['username', 'payments'], onIncompletePayment);
            document.getElementById('username').innerText = auth.user.username;
        } catch (e) { document.getElementById('username').innerText = "زائر"; }
        
        loadFihris();
        document.getElementById('counter-val').innerText = count;
    }

    function loadFihris() {
        const list = document.getElementById('fihris-list');
        for(let i=1; i<=30; i++) {
            list.innerHTML += `
                <div class="card item-row" onclick="loadJuz(${i})">
                    <span>الجزء رقم ${i}</span>
                    <i class="fas fa-chevron-left"></i>
                </div>`;
        }
    }

    function loadJuz(id) {
        document.getElementById('fihris-list').style.display = 'none';
        const viewer = document.getElementById('quran-viewer');
        viewer.style.display = 'block';
        document.getElementById('content-box').innerText = `بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ\n\n نَص الجزء رقم ${id} كاملاً يتم عرضه هنا من قاعدة البيانات الداخلية...`;
    }

    function showZikr(type) {
        navTo('quran-p'); 
        document.getElementById('fihris-list').style.display = 'none';
        document.getElementById('quran-viewer').style.display = 'block';
        document.getElementById('content-box').innerText = azkarData[type] || "قريباً...";
    }

    function closeViewer() {
        document.getElementById('quran-viewer').style.display = 'none';
        document.getElementById('fihris-list').style.display = 'block';
    }

    function navTo(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    }

    function countUp() {
        count++;
        document.getElementById('counter-val').innerText = count;
        localStorage.setItem('subha_val', count);
        if(navigator.vibrate) navigator.vibrate(50);
    }

    function resetCount() { count = 0; document.getElementById('counter-val').innerText = 0; localStorage.setItem('subha_val', 0); }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const icon = document.getElementById('theme-icon');
        icon.classList.toggle('fa-moon');
        icon.classList.toggle('fa-sun');
    }

    async function requestPayment() {
        const log = document.getElementById('pay-log');
        log.innerText = "جاري الاتصال بالمحفظة...";
        try {
            const payment = await Pi.createPayment({
                amount: 0.1, memo: "دعم تطبيق نورك جزاك الله خيراً", metadata: { type: "donation" }
            }, {
                onReadyForServerApproval: (id) => { log.innerText = "تمت الموافقة.. في انتظار معالجة الخادم"; },
                onReadyForServerCompletion: (id, tx) => { log.innerText = "تم الدفع بنجاح! شكراً لك"; },
                onCancel: (id) => { log.innerText = "تم إلغاء العملية"; },
                onError: (e) => { log.innerText = "حدث خطأ: " + e.message; }
            });
        } catch (e) { log.innerText = "افتح التطبيق من Pi Browser"; }
    }

    function onIncompletePayment(payment) { /* لمعالجة المدفوعات المعلقة */ }

    window.onload = init;
</script>
</body>
</html>
