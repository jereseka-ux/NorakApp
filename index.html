<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - النسخة الاحترافية الشاملة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0a1a; --card: #1e162d; --accent: #bb86fc; --text: #e0e0e0; --pay: #fed900; }
        .light-mode { --bg: #fdfdfd; --card: #ffffff; --accent: #6200ee; --text: #1a1a1a; }
        
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; transition: 0.4s; }
        header { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .app-title { font-family: 'Amiri', serif; font-size: 1.8em; color: var(--accent); margin: 0; }
        .user-info { background: rgba(187, 134, 252, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--accent); font-size: 0.85em; }

        /* الأذكار */
        .card { background: var(--card); margin: 15px; padding: 20px; border-radius: 15px; border-right: 5px solid var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .dhikr-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1.1em; line-height: 1.7; position: relative; }
        .dhikr-count { background: var(--accent); color: white; min-width: 25px; height: 25px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.8em; margin-left: 10px; }

        /* الفهرس المطور */
        .juz-btn { width: calc(100% - 30px); margin: 5px 15px; padding: 15px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: var(--text); text-align: right; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; }
        .surah-list { display: none; margin: 0 15px; padding: 10px; background: rgba(0,0,0,0.1); border-radius: 0 0 10px 10px; }
        .surah-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text); text-decoration: none; }

        /* المسبحة */
        .tasbih-container { text-align: center; padding: 30px; }
        .tasbih-btn { width: 180px; height: 180px; border: 8px solid var(--accent); border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 4em; cursor: pointer; background: var(--card); box-shadow: 0 0 30px rgba(187,134,252,0.2); }

        /* أزرار السيتنجس */
        .settings-row { display: flex; justify-content: center; gap: 15px; margin: 15px; }
        .set-btn { background: var(--card); border: 1px solid var(--accent); color: var(--text); width: 40px; height: 40px; border-radius: 10px; cursor: pointer; }

        /* الدفع */
        .pay-action { background: var(--pay); color: #44115b; border: none; padding: 15px 50px; border-radius: 35px; font-weight: bold; font-size: 1.2em; cursor: pointer; margin: 20px auto; display: block; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--accent); }
        .nav-btn { color: #777; text-align: center; font-size: 0.8em; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn i { display: block; font-size: 1.7em; margin-bottom: 4px; }
    </style>
</head>
<body>

<header>
    <div class="user-info"><i class="fas fa-user-circle"></i> <span id="pi-user">جاري التحميل...</span></div>
    <h1 class="app-title">نورك</h1>
    <i class="fas fa-circle-half-stroke" onclick="toggleTheme()" style="cursor:pointer; font-size: 1.4em; color: var(--accent);"></i>
</header>

<div id="quran-p" class="page">
    <div class="settings-row">
        <button class="set-btn" onclick="fontS(-2)">-</button>
        <button class="set-btn" onclick="fontS(2)">+</button>
        <button class="set-btn" onclick="saveB()"><i class="fas fa-bookmark"></i></button>
    </div>
    <div id="index-content"></div>
</div>

<div id="dhikr-p" class="page" style="display:none;">
    <div class="card">
        <h3>أذكار الصباح والمساء</h3>
        <div class="dhikr-item"><span class="dhikr-count">1</span> آية الكرسي</div>
        <div class="dhikr-item"><span class="dhikr-count">3</span> سورة الإخلاص والمعوذتين</div>
        <div class="dhikr-item"><span class="dhikr-count">1</span> سيد الاستغفار</div>
        <div class="dhikr-item"><span class="dhikr-count">100</span> سبحان الله وبحمده</div>
    </div>
</div>

<div id="subha-p" class="page" style="display:none;">
    <div class="tasbih-container">
        <div class="tasbih-btn" id="t-count" onclick="tally()">0</div>
        <button onclick="resT()" style="background:none; border:1px solid #555; color:#888; padding:5px 20px; border-radius:20px;">تصفير</button>
    </div>
</div>

<div id="pay-p" class="page" style="display:none; text-align:center; padding:50px 20px;">
    <i class="fas fa-gem fa-4x" style="color:var(--accent); margin-bottom:20px;"></i>
    <h2>تفعيل مميزات نورك</h2>
    <p>دعمك بـ 0.1 Pi يضمن استمرار التطبيق وتحديث المكتبة الخارجية.</p>
    <button class="pay-action" onclick="payPi()">دفع 0.1 Pi</button>
</div>

<nav>
    <div class="nav-btn active" onclick="go('quran-p')"><i class="fas fa-book-quran"></i>القرآن</div>
    <div class="nav-btn" onclick="go('dhikr-p')"><i class="fas fa-hands-praying"></i>الأذكار</div>
    <div class="nav-btn" onclick="go('subha-p')"><i class="fas fa-fingerprint"></i>المسبحة</div>
    <div class="nav-btn" onclick="go('pay-p')"><i class="fas fa-wallet"></i>دعم نورك</div>
</nav>

<script>
    const Pi = window.Pi;
    let tc = 0; let fs = 18;

    async function initPi() {
        try {
            await Pi.init({ version: "2.0", sandbox: false });
            const auth = await Pi.authenticate(['username', 'payments'], onIncomplete);
            document.getElementById('pi-user').innerText = auth.user.username;
        } catch (e) { document.getElementById('pi-user').innerText = "زائر نورك"; }
        loadIndex();
    }

    function loadIndex() {
        const cont = document.getElementById('index-content');
        const names = ["الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس"];
        for (let i = 1; i <= 30; i++) {
            cont.innerHTML += `
                <button class="juz-btn" onclick="togJ(${i})">الجزء ${i} <i class="fas fa-angle-down"></i></button>
                <div id="juz-${i}" class="surah-list">
                    <div class="surah-row"><span>${names[i-1] || 'سورة من الجزء'}</span> <span>ص ${i*20}</span></div>
                </div>`;
        }
    }

    async function payPi() {
        try {
            await Pi.createPayment({
                amount: 0.1, memo: "دعم تطبيق نورك", metadata: { uid: Date.now() }
            }, {
                onReadyForServerApproval: (id) => console.log(id),
                onReadyForServerCompletion: (id, tx) => alert("شكراً لدعمك!"),
                onCancel: (id) => {}, onError: (e) => alert("خطأ في الدفع")
            });
        } catch (err) { alert("افتح من Pi Browser"); }
    }

    function onIncomplete(p) {}
    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function fontS(v) { fs += v; document.getElementById('quran-p').style.fontSize = fs + 'px'; }
    function saveB() { alert("تم حفظ موضع القراءة!"); }
    function togJ(id) { const el = document.getElementById(`juz-${id}`); el.style.display = (el.style.display==='block')?'none':'block'; }
    function tally() { tc++; document.getElementById('t-count').innerText = tc; if(navigator.vibrate) navigator.vibrate(40); }
    function resT() { tc = 0; document.getElementById('t-count').innerText = 0; }
    function go(p) { 
        document.querySelectorAll('.page').forEach(x => x.style.display = 'none');
        document.getElementById(p).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
    window.onload = initPi;
</script>
</body>
</html>
