<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نورك | المصحف الشامل</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --bg: #f8f9fa; --card: #ffffff; --t: #2d3436; }
        body.dark { --bg: #121212; --card: #1e1e1e; --t: #f5f5f5; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.2s; }
        body { background: var(--bg); color: var(--t); margin: 0; padding-bottom: 80px; }
        header { background: var(--p); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 25px 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .search { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin: -20px 0 20px 0; outline: none; background: var(--card); color: var(--t); }
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid rgba(0,0,0,0.05); }
        #reader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .r-head { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .r-body { flex: 1; padding: 25px; overflow-y: auto; text-align: center; line-height: 2.2; font-family: 'Amiri', serif; font-size: 24px; }
        .tab-content { display: none; } .active-tab { display: block; }
        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #eee; }
        .nav-item { cursor: pointer; color: #999; font-size: 0.8rem; text-align: center; flex: 1; font-weight: bold; }
        .nav-item.active { color: var(--p); }
        .btn-pi { background: #f1c40f; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .sebha-btn { background: var(--p); color: white; width: 120px; height: 120px; border-radius: 60px; border: 8px solid rgba(255,255,255,0.2); font-size: 2rem; margin: 30px auto; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0">نُورك</h1>
    <p style="margin:5px 0 0; opacity:0.8">المصحف الشامل والأذكار</p>
</header>

<div class="container">
    <input type="text" class="search" id="mainSearch" placeholder="ابحث عن سورة أو ذكر..." onkeyup="search()">

    <div id="tab-quran" class="tab-content active-tab">
        <h3 style="border-right: 4px solid var(--p); padding-right:10px">📖 المصحف الشريف (114 سورة)</h3>
        <div id="quran-list">جاري تحميل الفهرس...</div>
    </div>

    <div id="tab-azkar" class="tab-content">
        <h3 style="border-right: 4px solid var(--p); padding-right:10px">📿 السبحة الإلكترونية</h3>
        <div class="card" style="display:block; text-align:center">
            <div class="sebha-btn" onclick="countSubhan()">
                <span id="sebha-count">0</span>
            </div>
            <p onclick="resetSubhan()" style="color:red; cursor:pointer">تصفير العداد</p>
        </div>
        <div id="azkar-list"></div>
    </div>

    <div id="tab-settings" class="tab-content">
        <h3 style="border-right: 4px solid var(--p); padding-right:10px">⚙️ الإعدادات والدفع</h3>
        <div class="card" style="display:block; text-align:center; border: 2px dashed #f1c40f">
            <h4>دعم التطبيق عبر Pi</h4>
            <button class="btn-pi" onclick="payPi()">تفعيل النسخة الكاملة (1 Pi)</button>
        </div>
        <div class="card" onclick="document.body.classList.toggle('dark')">
            <span>الوضع الليلي</span><span>🌙</span>
        </div>
        <div class="card" style="display:block">
            <span>حجم الخط: <b id="fz-v">24</b></span>
            <input type="range" min="20" max="45" value="24" style="width:100%" oninput="changeFontSize(this.value)">
        </div>
    </div>
</div>

<div id="reader">
    <div class="r-head">
        <span onclick="closeReader()" style="cursor:pointer; font-size:1.5rem">✕</span>
        <b id="r-title"></b>
        <span onclick="saveMark()" style="cursor:pointer">🔖</span>
    </div>
    <div id="r-body" class="r-body"></div>
</div>

<nav>
    <div class="nav-item active" onclick="switchTab('quran', this)">📖<br>القرآن</div>
    <div class="nav-item" onclick="switchTab('azkar', this)">📿<br>الأذكار</div>
    <div class="nav-item" onclick="switchTab('settings', this)">⚙️<br>الإعدادات</div>
</nav>

<script>
    let surahs = [];
    let count = 0;

    // تحميل الفهرس الكامل (114 سورة) من API خارجي سريع جداً
    async function loadQuran() {
        try {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const json = await res.json();
            surahs = json.data;
            displayQuran();
        } catch (e) {
            document.getElementById('quran-list').innerText = "تأكد من الاتصال بالإنترنت";
        }
    }

    function displayQuran() {
        document.getElementById('quran-list').innerHTML = surahs.map(s => `
            <div class="card surah-card" onclick="readSurah(${s.number}, '${s.name}')">
                <b>${s.number} - ${s.name}</b>
                <span style="font-size:0.8rem; color:#888">${s.numberOfAyahs} آية</span>
            </div>
        `).join('');
    }

    async function readSurah(num, name) {
        document.getElementById('r-body').innerText = "جاري تحميل السورة...";
        document.getElementById('reader').style.display = 'flex';
        document.getElementById('r-title').innerText = "سورة " + name;
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}`);
        const json = await res.json();
        const text = json.data.ayahs.map(a => `${a.text} (${a.numberInSurah})`).join(' ');
        document.getElementById('r-body').innerText = text;
    }

    function switchTab(t, el) {
        document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active-tab'));
        document.getElementById('tab-' + t).classList.add('active-tab');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    function countSubhan() { count++; document.getElementById('sebha-count').innerText = count; }
    function resetSubhan() { count = 0; document.getElementById('sebha-count').innerText = count; }
    function closeReader() { document.getElementById('reader').style.display = 'none'; }
    function changeFontSize(v) { document.getElementById('fz-v').innerText = v; document.getElementById('r-body').style.fontSize = v + 'px'; }
    
    function search() {
        let val = document.getElementById('mainSearch').value;
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.includes(val) ? "flex" : "none";
        });
    }

    function payPi() {
        try {
            Pi.createPayment({ amount: 1, memo: "دعم تطبيق نورك", metadata: {id: "1"} }, {
                onReadyForServerApproval: (id) => console.log(id),
                onReadyForServerCompletion: (id, tx) => alert("تم التفعيل!"),
                onCancel: (id) => alert("تم الإلغاء"),
                onError: (e) => alert("افتح من داخل Pi Browser")
            });
        } catch(e) { alert("افتح من داخل Pi Browser"); }
    }

    window.onload = () => {
        loadQuran();
        try { Pi.init({ version: "2.0" }); } catch(e){}
    };
</script>
</body>
</html>
