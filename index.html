<script>
    const Pi = window.Pi;
    Pi.init({ version: "1.5", sandbox: true });

    function tab(id, el) {
        document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        el.classList.add('active');
    }

    async function startPay() {
        const st = document.getElementById('st');

        try {
            st.innerText = "جاري الاتصال بـ Pi...";

            const auth = await Pi.authenticate(['payments', 'username'], (inc) => {});
            const user = auth.user.username;

            st.innerText = "أهلاً " + user + " 👋 جاري إنشاء الدفع...";

            await Pi.createPayment({
                amount: 0.5,
                memo: "فتح السور والمحتوى الكامل - نورك",
                metadata: { upgrade: "full_access", user: user }
            }, {
                onReadyForServerApproval: async (pid) => {
                    st.innerText = "جاري تأكيد الدفع من السيرفر...";

                    try {
                        const res = await fetch('https://norak-app.vercel.app/api/approve', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ paymentId: pid })
                        });

                        if (!res.ok) throw new Error("Approve failed");

                    } catch (err) {
                        st.innerText = "فشل تأكيد الدفع ❌";
                        console.error(err);
                    }
                },

                onReadyForServerCompletion: async (pid, tx) => {
                    st.innerText = "جاري إكمال العملية...";

                    try {
                        const res = await fetch('https://norak-app.vercel.app/api/complete', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ paymentId: pid, txid: tx })
                        });

                        if (!res.ok) throw new Error("Completion failed");

                        // ✅ التفعيل الحقيقي
                        document.getElementById('p-box').innerHTML =
                            "<b style='color:green'>✔ تم التفعيل! كل السور مفتوحة الآن</b>";

                        // فتح المحتوى
                        document.querySelectorAll('.lock').forEach(el => {
                            el.innerHTML = "عرض المحتوى ✅";
                            el.style.color = "green";
                        });

                        alert("تم الدفع بنجاح 🎉");

                    } catch (err) {
                        st.innerText = "فشل إكمال العملية ❌";
                        console.error(err);
                    }
                },

                onCancel: () => {
                    st.innerText = "تم إلغاء العملية ❌";
                },

                onError: (e) => {
                    st.innerText = "خطأ في الدفع ❌";
                    console.error(e);
                }
            });

        } catch (e) {
            st.innerText = "افتح التطبيق من Pi Browser ❗";
        }
    }
</script>
