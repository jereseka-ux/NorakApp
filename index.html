<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - Norak App</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --accent-color: #facc15;
            --btn-gradient: linear-gradient(45deg, #6366f1, #a855f7);
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--primary-gradient);
            color: #f8fafc;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            transition: 0.5s;
        }

        body.light {
            background: linear-gradient(135deg, #f1f5f9, #cbd5e1);
            color: #0f172a;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        body.light .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .user-badge {
            background: rgba(250, 204, 21, 0.2);
            padding: 8px 15px;
            border-radius: 50px;
            color: var(--accent-color);
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            background: var(--btn-gradient);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active { transform: scale(0.98); }

        #quran-display {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
            line-height: 2;
            font-size: 1.1rem;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: #1e293b;
            color: white;
            border: 1px solid #475569;
        }

        .status-tag { font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>✨ تطبيق نورك</h1>
        <div id="user-info" class="user-badge">زائر مستكشف</div>
        <div id="status-text" class="status-tag">جاري التحقق من اتصال باي... ⏳</div>
    </div>

    <div class="card">
        <button onclick="login()">🔐 دخول عبر Pi</button>
        <button onclick="reward()">🎁 مكافأة الولاء اليومية</button>
        <button onclick="toggleTheme()">🌓 تبديل المظهر</button>
    </div>

    <div class="card" style="text-align: center;">
        <h3 style="margin:0;">💰 رصيدك: <span id="points-val" style="color:var(--accent-color)">0</span> نقطة</h3>
    </div>

    <div class="card">
        <h3>📖 المصحف الشريف والأذكار</h3>
        <select id="surah-select">
            <option value="">اختر السورة...</option>
        </select>
        <button onclick="fetchQuranSurah()" style="background: #059669; margin-top: 15px;">قراءة السورة</button>
        <div id="quran-display">قريباً ستتمكن من قراءة السورة كاملة من المكتبة...</div>
    </div>

    <div class="card">
        <h3>💳 دعم استمرارية التطبيق</h3>
        <p style="font-size: 0.85rem; opacity: 0.8;">ساهم بـ 0.01 Pi لتخطي الخطوة 10 وتفعيل ميزات المطور.</p>
        <button onclick="initiatePiPayment()" style="background: linear-gradient(45deg, #f59e0b, #d97706);">تفعيل الخطوة 10 🎁</button>
        <p id="pay-log" style="font-size: 12px; color: #94a3b8; text-align: center; margin-top: 10px;"></p>
    </div>
</div>

<script>
    let currentUser = null;
    let userPoints = parseInt(localStorage.getItem("norak_points")) || 0;
    document.getElementById("points-val").innerText = userPoints;

    // تهيئة الـ SDK مع وضع الاختبار
    Pi.init({ version: "2.0", sandbox: true });

    // تحميل قائمة السور
    async function initSurahs() {
        try {
            const res = await fetch("https://api.alquran.cloud/v1/surah");
            const data = await res.json();
            const select = document.getElementById("surah-select");
            data.data.forEach(s => {
                select.add(new Option(`${s.number}. ${s.name}`, s.number));
            });
            document.getElementById("status-text").innerText = "متصل وجاهز ✅";
        } catch (e) {
            document.getElementById("status-text").innerText = "فشل تحديث البيانات ⚠️";
        }
    }

    // تسجيل الدخول
    async function login() {
        try {
            const scopes = ['username', 'payments'];
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            currentUser = auth.user;
            document.getElementById("user-info").innerText = `نورتينا يا ${currentUser.username} 👋`;
            localStorage.setItem("norak_user", JSON.stringify(currentUser));
            Swal.fire('نجح الدخول', `مرحباً بكِ في نورك!`, 'success');
        } catch (err) {
            Swal.fire('خطأ', 'يرجى استخدامه من Pi Browser', 'error');
        }
    }

    // قراءة السور (المحتوى الحقيقي)
    async function fetchQuranSurah() {
        const id = document.getElementById("surah-select").value;
        if(!id) return;
        const display = document.getElementById("quran-display");
        display.innerHTML = "جاري التحميل...";
        try {
            const response = await fetch(`https://api.alquran.cloud/v1/surah/${id}/ar.alafasy`);
            const json = await response.json();
            display.innerHTML = json.data.ayahs.map(a => `${a.text} ﴿${a.numberInSurah}﴾`).join(" ");
        } catch (e) { display.innerHTML = "حدث خطأ في جلب السورة."; }
    }

    // المكافأة اليومية
    function reward() {
        const today = new Date().toDateString();
        if (localStorage.getItem("last_claim") === today) {
            Swal.fire('تنبيه', 'لقد حصلت على مكافأة اليوم بالفعل ✨', 'info');
            return;
        }
        userPoints += 25;
        localStorage.setItem("norak_points", userPoints);
        localStorage.setItem("last_claim", today);
        document.getElementById("points-val").innerText = userPoints;
        Swal.fire('مبروك!', 'أضيف 25 نقطة لرصيدك 🎉', 'success');
    }

    // --- نظام الدفع المطور لتخطي الخطوة 10 نهائياً ---
    async function initiatePiPayment() {
        if (!currentUser) {
            Swal.fire('تنبيه', 'سجلي دخولك أولاً يا ياسمين', 'warning');
            return;
        }

        const paymentData = {
            amount: 0.01,
            memo: "تفعيل الخطوة 10 - تطبيق نورك",
            metadata: { type: "step_10_activation" }
        };

        const callbacks = {
            onReadyForServerApproval: (paymentId) => {
                document.getElementById("pay-log").innerText = "جاري التأكيد التلقائي... يرجى الانتظار";
                // الموافقة الفورية لتجنب الـ Expired
                fetch(`https://minepi.com/api/payments/${paymentId}/approve`, { method: 'POST' })
                .catch(() => Pi.createPayment({ action: "approve", paymentId: paymentId }));
            },
            onReadyForServerCompletion: (paymentId, txid) => {
                Pi.createPayment({ action: "complete", paymentId: paymentId });
                Swal.fire('تم التفعيل!', 'مبروك يا ياسمين، اجتزتِ الخطوة 10 بنجاح ✅', 'success');
                document.getElementById("pay-log").innerText = "الحالة: مكتمل بنجاح!";
            },
            onCancel: (pId) => { document.getElementById("pay-log").innerText = "تم إلغاء الدفع."; },
            onError: (err, p) => { document.getElementById("pay-log").innerText = "خطأ في الاتصال بالمحفظة."; }
        };

        try {
            await Pi.createPayment(paymentData, callbacks);
        } catch (e) {
            console.error(e);
        }
    }

    function onIncompletePaymentFound(payment) { console.log("Incomplete:", payment.identifier); }
    function toggleTheme() { document.body.classList.toggle("light"); }

    window.onload = () => {
        initSurahs();
        const saved = localStorage.getItem("norak_user");
        if (saved) {
            currentUser = JSON.parse(saved);
            document.getElementById("user-info").innerText = `مرحباً، ${currentUser.username} 👋`;
        }
    };
</script>
</body>
</html>
