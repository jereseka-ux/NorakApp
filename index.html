<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نورك</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#020617,#0f172a);color:white;text-align:center;margin:0;transition:0.3s;}
body.light{background:#f8fafc;color:#1e293b;}
.card{background:#1e293b;margin:15px;padding:20px;border-radius:20px;}
body.light .card{background:#ffffff;color:#1e293b;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);}
button{width:90%;margin:10px;padding:14px;border:none;border-radius:12px;background:linear-gradient(45deg,#22c55e,#4ade80);color:white;font-size:16px;cursor:pointer;}
#quran{text-align:right;line-height:2;margin-top:15px;}
</style>
</head>
<body>
<h1>✨ تطبيق نورك</h1>
<p id="status">جاري التحميل...</p>
<div class="card">
<button onclick="login()">🔐 تسجيل الدخول</button>
<button onclick="reward()">🎁 مكافأة يومية</button>
<button onclick="toggle()">🌙 الوضع</button>
</div>
<div class="card">💰 النقاط: <span id="points">0</span></div>
<div class="card">
<h3>📖 القرآن الكريم</h3>
<select id="surah" style="width:85%;padding:10px;border-radius:8px;background:#0f172a;color:white;"></select>
<button onclick="loadQuran()">عرض</button>
<div id="quran"></div>
</div>
<div class="card">
<button onclick="pay()" style="background:linear-gradient(45deg,#f59e0b,#fbbf24);">💳 دعم التطبيق (0.01 Pi)</button>
</div>

<script>
let user=null;
let points=parseInt(localStorage.getItem("p"))||0;
document.getElementById("points").innerText=points;

Pi.init({version:"2.0", sandbox: false});

fetch("https://api.alquran.cloud/v1/surah").then(r=>r.json()).then(d=>{
let s=document.getElementById("surah");
d.data.forEach(x=>{let o=document.createElement("option");o.value=x.number;o.text=x.number+" - "+x.name;s.appendChild(o);});
});
document.getElementById("status").innerText="جاهز";

async function login(){
try{
user=await Pi.authenticate(["username","payments"],(p)=>{console.log("Incomplete:",p);});
document.getElementById("status").innerText="👤 "+user.user.username;
}catch(e){alert("افتحي من Pi Browser");}
}

function reward(){
let last=localStorage.getItem("r"), t=new Date().toDateString();
if(last==t){alert("أخذتيها اليوم");return;}
points+=10; document.getElementById("points").innerText=points;
localStorage.setItem("p",points); localStorage.setItem("r",t);
alert("تمت الإضافة!");
}

function toggle(){document.body.classList.toggle("light");}

function loadQuran(){
let id=document.getElementById("surah").value; if(!id)return;
document.getElementById("quran").innerText="جاري التحميل...";
fetch("https://api.alquran.cloud/v1/surah/"+id+"/ar").then(r=>r.json()).then(d=>{
let text=""; d.data.ayahs.forEach(a=>{text+=a.text+" ("+a.numberInSurah+")<br>";});
document.getElementById("quran").innerHTML=text;
});
}

// التعديل القاتل هنا عشان نخلص من الـ Expired
async function pay(){
if(!user){alert("سجلي دخول أولاً");return;}
try {
    await Pi.createPayment({
        amount: 0.01,
        memo: "دعم نورك",
        metadata: { orderId: "n_" + Date.now() }
    }, {
        onReadyForServerApproval: (id) => {
            // هنطبع الـ ID في الكونسول بس مش هنستنى رد السيرفر عشان ميعلقش
            console.log("PaymentID:", id);
            // إحنا هنا بنقول لـ Pi إننا وافقنا "داخلياً"
        },
        onReadyForServerCompletion: (id, tx) => {
            alert("مبروك! تم الدفع");
            points+=5; document.getElementById("points").innerText=points;
            localStorage.setItem("p",points);
        },
        onCancel: () => { alert("تم الإلغاء"); },
        onError: (e) => { alert("تأكدي من الرصيد والشبكة"); }
    });
} catch (e) { alert("المحفظة لا تستجيب"); }
}
</script>
</body>
</html>
