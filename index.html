<!DOCTYPE html><html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NorakApp</title>  <!-- Manifest -->  <link rel="manifest" href="manifest.json">  <!-- Pi SDK -->  <script src="https://sdk.minepi.com/pi-sdk.js"></script>  <script>
    Pi.init({ version: "2.0" });
  </script>  <style>
    body {
      font-family: Arial;
      background: #0a0a0a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: #f4c542;
      color: black;
      font-size: 16px;
      cursor: pointer;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 15px;
      margin-top: 20px;
    }
  </style></head><body>  <h1>📖 NorakApp</h1>
  <p>تطبيق القرآن والأذكار مع دعم الدفع عبر Pi</p>  <!-- Login Button --><button onclick="login()">تسجيل الدخول بـ Pi</button>

  <!-- Payment Button --><button onclick="pay()">تبرع عبر Pi</button>

  <div class="card">
    <h2>📚 المحتوى</h2>
    <p>✔ القرآن الكريم كامل</p>
    <p>✔ أذكار الصباح والمساء</p>
    <p>✔ حفظ العلامات (Bookmark)</p>
  </div>  <script>
    let currentUser = null;

    async function login() {
      try {
        const scopes = ['username', 'payments'];
        const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
        currentUser = auth.user;
        alert("تم تسجيل الدخول: " + currentUser.username);
      } catch (err) {
        console.error(err);
        alert("فشل تسجيل الدخول");
      }
    }

    function onIncompletePaymentFound(payment) {
      console.log("Incomplete payment:", payment);
    }

    async function pay() {
      if (!currentUser) {
        alert("سجل الدخول الأول");
        return;
      }

      try {
        const payment = {
          amount: 1,
          memo: "Support NorakApp",
          metadata: { type: "donation" }
        };

        const callbacks = {
          onReadyForServerApproval: function(paymentId) {
            console.log("Ready for approval", paymentId);
          },
          onReadyForServerCompletion: function(paymentId, txid) {
            console.log("Ready for completion", paymentId, txid);
          },
          onCancel: function(paymentId) {
            console.log("Payment cancelled", paymentId);
          },
          onError: function(error, payment) {
            console.error(error);
          }
        };

        Pi.createPayment(payment, callbacks);
      } catch (err) {
        console.error(err);
      }
    }
  </script></body>
</html>
