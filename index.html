<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نورك</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
margin:0;
transition: 0.3s;
}

body.light {
background: #f8fafc;
color: #1e293b;
}

.card{
background:#1e293b;
margin:15px;
padding:20px;
border-radius:20px;
}

body.light .card {
background: #ffffff;
color: #1e293b;
box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

button{
width:90%;
margin:10px;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#22c55e,#4ade80);
color:white;
font-size:16px;
cursor: pointer;
}

#quran{
text-align:right;
line-height:2;
margin-top:15px;
}
</style>

</head>

<body>

<h1>✨ تطبيق نورك</h1>
<p id="status">جاري التحميل...</p>

<div class="card">
<button onclick="login()">🔐 تسجيل الدخول</button>
<button onclick="reward()">🎁 مكافأة يومية</button>
<button onclick="toggle()">🌙 الوضع</button>
</div>

<div class="card">
💰 النقاط: <span id="points">0</span>
</div>

<div class="card">
<h3>📖 القرآن الكريم</h3>
<select id="surah" style="width: 85%; padding: 10px; border-radius: 8px; background: #0f172a; color: white;"></select>
<button onclick="loadQuran()">عرض</button>
<div id="quran"></div>
</div>

<div class="card">
<button onclick="pay()" style="background: linear-gradient(45deg,#f59e0b,#fbbf24);">💳 دعم التطبيق (0.01 Pi)</button>
<p id="payStatus" style="font-size: 12px; margin-top: 5px; display: none;">جاري معالجة الطلب...</p>
</div>

<script>
let user=null;
let points= parseInt(localStorage.getItem("p")) || 0;
document.getElementById("points").innerText = points;

// تشغيل Pi في الوضع الحقيقي
Pi.init({version:"2.0", sandbox: false});

// تحميل السور (بدون تغيير)
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
let s=document.getElementById("surah");
d.data.forEach(x=>{
let o=document.createElement("option");
o.value=x.number;
o.text=x.number+" - "+x.name;
s.appendChild(o);
});
});

document.getElementById("status").innerText="جاهز";

// دالة تنظيف الدفع المعلق (حل مشكلة الـ Expired)
const onIncompletePaymentFound = (payment) => {
    console.log("Incomplete payment found, resolving...");
    return axios.post('https://norak-app.vercel.app/api/incomplete', { payment });
};

// تسجيل الدخول (معدل لربط الدفع)
async function login(){
try{
user = await Pi.authenticate(["username", "payments"], onIncompletePaymentFound);
document.getElementById("status").innerText="👤 "+user.user.username;
}catch(e){
alert("فشل تسجيل الدخول، تأكدي من فتح التطبيق من Pi Browser");
}
}

// مكافأة
function reward(){
let last=localStorage.getItem("r");
let t=new Date().toDateString();

if(last==t){alert("أخذتيها اليوم");return;}

points+=10;
document.getElementById("points").innerText=points;
localStorage.setItem("p", points);
localStorage.setItem("r",t);
alert("مبروك! زاد رصيدك 10 نقاط");
}

// الوضع
function toggle(){
document.body.classList.toggle("light");
}

// القرآن (بدون تغيير)
function loadQuran(){
let id=document.getElementById("surah").value;
if(!id) return;
document.getElementById("quran").innerText = "جاري تحميل الآيات...";

fetch("https://api.alquran.cloud/v1/surah/"+id+"/ar")
.then(r=>r.json())
.then(d=>{
let text="";
d.data.ayahs.forEach(a=>{
text+=a.text+" ("+a.numberInSurah+")<br>";
});
document.getElementById("quran").innerHTML=text;
});
}

// خطوة الدفع المعدلة (بدون حذف أسطر)
async function pay(){
if(!user){alert("سجلي دخول أولاً");return;}

document.getElementById("payStatus").style.display = "block";

try {
    const payment = await Pi.createPayment({
    amount: 0.01,
    memo: "دعم تطبيق نورك - تفعيل الخطوة 10",
    metadata: { orderId: "norak_pay_" + Date.now() }
    },{
    onReadyForServerApproval: (id) => {
        return axios.post('https://norak-app.vercel.app/api/approve', { paymentId: id });
    },
    onReadyForServerCompletion: (id, tx) => {
        alert("تم الدفع بنجاح! شكراً لدعمك");
        points += 5;
        document.getElementById("points").innerText = points;
        localStorage.setItem("p", points);
        document.getElementById("payStatus").style.display = "none";
        return axios.post('https://norak-app.vercel.app/api/complete', { paymentId: id, txid: tx });
    },
    onCancel: (id) => { 
        document.getElementById("payStatus").style.display = "none";
        console.log("User cancelled");
    },
    onError: (error) => { 
        alert("حدث خطأ في الدفع، تأكدي من رصيدك");
        document.getElementById("payStatus").style.display = "none";
    }
    });
} catch (err) {
    alert("عذراً، المحفظة لم تستجب");
    document.getElementById("payStatus").style.display = "none";
}
}

</script>

</body>
</html>
