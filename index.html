<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق نورك - الإصدار الاحترافي</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6c5ce7;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2d3436;
            --gold: #f1c40f;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        body.dark-mode {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #f5f5f5;
            --shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary), #a29bfe);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 40px 40px;
            box-shadow: var(--shadow);
        }

        /* البحث */
        .search-box {
            margin: -25px 20px 20px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            font-size: 1rem;
            outline: none;
        }

        /* القائمة */
        .container { padding: 0 20px; max-width: 600px; margin: auto; }
        
        .section-title { margin: 25px 0 15px; font-weight: 900; font-size: 1.3rem; border-right: 5px solid var(--primary); padding-right: 10px; }

        .item-card {
            background: var(--card);
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .item-card:active { transform: scale(0.97); }

        .idx { background: var(--primary); color: white; width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-left: 15px; }

        /* الشاشة الكاملة للقراءة */
        #reader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: none; flex-direction: column;
        }

        .reader-nav { background: var(--primary); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .reader-content {
            flex: 1; padding: 30px; overflow-y: auto; text-align: center;
            font-size: 1.5rem; line-height: 2.2; white-space: pre-wrap;
        }

        /* Navigation */
        nav {
            position: fixed; bottom: 0; width: 100%; background: var(--card);
            display: flex; justify-content: space-around; padding: 15px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); border-radius: 25px 25px 0 0;
        }

        .nav-link { text-decoration: none; color: #b2bec3; font-weight: bold; text-align: center; }
        .nav-link.active { color: var(--primary); }

        .premium-box {
            background: linear-gradient(45deg, #f1c40f, #e67e22);
            color: white; padding: 20px; border-radius: 20px; margin: 20px 0; text-align: center;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0">نُورك</h1>
    <p style="margin:5px 0 0; opacity:0.8">تطبيق القرآن الكريم والأذكار</p>
</header>

<div class="search-box">
    <input type="text" id="searchField" placeholder="ابحث عن سورة أو ذكر..." onkeyup="doSearch()">
</div>

<div class="container">
    
    <div id="quran-page" class="page">
        <div class="section-title">فهرس السور (114)</div>
        <div id="surah-list"></div>
    </div>

    <div id="azkar-page" class="page hidden">
        <div class="section-title">أذكار وأدعية حقيقية</div>
        <div id="azkar-list"></div>
    </div>

    <div id="settings-page" class="page hidden">
        <div class="premium-box">
            <h3>النسخة الذهبية ✨</h3>
            <p>افتح كل المميزات وادعم التطبيق</p>
            <button onclick="piPay()" style="background:white; border:none; padding:10px 25px; border-radius:20px; color:#d35400; font-weight:900; cursor:pointer">تفعيل بـ 1 Pi</button>
        </div>

        <div class="section-title">⚙️ الإعدادات</div>
        <div class="item-card" onclick="toggleDark()">
            <span>الوضع الليلي (Dark Mode)</span>
            <span>🌙</span>
        </div>
        <div class="item-card">
            <span>حجم الخط</span>
            <input type="range" min="16" max="40" value="24" oninput="changeFontSize(this.value)">
        </div>
    </div>

</div>

<div id="reader">
    <div class="reader-nav">
        <span onclick="closeReader()" style="font-size:1.5rem; cursor:pointer">✕</span>
        <span id="rtitle" style="font-weight:900"></span>
        <span onclick="saveMark()" style="cursor:pointer">🔖</span>
    </div>
    <div id="rcontent" class="reader-content"></div>
</div>

<nav>
    <a href="#" class="nav-link active" onclick="showPage('quran', this)">📖<br>القرآن</a>
    <a href="#" class="nav-link" onclick="showPage('azkar', this)">📿<br>الأذكار</a>
    <a href="#" class="nav-link" onclick="showPage('settings', this)">⚙️<br>الإعدادات</a>
</nav>

<script>
    // 1. بيانات السور
    const sNames = ["الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس", "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه", "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم", "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر", "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق", "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة", "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج", "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس", "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد", "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات", "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر", "المسد", "الإخلاص", "الفلق", "الناس"];

    // 2. بيانات حقيقية (أذكار كاملة وآية الكرسي كاملة)
    const azkarDB = [
        { t: "آية الكرسي", c: "اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ وَلَا يَئُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ" },
        { t: "أذكار الصباح", c: "أصبحنا وأصبح الملك لله والحمد لله، لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير. رب أسألك خير ما في هذا اليوم وخير ما بعده، وأعوذ بك من شر ما في هذا اليوم وشر ما بعده." },
        { t: "سيد الاستغفار", c: "اللهم أنت ربي لا إله إلا أنت، خلقتني وأنا عبدك، وأنا على عهدك ووعدك ما استطعت، أعوذ بك من شر ما صنعت، أبوء لك بنعمتك علي، وأبوء بذنبي فاغفر لي فإنه لا يغفر الذنوب إلا أنت." }
    ];

    const quranTexts = {
        "الفاتحة": "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ (1)\nالْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ (2) الرَّحْمَنِ الرَّحِيمِ (3) مَالِكِ يَوْمِ الدِّينِ (4) إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ (5) اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ (6) صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ (7)",
        "الإخلاص": "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ\nقُلْ هُوَ اللَّهُ أَحَدٌ (1) اللَّهُ الصَّمَدُ (2) لَمْ يَلِدْ وَلَمْ يُولَدْ (3) وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ (4)"
    };

    function loadApp() {
        // تحميل السور
        const qList = document.getElementById('surah-list');
        qList.innerHTML = sNames.map((n, i) => `
            <div class="item-card" onclick="read('${n}', '${quranTexts[n] || 'نص السورة الكامل سيكون متاحاً في التحديث القادم للنسخة الكاملة.'}')">
                <div style="display:flex; align-items:center">
                    <div class="idx">${i+1}</div>
                    <b>سورة ${n}</b>
                </div>
                <span>📖</span>
            </div>
        `).join('');

        // تحميل الأذكار
        const aList = document.getElementById('azkar-list');
        aList.innerHTML = azkarDB.map(a => `
            <div class="item-card" onclick="read('${a.t}', '${a.c}')">
                <b>${a.t}</b>
                <span>📿</span>
            </div>
        `).join('');
    }

    function showPage(p, el) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden'));
        document.getElementById(p + '-page').classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
    }

    function read(t, c) {
        document.getElementById('rtitle').innerText = t;
        document.getElementById('rcontent').innerText = c;
        document.getElementById('reader').style.display = 'flex';
    }

    function closeReader() { document.getElementById('reader').style.display = 'none'; }

    function doSearch() {
        let v = document.getElementById('searchField').value.toLowerCase();
        document.querySelectorAll('.item-card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(v) ? 'flex' : 'none';
        });
    }

    function toggleDark() { document.body.classList.toggle('dark-mode'); }
    function changeFontSize(s) { document.getElementById('rcontent').style.fontSize = s + 'px'; }
    function piPay() { alert("جاري فتح محفظة Pi..."); }

    window.onload = loadApp;
</script>
</body>
</html>
