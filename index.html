<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق نورك</title>
    <script src="https://sdk.pi.network/v2/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6a1b9a; --bg: #f8f9fa; --txt: #333; --c: #fff; }
        body.dark { --bg: #121212; --txt: #e0e0e0; --c: #1e1e1e; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; overflow-x: hidden; transition: 0.3s; }
        
        /* الهيدر */
        header { background: var(--p); color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-h { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        /* الفهرس الجانبي - إصلاح شامل */
        .side-menu { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: var(--c); z-index: 1001; transition: 0.3s ease; box-shadow: -5px 0 15px rgba(0,0,0,0.2); }
        .side-menu.open { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1000; }
        .overlay.show { display: block; }
        
        .side-header { background: var(--p); color: white; padding: 20px; font-weight: bold; text-align: center; font-size: 1.2rem; }
        .surah-list { padding: 0; overflow-y: auto; height: calc(100% - 70px); }
        .surah-item { padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; font-weight: bold; display: block; transition: 0.2s; }
        .surah-item:active { background: #f0f0f0; color: var(--p); }

        /* كارت المحتوى */
        .content-card { margin: 15px; padding: 20px; background: var(--c); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); min-height: 400px; text-align: center; }
        h2 { font-family: 'Amiri', serif; font-size: 30px; color: var(--p); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        #text-area { font-family: 'Amiri', serif; font-size: 24px; line-height: 2.2; text-align: justify; word-spacing: 2px; }

        /* الناف بار السفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--c); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; z-index: 99; }
        .nav-link { text-align: center; font-size: 12px; font-weight: bold; cursor: pointer; color: var(--txt); }
        .nav-link span { display: block; font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>

<header>
    <button class="btn-h" onclick="toggleMenu()">☰</button>
    <strong>نورك - القرآن الكريم</strong>
    <button class="btn-h" onclick="toggleDark()">🌙</button>
</header>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>
<div id="sideMenu" class="side-menu">
    <div class="side-header">فهرس السور</div>
    <div class="surah-list" id="list"></div>
</div>

<div class="content-card">
    <h2 id="sName">بِسْمِ اللَّهِ</h2>
    <div id="text-area">اختر سورة من الفهرس لتبدأ القراءة..</div>
</div>

<div class="bottom-nav">
    <div class="nav-link" onclick="save()"><span>📌</span>حفظ</div>
    <div class="nav-link" onclick="load()"><span>📖</span>العودة</div>
    <div class="nav-link" onclick="pay()" style="color: gold;"><span>π</span>تبرع</div>
</div>

<script>
    // تهيئة Pi SDK
    try { Pi.init({ version: "2.0", sandbox: true }); } catch(e){}

    // قائمة السور (أسماء مظبوطة)
    const surahs = [
        {id: 1, n: "الفاتحة", t: "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ (1) الرَّحْمَنِ الرَّحِيمِ (2) مَالِكِ يَوْمِ الدِّينِ (3) إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ (4) اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ (5) صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ (6)"},
        {id: 2, n: "البقرة", t: "الم (1) ذَلِكَ الْكِتَابُ لاَ رَيْبَ فِيهِ هُدًى لِّلْمُتَّقِينَ (2) الَّذِينَ يُؤْمِنُونَ بِالْغَيْبِ وَيُقِيمُونَ الصَّلاةَ وَمِمَّا رَزَقْنَاهُمْ يُنفِقُونَ (3)..."},
        {id: 112, n: "الإخلاص", t: "قُلْ هُوَ اللَّهُ أَحَدٌ (1) اللَّهُ الصَّمَدٌ (2) لَمْ يَلِدْ وَلَمْ يُولَدْ (3) وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ (4)"},
        {id: 113, n: "الفلق", t: "قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ (1) مِن شَرِّ مَا خَلَقَ (2) وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ (3) وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ (4) وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ (5)"},
        {id: 114, n: "الناس", t: "قُلْ أَعُوذُ بِرَبِّ النَّاسِ (1) مَلِكِ النَّاسِ (2) إِلَهِ النَّاسِ (3) مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ (4) الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ (5) مِنَ الْجِنَّةِ وَالنَّاسِ (6)"}
    ];

    const listContainer = document.getElementById('list');
    surahs.forEach(s => {
        let item = document.createElement('div');
        item.className = 'surah-item';
        item.innerText = s.id + ". سورة " + s.n;
        item.onclick = () => {
            document.getElementById('sName').innerText = "سورة " + s.n;
            document.getElementById('text-area').innerText = s.t;
            toggleMenu();
        };
        listContainer.appendChild(item);
    });

    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
    }

    function toggleDark() { document.body.classList.toggle('dark'); }

    function save() {
        localStorage.setItem('norak_mark', JSON.stringify({
            name: document.getElementById('sName').innerText,
            text: document.getElementById('text-area').innerText
        }));
        alert("تم حفظ مكانك الحالي!");
    }

    function load() {
        const saved = JSON.parse(localStorage.getItem('norak_mark'));
        if(saved) {
            document.getElementById('sName').innerText = saved.name;
            document.getElementById('text-area').innerText = saved.text;
        } else { alert("لا توجد علامة محفوظة"); }
    }

    async function pay() {
        try {
            await Pi.authenticate(['payments'], (p)=>{});
            Pi.createPayment({amount: 0.1, memo: "دعم تطبيق نورك", metadata: {id: 1}}, {
                onReadyForServerApproval: (id)=>Pi.approvePayment(id),
                onReadyForServerCompletion: (id, tx)=>Pi.completePayment(id, tx),
                onComplete: ()=>alert("تم التبرع بنجاح!"),
                onError: (e)=>alert("خطأ: " + e.message)
            });
        } catch(e){ alert("افتح من Pi Browser"); }
    }
</script>
</body>
</html>
