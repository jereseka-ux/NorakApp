<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - الإصدار الاحترافي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #2c3e50; --gold: #d4af37; --bg: #f9f9f9; --text: #333; }
        body.dark-mode { --bg: #1a1a1a; --text: #eee; --primary-color: #d4af37; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .user-welcome { color: var(--gold); font-weight: bold; font-size: 1.2rem; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-action { background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-action:hover { transform: scale(1.05); background: var(--gold); }
        .quran-container { margin-top: 20px; padding: 15px; border-radius: 10px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        body.dark-mode .quran-container { background: #333; }
        #quran-content { font-family: 'Amiri', serif; font-size: 1.5rem; line-height: 2.5; text-align: center; }
        .payment-status { margin-top: 10px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body id="appBody">

    <div class="header">
        <h1>تطبيق نورك</h1>
        <div id="userInfo" class="user-welcome">جارٍ جلب اسم المستخدم...</div>
        <button onclick="toggleMode()" class="btn-action" style="padding: 5px 15px; font-size: 0.8rem;">تغيير الإضاءة</button>
    </div>

    <div class="nav-grid">
        <button class="btn-action" onclick="fetchSurah(1)">الفهرس</button>
        <button class="btn-action" onclick="startPayment()">تفعيل المميزات (0.1 Pi)</button>
        <button class="btn-action" onclick="tasbih()">المسبحة (<span id="tasbihCount">0</span>)</button>
        <button class="btn-action" onclick="alert('قريباً: الأذكار والأدعية كاملة')">الأذكار</button>
    </div>

    <div class="quran-container">
        <div id="quran-content">اضغط على الفهرس لعرض المحتوى الحقيقي</div>
        <div id="paymentStatus" class="payment-status"></div>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        // 1. جلب اسم المستخدم الحقيقي
        async function authUser() {
            try {
                const scopes = ['username', 'payments'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                document.getElementById('userInfo').innerText = `مرحباً بك، ${auth.user.username} ✨`;
                localStorage.setItem('pi_user', auth.user.username);
            } catch (err) {
                document.getElementById('userInfo').innerText = `مرحباً بك يا زائر`;
            }
        }

        // 2. معالجة المدفوعات (ربط Approve & Complete)
        async function startPayment() {
            const paymentStatus = document.getElementById('paymentStatus');
            paymentStatus.innerText = "جارٍ تحضير عملية الدفع...";
            
            try {
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "دعم تطبيق نورك وتفعيل النسخة الكاملة",
                    metadata: { type: "premium_access" },
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        // هنا يتم الربط بملف الـ Approve في السيرفر الخاص بكِ
                        paymentStatus.innerText = "بانتظار موافقة الشبكة (Approve)...";
                        console.log("Payment ID:", paymentId);
                        // ملاحظة لياسمين: هنا الكود يرسل الإشارة لـ Pi لتوثيق المعاملة
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        paymentStatus.innerText = "تم الدفع بنجاح! جاري التفعيل (Complete)...";
                        alert("شكراً لك! تم تفعيل كافة مميزات نورك.");
                    },
                    onCancel: (paymentId) => paymentStatus.innerText = "تم إلغاء الدفع.",
                    onError: (error, payment) => paymentStatus.innerText = "خطأ في الدفع: " + error.message,
                });
            } catch (err) {
                paymentStatus.innerText = "فشلت العملية: " + err.message;
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("هناك دفع معلق، جارٍ المعالجة...");
        }

        // 3. الربط الفعلي بمكتبة القرآن (API)
        async function fetchSurah(num) {
            const content = document.getElementById('quran-content');
            content.innerText = "جارٍ التحميل من المكتبة...";
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}`);
                const data = await res.json();
                let verses = data.data.ayahs.map(a => a.text).join(" ﴿" + "﴾ ");
                content.innerText = verses;
                localStorage.setItem('last_surah', num);
            } catch (err) {
                content.innerText = "عذراً، فشل الاتصال بالمكتبة الخارجية.";
            }
        }

        // 4. إضافات ذكية (مسبحة + إضاءة)
        let count = parseInt(localStorage.getItem('tasbih_val')) || 0;
        document.getElementById('tasbihCount').innerText = count;

        function tasbih() {
            count++;
            document.getElementById('tasbihCount').innerText = count;
            localStorage.setItem('tasbih_val', count);
            if (navigator.vibrate) navigator.vibrate(50); // اهتزاز خفيف
        }

        function toggleMode() {
            const body = document.getElementById('appBody');
            body.classList.toggle('dark-mode');
            localStorage.setItem('theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        // تشغيل التلقائي عند الفتح
        window.onload = () => {
            authUser();
            if (localStorage.getItem('theme') === 'dark') toggleMode();
        };
    </script>
</body>
</html>
