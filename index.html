<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - التطبيق الروحاني المتكامل</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        /* تنسيق سريع عشان الزرار والشكل العام */
        body { font-family: sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; }
        .card { background: white; margin: 10px; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .pay-btn { background-color: #ffc107; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 80%; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>نُورك</h1>
        <p>تطبيقك الروحاني المتكامل</p>
    </div>

    <input type="text" id="mainSearch" onkeyup="search()" placeholder="ابحث عن سورة أو ذكر...">

    <div class="section">
        <button id="piPayBtn" class="pay-btn" onclick="startPay()">تفعيل نسخة نُورك الكاملة (1 Pi)</button>
    </div>

    <div id="content-area">
        </div>

<script>
    // 1. تهيئة شبكة باي فور تحميل الصفحة
    window.onload = () => {
        try {
            Pi.init({ version: "2.0", sandbox: true }); // غيري sandbox لـ false عند النشر النهائي
            console.log("Pi SDK Initialized");
        } catch (e) {
            console.error("الـ SDK مش راضي يحمل، اتأكدي إنك فاتحة من جوه Pi Browser", e);
        }
        loadContent(); // تحميل البيانات (قرآن، أذكار، أدعية)
    };

    // 2. دالة الدفع الاحترافية (موافقة لشروط Pi Network)
    async function startPay() {
        try {
            const payment = await Pi.createPayment({
                amount: 1,
                memo: "تفعيل النسخة الكاملة من تطبيق نورك",
                metadata: { orderId: "norak-full-version-" + Date.now() }
            }, {
                onReadyForServerApproval: (paymentId) => {
                    console.log("العملية بانتظار موافقة السيرفر: ", paymentId);
                    // هنا المفروض تبعتي الـ paymentId للسيرفر بتاعك (Backend)
                    // للتبسيط في الخطوة 10، الشبكة بتطلب إنك تسجلي العملية
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    console.log("تمت العملية بنجاح! رقم المعاملة: ", txid);
                    alert("مبروك! تم تفعيل النسخة الكاملة بنجاح.");
                    localStorage.setItem('isPremium', 'true'); // حفظ التفعيل في الموبايل
                },
                onCancel: (paymentId) => console.log("المستخدم لغى العملية"),
                onError: (error, payment) => console.error("خطأ في الدفع: ", error)
            });
        } catch (err) {
            alert("لازم تفتحي التطبيق من جوه متصفح Pi Browser عشان الدفع يشتغل");
        }
    }

    // 3. نظام عرض المحتوى (قرآن وأذكار) - شغال Offline
    function loadContent() {
        const contentArea = document.getElementById('content-area');
        // هنا بنستخدم Array فيها الداتا عشان تشتغل منغير نت
        const data = [
            { type: 'قرآن', title: 'سورة الفاتحة', content: 'بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ...' },
            { type: 'أذكار', title: 'أذكار الصباح', content: 'أصبحنا وأصبح الملك لله...' },
            { type: 'أدعية', title: 'دعاء السفر', content: 'سبحان الذي سخر لنا هذا...' }
            // تقدري تزودي الـ 30 جزء هنا بنفس النمط
        ];

        contentArea.innerHTML = data.map(item => `
            <div class="card">
                <h3>${item.title}</h3>
                <p class="tag">${item.type}</p>
                <button onclick="alert('${item.content}')">قراءة</button>
            </div>
        `).join('');
    }

    // 4. دالة البحث الذكية
    function search() {
        let input = document.getElementById('mainSearch').value.toLowerCase();
        let cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
        });
    }

</script>
</body>
</html>
