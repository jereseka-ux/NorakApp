<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norak App - Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h1 { color: #5e2a84; }
        button { background-color: #5e2a84; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; margin-top: 20px; width: 100%; }
        button:hover { background-color: #4a2169; }
    </style>
</head>
<body>

<div class="container">
    <h1>تطبيق نورك (Norak)</h1>
    <p>أهلاً بيكِ يا ياسمين في مشروعك الجديد</p>
    <button id="pay_button">دفع 1 Pi للتجربة</button>
</div>

<script>
    // تهيئة الـ SDK
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true }); // خليها true للتجربة و false لما تخلصي خالص

    async function auth() {
        try {
            const scopes = ['payments', 'username'];
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            console.log("Logged in as: ", auth.user.username);
        } catch (err) {
            console.error(err);
        }
    }

    function onIncompletePaymentFound(payment) {
        console.log("Found incomplete payment", payment);
    };

    document.getElementById('pay_button').onclick = function() {
        Pi.createPayment({
            amount: 1.0,
            memo: "تجربة دفع في تطبيق نورك",
            metadata: { orderId: 123 }
        }, {
            onReadyForServerApproval: function(paymentId) {
                // الربط مع السيرفر اللي عملناه في Vercel
                fetch('/api/pay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId })
                })
                .then(res => res.json())
                .then(data => {
                    alert("تمت الموافقة من السيرفر! برجاء تأكيد العملية من محفظتك الآن");
                })
                .catch(err => alert("حدث خطأ في الربط: " + err));
            },
            onReadyForServerCompletion: function(paymentId, txid) {
                console.log("Payment completed on chain", txid);
                // هنا نبعت للـ API بتاعنا إن العملية خلصت نهائياً
                fetch('/api/pay', {
                    method: 'PATCH', // أو حسب الـ API بتاعك
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId, txid })
                });
            },
            onCancel: function(paymentId) { console.log("Cancelled payment", paymentId); },
            onError: function(error, payment) { console.error("Error", error); }
        });
    };

    auth(); // تشغيل تسجيل الدخول تلقائياً
</script>

</body>
</html>
