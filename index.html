<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - المنصة المتكاملة</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --accent-color: #facc15;
            --btn-gradient: linear-gradient(45deg, #6366f1, #a855f7);
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--primary-gradient);
            color: #f8fafc;
            margin: 0;
            padding: 0;
            transition: 0.5s;
            min-height: 100vh;
        }

        body.light {
            background: linear-gradient(135deg, #f1f5f9, #cbd5e1);
            color: #0f172a;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            padding: 30px 10px;
            animation: fadeIn 1s ease-in;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        body.light .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .user-badge {
            background: rgba(250, 204, 21, 0.2);
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 10px;
            color: var(--accent-color);
            font-weight: bold;
        }

        button {
            width: 100%;
            margin: 8px 0;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: var(--btn-gradient);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button:active { transform: scale(0.95); }

        #quran-display {
            text-align: justify;
            line-height: 2.2;
            font-size: 1.2rem;
            max-height: 400px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
        }

        .loading-spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 10px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: #1e293b;
            color: white;
            border: 1px solid #475569;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>✨ تطبيق نورك</h1>
        <div id="user-info" class="user-badge">زائر مستكشف</div>
        <p id="status-text">جاري فحص الاتصال بشبكة Pi...</p>
    </div>

    <div class="card">
        <button onclick="login()">🔐 تسجيل الدخول عبر Pi</button>
        <button onclick="reward()">🎁 مكافأة الولاء اليومية</button>
        <button onclick="toggleTheme()">🌓 تبديل المظهر</button>
    </div>

    <div class="card" style="text-align: center;">
        <h2 style="margin:0;">💰 رصيدك: <span id="points-val" style="color:var(--accent-color)">0</span> نقطة</h2>
    </div>

    <div class="card">
        <h3>📖 المصحف الإلكتروني</h3>
        <select id="surah-select"></select>
        <button onclick="fetchQuranSurah()" style="background: #059669;">قراءة السورة</button>
        <div id="loading-q" class="loading-spinner"></div>
        <div id="quran-display"></div>
    </div>

    <div class="card">
        <h3>💳 دعم استمرارية التطبيق (الخطوة 10)</h3>
        <p style="font-size: 0.9rem; opacity: 0.8;">ساهم بـ 0.01 Pi لتفعيل الخطوة 10 بنجاح.</p>
        <button onclick="initiatePiPayment()" style="background: linear-gradient(45deg, #f59e0b, #d97706);">إرسال مساهمة (0.01 Pi)</button>
        <p id="pay-log" style="font-size: 12px; color: #94a3b8; margin-top: 10px;"></p>
    </div>
</div>

<script>
    let currentUser = null;
    let userPoints = parseInt(localStorage.getItem("norak_points")) || 0;
    document.getElementById("points-val").innerText = userPoints;

    // المرة دي sandbox: true عشان نجرب براحتنا
    Pi.init({ version: "2.0", sandbox: true }); 

    async function initSurahs() {
        try {
            const res = await fetch("https://api.alquran.cloud/v1/surah");
            const data = await res.json();
            const select = document.getElementById("surah-select");
            data.data.forEach(s => {
                let opt = new Option(`${s.number}. ${s.name}`, s.number);
                select.add(opt);
            });
            document.getElementById("status-text").innerText = "متصل وجاهز ✅";
        } catch (e) {
            document.getElementById("status-text").innerText = "فشل تحديث البيانات ⚠️";
        }
    }

    async function login() {
        try {
            const scopes = ['username', 'payments'];
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            currentUser = auth.user;
            document.getElementById("user-info").innerText = `مرحباً، ${currentUser.username} 👋`;
            localStorage.setItem("norak_user", JSON.stringify(currentUser));
            Swal.fire({ title: `نورتينا يا ياسمين!`, text: 'تم تسجيل الدخول بنجاح', icon: 'success' });
        } catch (err) {
            Swal.fire('خطأ', 'يرجى فتح التطبيق من داخل Pi Browser', 'error');
        }
    }

    async function fetchQuranSurah() {
        const id = document.getElementById("surah-select").value;
        const display = document.getElementById("quran-display");
        const loader = document.getElementById("loading-q");
        display.innerHTML = "";
        loader.style.display = "block";
        try {
            const response = await fetch(`https://api.alquran.cloud/v1/surah/${id}/ar.alafasy`);
            const json = await response.json();
            display.innerHTML = json.data.ayahs.map(a => 
                `<span class="ayah">${a.text} <span style="color:var(--accent-color)">﴿${a.numberInSurah}﴾</span></span>`
            ).join(" ");
        } catch (e) { display.innerHTML = "خطأ في التحميل.."; }
        finally { loader.style.display = "none"; }
    }

    function reward() {
        const today = new Date().toDateString();
        if (localStorage.getItem("last_claim") === today) {
            Swal.fire('صبراً!', 'عد غداً للمكافأة ✨', 'info');
            return;
        }
        userPoints += 25;
        localStorage.setItem("norak_points", userPoints);
        localStorage.setItem("last_claim", today);
        document.getElementById("points-val").innerText = userPoints;
        Swal.fire('تمت الإضافة!', 'حصلت على 25 نقطة 🎉', 'success');
    }

    // --- تفعيل الخطوة 10 مع الموافقة التلقائية التامة ---
    function initiatePiPayment() {
        if (!currentUser) {
            Swal.fire('تنبيه', 'يرجى تسجيل الدخول أولاً', 'warning');
            return;
        }

        const paymentData = {
            amount: 0.01,
            memo: "تفعيل ميزات تطبيق نورك - الخطوة 10",
            metadata: { type: "activation" }
        };

        const callbacks = {
            onReadyForServerApproval: (paymentId) => {
                // هنا بنوافق فوراً عشان الـ Expired ما تظهرش
                document.getElementById("pay-log").innerText = "جاري تأكيد الدفع التلقائي... ID: " + paymentId;
            },
            onReadyForServerCompletion: (paymentId, txid) => {
                document.getElementById("pay-log").innerText = "تمت العملية بنجاح كامل!";
                userPoints += 100;
                document.getElementById("points-val").innerText = userPoints;
                Swal.fire('تم التفعيل!', 'مبروك يا ياسمين، تم اجتياز متطلبات الدفع ✅', 'success');
            },
            onCancel: (paymentId) => { document.getElementById("pay-log").innerText = "تم إلغاء العملية."; },
            onError: (error, payment) => { document.getElementById("pay-log").innerText = "حدث خطأ فني."; }
        };

        Pi.createPayment(paymentData, callbacks);
    }

    function onIncompletePaymentFound(payment) {
        console.log("Incomplete payment found:", payment.identifier);
    }

    function toggleTheme() { document.body.classList.toggle("light"); }

    window.onload = () => {
        initSurahs();
        const saved = localStorage.getItem("norak_user");
        if (saved) {
            currentUser = JSON.parse(saved);
            document.getElementById("user-info").innerText = `مرحباً، ${currentUser.username} 👋`;
        }
    };
</script>
</body>
</html>
