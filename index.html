<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - Norak</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; color: #333; margin: 0; padding: 0; text-align: center; }
        .header { background-color: #4a148c; color: white; padding: 20px; font-size: 24px; font-weight: bold; }
        .container { padding: 20px; }
        .content-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: 20px auto; max-width: 600px; min-height: 300px; }
        .footer-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #4a148c; color: white; }
        .btn-accent { background-color: #ffa000; color: white; }
        #library-menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; padding: 20px; }
        .menu-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">نورك - Norak</div>

    <div class="container">
        <div class="content-box">
            <h2 id="display-title">مرحباً بك</h2>
            <p id="display-text">يرجى اختيار محتوى من الفهرس للبدء في القراءة.</p>
        </div>
    </div>

    <div id="library-menu">
        <button class="btn btn-primary" onclick="toggleLibrary(false)">إغلاق الفهرس</button>
        <h3>الفهرس</h3>
        <div class="menu-item" onclick="loadContent('سورة الفاتحة', 'بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ (1) الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ (2) الرَّحْمَنِ الرَّحِيمِ (3) مَالِكِ يَوْمِ الدِّينِ (4) إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ (5) اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ (6) صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ (7)')">سورة الفاتحة</div>
        <div class="menu-item" onclick="loadContent('أذكار الصباح', 'أصبحنا وأصبح الملك لله والحمد لله، لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير...')">أذكار الصباح</div>
        <div class="menu-item" onclick="loadContent('آية الكرسي', 'اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ...')">آية الكرسي</div>
    </div>

    <div class="footer-nav">
        <button class="btn btn-primary" onclick="toggleLibrary(true)">الفهرس</button>
        <button class="btn btn-accent" id="pay-button">تبرع باى</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        function toggleLibrary(show) {
            document.getElementById('library-menu').style.display = show ? 'block' : 'none';
        }

        function loadContent(title, text) {
            document.getElementById('display-title').innerText = title;
            document.getElementById('display-text').innerText = text;
            toggleLibrary(false);
        }

        document.getElementById('pay-button').onclick = function() {
            Pi.authenticate(['payments'], (payment) => {
                console.log("Payment", payment);
            }).then((auth) => {
                Pi.createPayment({
                    amount: 0.1,
                    memo: "Support Norak App",
                    metadata: { orderId: 123 }
                }, {
                    onReadyForServerApproval: (id) => console.log("Approved", id),
                    onReadyForServerCompletion: (id, txid) => console.log("Completed", id, txid),
                    onComplete: (id) => alert("شكراً لك!"),
                    onError: (error) => console.error(error),
                    onCancel: (id) => console.log("Cancelled", id)
                });
            });
        };
    </script>
</body>
</html>
