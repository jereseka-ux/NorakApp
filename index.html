<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نوراك - Norak</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root { --bg: #121212; --text: #ffffff; --card: #1e1e26; --accent: #f1c40f; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--accent); font-size: 24px; margin-bottom: 20px; }
        .section { background: #2c3e50; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; transition: 0.3s; }
        select { background: #34495e; color: white; cursor: pointer; }
        .btn-main { background-color: #27ae60; color: white; cursor: pointer; }
        .btn-main:hover { background-color: #2ecc71; }
        .btn-pay { background: linear-gradient(45deg, #f39c12, #e67e22); color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4); }
        .btn-pay:hover { transform: scale(1.02); }
        .content-display { background: #1a1a1a; padding: 20px; border-radius: 10px; min-height: 80px; margin-top: 15px; line-height: 1.8; font-size: 18px; border: 1px solid #444; }
        .footer { font-size: 12px; color: #95a5a6; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📖 تطبيق نوراك (Norak)</h1>

    <div class="section">
        <h3>القرآن الكريم والأذكار</h3>
        <select id="contentSelect">
            <option value="">-- اختر من القائمة --</option>
            <optgroup label="سور قرآنية">
                <option value="q_1">سورة الفاتحة</option>
                <option value="q_112">سورة الإخلاص</option>
                <option value="q_113">سورة الفلق</option>
                <option value="q_114">سورة الناس</option>
            </optgroup>
            <optgroup label="أذكار">
                <option value="a_1">أذكار الصباح</option>
                <option value="a_2">أذكار المساء</option>
            </optgroup>
        </select>
        <button class="btn-main" onclick="showContent()">عرض المحتوى</button>
        <div class="content-display" id="displayBox">مرحباً بك في نوراك.. اختر محتوى للبدء</div>
    </div>

    <div class="section">
        <h3>تفعيل الخطوة 10</h3>
        <p style="font-size: 14px; color: #ecf0f1;">اضغط للتحقق من ملكية التطبيق وربط المحفظة</p>
        <button class="btn-pay" id="pay-button" onclick="startPiPayment()">🎁 تفعيل ودعم (0.01 Pi)</button>
        <p class="footer">يرجى عدم مغادرة الصفحة أثناء المعالجة</p>
    </div>
</div>

<script>
    // إعدادات الـ SDK الأساسية
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    // وظيفة عرض المحتوى (نفس منطق كودك الأصلي)
    function showContent() {
        const val = document.getElementById('contentSelect').value;
        const box = document.getElementById('displayBox');
        const data = {
            "q_1": "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ (1) الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ (2) الرَّحْمَنِ الرَّحِيمِ (3) مَالِكِ يَوْمِ الدِّينِ (4) إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ (5)...",
            "q_112": "قُلْ هُوَ اللَّهُ أَحَدٌ (1) اللَّهُ الصَّمَدُ (2) لَمْ يَلِدْ وَلَمْ يُولَدْ (3) وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ (4)",
            "a_1": "أذكار الصباح: أصبحنا وأصبح الملك لله، والحمد لله، لا إله إلا الله وحده لا شريك له..",
            "a_2": "أذكار المساء: أمسينا وأمسى الملك لله، والحمد لله، أعوذ بكلمات الله التامات من شر ما خلق.."
        };
        box.innerText = data[val] || "يرجى اختيار محتوى صحيح";
    }

    // حل مشكلة الدفع المعلق (التعديل المطلوب)
    function onIncompletePaymentFound(payment) {
        console.warn("Incomplete payment found. Resolving...");
        return axios.post('https://norak-app.vercel.app/api/incomplete', { payment });
    }

    // وظيفة الدفع الاحترافية لربط المحفظة
    async function startPiPayment() {
        try {
            const scopes = ['username', 'payments'];
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            console.log("Authenticated User:", auth.user.username);

            const paymentData = {
                amount: 0.01,
                memo: "تفعيل ميزات Norak App النهائية",
                metadata: { type: "step_10_activation" }
            };

            const callbacks = {
                onReadyForServerApproval: (paymentId) => {
                    return axios.post('https://norak-app.vercel.app/api/approve', { paymentId });
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    return axios.post('https://norak-app.vercel.app/api/complete', { paymentId, txid });
                },
                onCancel: (paymentId) => console.log("User cancelled payment."),
                onError: (error, payment) => {
                    console.error("Payment Error:", error);
                    alert("حدث خطأ، تأكد من فتح التطبيق من Pi Browser الرسمي.");
                }
            };

            await Pi.createPayment(paymentData, callbacks);
        } catch (err) {
            console.error("Auth failed:", err);
            alert("خطأ في تسجيل الدخول، جربي مرة أخرى.");
        }
    }
</script>

</body>
</html>
