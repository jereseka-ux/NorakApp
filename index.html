<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك | القرآن الكريم</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark-bg: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--dark-bg); color: var(--text-color); margin: 0; padding: 0; text-align: center; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        header { padding: 30px; border-bottom: 2px solid var(--gold); background: #1a1a1a; }
        h1 { font-family: 'Amiri', serif; color: var(--gold); font-size: 2.5rem; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; padding: 20px; max-width: 1000px; margin: auto; }
        .sura-card { background: var(--card-bg); border: 1px solid #333; border-radius: 10px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .sura-card:hover { border-color: var(--gold); transform: scale(1.05); }
        .sura-card span { font-family: 'Amiri', serif; font-size: 1.2rem; display: block; margin-top: 5px; }
        #reader-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdf6e3; color: #333; z-index: 10000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .reader-header { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ccc; position: sticky; top: 0; background: #fdf6e3; }
        .quran-text { font-family: 'Amiri', serif; font-size: 1.8rem; line-height: 2.2; text-align: center; margin-top: 20px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .btn-close { background: var(--gold); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loading-screen"><div class="loader"></div><p style="color: var(--gold); margin-top: 15px;">جاري تشغيل نورك...</p></div>

<header><h1>نورك</h1><p>القرآن الكريم كاملاً</p></header>

<div class="grid" id="quran-grid"></div>

<div id="reader-view">
    <div class="reader-header">
        <h2 id="sura-name" style="font-family: 'Amiri'; margin: 0;"></h2>
        <button class="btn-close" onclick="closeReader()">إغلاق</button>
    </div>
    <div id="quran-content" class="quran-text">جاري تحميل الآيات...</div>
</div>

<script>
    const suras = ["الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس", "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه", "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم", "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر", "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق", "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة", "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج", "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس", "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد", "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات", "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر", "المسد", "الإخلاص", "الفلق", "الناس"];
    const grid = document.getElementById('quran-grid');

    suras.forEach((name, index) => {
        const card = document.createElement('div');
        card.className = 'sura-card';
        card.innerHTML = `<small>${index + 1}</small><span>${name}</span>`;
        card.onclick = () => loadSura(index + 1, name);
        grid.appendChild(card);
    });

    async function loadSura(id, name) {
        document.getElementById('sura-name').innerText = name;
        document.getElementById('quran-content').innerText = "جاري تحميل السورة...";
        document.getElementById('reader-view').style.display = 'block';
        try {
            const response = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await response.json();
            const text = data.data.ayahs.map(a => a.text + ` ﴿${a.numberInSurah}﴾`).join(' ');
            document.getElementById('quran-content').innerText = text;
        } catch (e) {
            document.getElementById('quran-content').innerText = "عذراً، تأكد من الاتصال بالإنترنت.";
        }
    }

    function closeReader() { document.getElementById('reader-view').style.display = 'none'; }
    
    window.onload = () => {
        setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 2000);
        if(window.Pi) window.Pi.init({ version: "2.0", sandbox: true });
    };
</script>
</body>
</html>
