<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تطبيق نورك - Noork</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #f8f9fa; --text: #222; --primary: #673ab7; --card: #ffffff; --nav-bg: #ffffff; --shadow: 0 4px 12px rgba(0,0,0,0.08); }
        [data-theme="dark"] { --bg: #121212; --text: #f0f0f0; --primary: #bb86fc; --card: #1e1e1e; --nav-bg: #1e1e1e; --shadow: 0 4px 12px rgba(0,0,0,0.3); }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 100px; transition: 0.3s; line-height: 1.6; }
        .header { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 1000; }
        .user-badge { font-size: 0.85rem; background: rgba(103, 58, 183, 0.1); padding: 6px 15px; border-radius: 20px; color: var(--primary); font-weight: bold; }
        .container { padding: 20px; max-width: 650px; margin: 0 auto; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .active-section { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .item-card { background: var(--card); margin-bottom: 15px; padding: 20px; border-radius: 18px; box-shadow: var(--shadow); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; transition: 0.2s; }
        .item-card:active { transform: scale(0.97); }
        
        /* التحكم في الخط */
        .font-bar { display: none; background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 15px; justify-content: center; gap: 25px; box-shadow: var(--shadow); position: sticky; top: 75px; z-index: 900; }
        .font-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 10px; font-size: 1.4rem; cursor: pointer; font-weight: bold; }
        
        .content-view { line-height: 2.2; font-size: 1.4rem; text-align: justify; padding: 20px; background: var(--card); border-radius: 18px; box-shadow: var(--shadow); }
        .ayah-num { color: var(--primary); font-weight: bold; margin: 0 4px; font-size: 1rem; border: 1px solid var(--primary); border-radius: 50%; padding: 2px 6px; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--nav-bg); display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-btn { border: none; background: none; color: #888; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; }
        .nav-btn.active { color: var(--primary); font-weight: bold; }
        .nav-btn span { font-size: 1.6rem; margin-bottom: 4px; }
        
        .counter { font-size: 5rem; text-align: center; color: var(--primary); margin: 40px 0; font-weight: bold; }
        .tap-circle { width: 200px; height: 200px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 1.6rem; cursor: pointer; display: block; margin: 0 auto; box-shadow: 0 10px 20px rgba(103, 58, 183, 0.3); }
    </style>
</head>
<body data-theme="light">
    <div class="header">
        <div class="user-badge" id="username">جاري التحقق...</div>
        <h2 style="margin:0; color:var(--primary); font-size: 1.5rem;">نُورك</h2>
        <button onclick="toggleTheme()" id="t-btn" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">🌙</button>
    </div>

    <div class="container">
        <div id="quran-sec" class="section active-section">
            <div id="juz-index">
                <h3 style="text-align:center;">فهرس الأجزاء</h3>
                <div id="juzList"></div>
            </div>
            <div id="quran-content" style="display:none;">
                <button onclick="showIndex()" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:none; background:#eee; cursor:pointer; font-weight:bold;">🔙 العودة للفهرس</button>
                <div class="font-bar" id="fontBar" style="display:flex;">
                    <button class="font-btn" onclick="changeSize(0.1)">A+</button>
                    <button class="font-btn" onclick="changeSize(-0.1)">A-</button>
                </div>
                <div class="content-view" id="mainText"></div>
            </div>
        </div>

        <div id="adhkar-sec" class="section">
            <h3 style="text-align:center;">الأذكار المستجابة</h3>
            <div class="item-card" onclick="openDhkr('أصبحنا وأصبح الملك لله والحمد لله..')">أذكار الصباح ☀️</div>
            <div class="item-card" onclick="openDhkr('أمسينا وأمسى الملك لله والحمد لله..')">أذكار المساء 🌙</div>
            <div class="item-card" onclick="openDhkr('أستغفر الله، أستغفر الله، أستغفر الله..')">أذكار بعد الصلاة 📿</div>
        </div>

        <div id="misbaha-sec" class="section">
            <div class="counter" id="countDisplay">0</div>
            <button class="tap-circle" onclick="press()">سبّح</button>
            <button onclick="reset()" style="display:block; margin:30px auto; color:red; background:none; border:none; cursor:pointer;">تصفير</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="go('quran-sec', this)"><span>📖</span>القرآن</button>
        <button class="nav-btn" onclick="go('adhkar-sec', this)"><span>✨</span>الأذكار</button>
        <button class="nav-btn" onclick="go('misbaha-sec', this)"><span>📿</span>المسبحة</button>
        <button class="nav-btn" onclick="pay()" style="color:#fbc02d;"><span>☕</span>دعم نورك</button>
    </nav>

    <script>
        const Pi = window.Pi; Pi.init({ version: "2.0", sandbox: false });
        let fSize = 1.4;

        async function init() {
            try {
                const auth = await Pi.authenticate(['username', 'payments'], (p) => console.log(p));
                document.getElementById('username').innerText = auth.user.username;
            } catch (e) { document.getElementById('username').innerText = "زائر"; }
        }
        window.onload = init;

        function changeSize(s) { fSize += s; document.getElementById('mainText').style.fontSize = fSize + 'rem'; }

        async function pay() {
            try {
                await Pi.createPayment({ amount: 1, memo: "دعم نورك 💖", metadata: { id: Date.now() } }, {
                    onReadyForServerApproval: (id) => fetch("/api/approve", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({paymentId: id}) }),
                    onReadyForServerCompletion: (id, txid) => fetch("/api/complete", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({paymentId: id, txid}) }),
                    onCancel: () => alert("تم إلغاء الدفع"), onError: (e) => alert("خطأ: " + e.message)
                });
            } catch(e) { alert("افتح التطبيق من Pi Browser"); }
        }

        function go(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const list = document.getElementById('juzList');
        for (let i = 1; i <= 30; i++) {
            let d = document.createElement('div'); d.className = 'item-card';
            d.innerHTML = `<span>الجزء ${i}</span> 📖`;
            d.onclick = () => load(i); list.appendChild(d);
        }

        async function load(n) {
            document.getElementById('juz-index').style.display = 'none';
            document.getElementById('quran-content').style.display = 'block';
            const txt = document.getElementById('mainText');
            txt.innerHTML = "جاري التحميل...";
            const res = await fetch(`https://api.alquran.cloud/v1/juz/${n}/quran-uthmani`);
            const data = await res.json();
            txt.innerHTML = data.data.ayahs.map(a => a.text + ` <span class="ayah-num">${a.numberInSurah}</span>`).join(' ');
        }

        function showIndex() { document.getElementById('juz-index').style.display = 'block'; document.getElementById('quran-content').style.display = 'none'; }
        function openDhkr(t) { document.getElementById('juz-index').style.display = 'none'; document.getElementById('quran-content').style.display = 'block'; document.getElementById('mainText').innerHTML = t; }

        let c = parseInt(localStorage.getItem('c')) || 0;
        document.getElementById('countDisplay').innerText = c;
        function press() { c++; document.getElementById('countDisplay').innerText = c; localStorage.setItem('c', c); if(navigator.vibrate) navigator.vibrate(50); }
        function reset() { c = 0; document.getElementById('countDisplay').innerText = 0; localStorage.setItem('c', 0); }
        function toggleTheme() { const b = document.body; const t = b.getAttribute('data-theme')==='light'?'dark':'light'; b.setAttribute('data-theme', t); document.getElementById('t-btn').innerText = t==='light'?'🌙':'☀️'; }
    </script>
</body>
</html>
