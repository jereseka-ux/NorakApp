<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورَك - Norak | القرآن الكريم</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a252f;
            --gold: #d4af37;
            --accent: #c0392b;
            --bg: #fdfbf7;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--primary);
            line-height: 1.6;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--gold);
        }

        header h1 {
            font-family: 'Amiri', serif;
            margin: 0;
            font-size: 2.5rem;
            color: var(--gold);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        #user-info {
            font-size: 1rem;
            margin-top: 10px;
            color: #ecf0f1;
            font-weight: bold;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 10px;
        }

        /* قائمة السور */
        .surah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .surah-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #eee;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .surah-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .surah-name {
            font-family: 'Amiri', serif;
            font-size: 1.4rem;
            font-weight: bold;
            display: block;
            color: var(--primary);
        }

        /* عرض المصحف */
        #quran-view {
            display: none;
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease;
        }

        .back-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #surah-text {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            text-align: center;
            line-height: 3;
            color: #2c3e50;
        }

        .ayah-num {
            color: var(--gold);
            font-size: 1.3rem;
            margin: 0 5px;
            font-weight: normal;
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        .loader { text-align: center; padding: 50px; font-size: 1.2rem; }
    </style>
</head>
<body>

<header>
    <h1>نورَك - Norak</h1>
    <div id="user-info">جاري التحقق من الهوية...</div>
</header>

<div class="container">
    <div id="main-view">
        <div class="surah-grid" id="surah-list">
            <div class="loader">جاري تحميل فهرس السور...</div>
        </div>
    </div>

    <div id="quran-view">
        <button class="back-btn" onclick="showHome()">⬅ العودة للفهرس</button>
        <h2 id="current-surah-title" style="text-align: center; font-family: 'Amiri'; color: var(--gold);"></h2>
        <hr>
        <div id="surah-text"></div>
    </div>
</div>

<script>
    // --- 1. إعدادات Pi Network SDK ---
    const Pi = window.Pi;
    async function initPi() {
        try {
            await Pi.init({ version: "2.0", sandbox: false });
            const scopes = ['username'];
            
            // الربط الحقيقي مع حساب المستخدم
            const auth = await Pi.authenticate(scopes, (payment) => {});
            
            // تعديل ظهور الاسم باحترافية (باستخدام الـ Backticks الصحيحة)
            document.getElementById('user-info').innerHTML = 
                `مرحباً بكِ يا <span style="color:var(--gold);">${auth.user.username}</span> في تطبيقكِ`;
        } catch (err) {
            console.error("Pi SDK Error:", err);
            document.getElementById('user-info').innerText = "يرجى فتح التطبيق من متصفح Pi الرسمي";
        }
    }

    // --- 2. جلب بيانات القرآن من API ---
    async function fetchSurahs() {
        try {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            const list = document.getElementById('surah-list');
            list.innerHTML = '';

            data.data.forEach(s => {
                const card = document.createElement('div');
                card.className = 'surah-card';
                card.innerHTML = `<span class="surah-name">${s.name}</span><small>${s.numberOfAyahs} آية</small>`;
                card.onclick = () => loadSurah(s.number, s.name);
                list.appendChild(card);
            });
        } catch (e) {
            document.getElementById('surah-list').innerHTML = "فشل في تحميل البيانات، تأكدي من الاتصال.";
        }
    }

    async function loadSurah(num, name) {
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('quran-view').style.display = 'block';
        document.getElementById('current-surah-title').innerText = "سورة " + name;
        const textDiv = document.getElementById('surah-text');
        textDiv.innerHTML = "جاري تحميل الآيات...";

        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}`);
            const data = await res.json();
            let fullText = "";
            data.data.ayahs.forEach(a => {
                fullText += `${a.text} <span class="ayah-num">﴿${a.numberInSurah}﴾</span> `;
            });
            textDiv.innerHTML = fullText;
            window.scrollTo(0, 0);
        } catch (e) {
            textDiv.innerHTML = "حدث خطأ أثناء تحميل السورة.";
        }
    }

    function showHome() {
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('quran-view').style.display = 'none';
    }

    // تشغيل التطبيق
    initPi();
    fetchSurahs();
</script>

</body>
</html>
