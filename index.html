<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norak App - تطبيق نورك</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #673ab7; margin-bottom: 10px; }
        p { font-size: 16px; line-height: 1.6; color: #666; }
        .btn-pay {
            background-color: #673ab7;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
            width: 100%;
        }
        .btn-pay:hover { background-color: #512da8; }
        .status { margin-top: 15px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <div class="container">
        <h1>تطبيق نورك</h1>
        <p>أهلاً بكِ يا ياسمين! اضغطي على الزر بالأسفل لتفعيل مميزات الـ VIP والبدء في استخدام التطبيق بكامل صلاحياته.</p>
        
        <button class="btn-pay" onclick="transferPi()">تفعيل VIP (0.5 Pi)</button>
        
        <div id="status-message" class="status">التطبيق متصل بشبكة Pi (Utility Active)</div>
    </div>

    <script>
        const Pi = window.Pi;
        // تفعيل وضع الـ Sandbox عشان إحنا لسه بنجرب
        Pi.init({ version: "1.5", sandbox: true });

        async function transferPi() {
            const statusDiv = document.getElementById('status-message');
            statusDiv.innerText = "جاري الاتصال بالمحفظة...";

            try {
                const payment = await Pi.createPayment({
                    amount: 0.5,
                    memo: "تفعيل مميزات VIP في تطبيق نورك",
                    metadata: { type: "vip_upgrade" },
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        statusDiv.innerText = "انتظار موافقة السيرفر...";
                        fetch(`https://norak-app.vercel.app/api/approve?paymentId=${paymentId}`, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': 'key-pvyit7o8vofgh2zex3uicvunqshhff27n2fowc46on65406drtksun5v1d49k6e1' 
                            }
                        });
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        statusDiv.innerText = "جاري تأكيد المعاملة...";
                        fetch(`https://norak-app.vercel.app/api/complete?paymentId=${paymentId}&txid=${txid}`, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': 'key-pvyit7o8vofgh2zex3uicvunqshhff27n2fowc46on65406drtksun5v1d49k6e1' 
                            }
                        });
                        statusDiv.innerText = "تم التفعيل بنجاح!";
                        alert("تم الدفع بنجاح! مبروك الـ VIP يا ياسمين");
                    },
                    onCancel: function(paymentId) {
                        statusDiv.innerText = "تم إلغاء العملية.";
                    },
                    onError: function(error, payment) {
                        statusDiv.innerText = "حدث خطأ في الدفع.";
                        console.error(error);
                        alert("تأكدي من فتح التطبيق من داخل Pi Browser وتفعيل الـ Sandbox Mode");
                    },
                });
            } catch (err) {
                statusDiv.innerText = "فشل في بدء العملية.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
