<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>تطبيق نُورك - Norak v2.0</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --bg:#0a0a0a;--card:#151515;--accent:#bb86fc;--text:#e0e0e0;--sub:#999;--gold:#ffcc00;
}
[data-theme="light"] {
    --bg:#f5f5f5;--card:#fff;--accent:#6200ee;--text:#1a1a1a;--sub:#666;--gold:#b8860b;
}
body {background:var(--bg);color:var(--text);font-family:'Segoe UI';margin:0;padding-bottom:90px}
.header{background:var(--card);padding:18px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--accent)}
.user-tag{font-size:.8rem;color:var(--accent);font-weight:bold;border:1.5px solid var(--accent);padding:4px 12px;border-radius:20px}
.nav-bar{position:fixed;bottom:0;width:100%;background:var(--card);display:flex;padding:12px 0}
.nav-link{flex:1;border:none;background:none;color:var(--sub);cursor:pointer}
.nav-link.active{color:var(--accent)}
</style>
</head>

<body data-theme="dark">

<div class="header">
<div class="user-tag" id="user_display">جاري التحميل...</div>
<h2 style="color:var(--accent)">نُورك</h2>
</div>

<div class="container" id="view_area"></div>

<nav class="nav-bar">
<button class="nav-link" onclick="loadPage('quran',this)">القرآن</button>
<button class="nav-link" onclick="loadPage('azkar',this)">الأذكار</button>
<button class="nav-link" onclick="loadPage('sebha',this)">المسبحة</button>
<button class="nav-link" id="pay_btn" onclick="handlePay()" style="color:var(--gold)">دعم</button>
</nav>

<script>
const Pi = window.Pi;
Pi.init({version:"2.0",sandbox:false});

let currentUser = null;
let isPaying = false;

// ================= INIT =================
async function init(){
    try{
        const auth = await Pi.authenticate(['username','payments'], onIncompletePayment);

        if(auth?.user?.username){
            currentUser = auth.user.username;
            document.getElementById('user_display').innerText = currentUser;
        }else{
            document.getElementById('user_display').innerText = "مستخدم Pi";
        }

    }catch(e){
        document.getElementById('user_display').innerText = "زائر";
        console.log(e);
    }

    loadPage('quran', document.querySelectorAll('.nav-link')[0]);
}

// ================= PAYMENT =================
async function handlePay(){

    if(isPaying){
        alert("استنى العملية الحالية تخلص...");
        return;
    }

    isPaying = true;
    const btn = document.getElementById('pay_btn');
    btn.innerText = "جاري الدفع...";

    try{
        await Pi.createPayment({
            amount:0.1,
            memo:`دعم من ${currentUser || "User"} ❤️`,
            metadata:{type:"donation"}
        },{
            onReadyForServerApproval: async(paymentId)=>{
                return fetch('/api/approve',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({paymentId})
                }).then(r=>r.json());
            },

            onReadyForServerCompletion: async(paymentId,txid)=>{
                return fetch('/api/complete',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({paymentId,txid})
                }).then(r=>r.json())
                .then(()=>{
                    alert("✅ تم الدفع بنجاح، جزاك الله خيراً 💖");
                });
            },

            onCancel:(id)=>{
                alert("تم إلغاء العملية");
            },

            onError:(err)=>{
                alert("خطأ: "+err.message);
            }
        });

    }catch(e){
        alert("افتح التطبيق من Pi Browser");
    }

    isPaying = false;
    btn.innerText = "دعم";
}

// ================= INCOMPLETE =================
async function onIncompletePayment(payment){
    return fetch('/api/complete',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            paymentId:payment.identifier,
            txid:payment.transaction.txid
        })
    });
}

// ================= BASIC PAGES =================
function loadPage(page,btn){
    document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
    if(btn) btn.classList.add('active');

    const view=document.getElementById('view_area');

    if(page==="quran"){
        view.innerHTML="<h3>القرآن الكريم كامل</h3>";
    }
    else if(page==="azkar"){
        view.innerHTML="<h3>الأذكار</h3>";
    }
    else if(page==="sebha"){
        view.innerHTML="<h3>المسبحة</h3>";
    }
}

window.onload = init;
</script>
</body>
</html>
