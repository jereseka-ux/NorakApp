<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تطبيق نُورك - Norak Official</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #151515; --accent: #bb86fc; --text: #e0e0e0; --gold: #ffcc00; }
        [data-theme="light"] { --bg: #f5f5f5; --card: #ffffff; --accent: #6200ee; --text: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; transition: 0.3s; user-select: none; }
        .header { background: var(--card); padding: 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--accent); }
        .user-tag { font-size: 0.85rem; color: var(--accent); border: 1.5px solid var(--accent); padding: 5px 15px; border-radius: 25px; }
        .container { padding: 15px; max-width: 650px; margin: 0 auto; }
        .card { background: var(--card); margin-bottom: 15px; padding: 22px; border-radius: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .quran-text { line-height: 2.8; text-align: justify; padding: 25px; font-size: 1.6rem; background: var(--card); border-radius: 20px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-link { flex: 1; border: none; background: none; color: #999; text-align: center; font-size: 0.85rem; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { display: block; font-size: 1.7rem; margin-bottom: 5px; }
        .back-btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 12px; margin-bottom: 25px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="user-tag" id="user_display">جاري التحقق...</div>
    <h2 style="margin:0; color:var(--accent);">نُورك</h2>
    <i class="fas fa-moon" id="theme_toggle" onclick="toggleTheme()" style="cursor: pointer;"></i>
</div>

<div class="container" id="view_area"></div>

<nav class="nav-bar">
    <button class="nav-link" onclick="loadPage('quran', this)"><i class="fas fa-book-quran"></i>القرآن</button>
    <button class="nav-link" onclick="loadPage('azkar', this)"><i class="fas fa-hands-praying"></i>الأذكار</button>
    <button class="nav-link" onclick="loadPage('sebha', this)"><i class="fas fa-fingerprint"></i>المسبحة</button>
    <button class="nav-link" onclick="handlePay()" style="color: var(--gold);"><i class="fas fa-heart"></i>دعم نُورك</button>
</nav>

<script>
    const Pi = window.Pi;
    async function init() {
        try {
            await Pi.init({ version: "2.0", sandbox: false });
            const auth = await Pi.authenticate(['username', 'payments'], onIncompletePayment);
            if (auth) document.getElementById('user_display').innerText = auth.user.username;
        } catch(e) { document.getElementById('user_display').innerText = "زائر"; }
        loadPage('quran', document.querySelectorAll('.nav-link')[0]);
    }

    async function handlePay() {
        try {
            await Pi.createPayment({
                amount: 0.1,
                memo: "دعم تطبيق نُورك الإسلامي 💖",
                metadata: { type: "donation" }
            }, {
                onReadyForServerApproval: (paymentId) => { console.log("Approved:", paymentId); },
                onReadyForServerCompletion: (paymentId, txid) => { alert("تم الدعم بنجاح!"); },
                onCancel: (paymentId) => { },
                onError: (error) => { alert("خطأ: " + error.message); }
            });
        } catch(e) { alert("افتح التطبيق من Pi Browser"); }
    }

    function loadPage(page, btn) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(btn) btn.classList.add('active');
        const view = document.getElementById('view_area');
        if(page === 'quran') {
            view.innerHTML = '<h3 style="color:var(--accent)">الفهرس المبارك</h3>';
            for(let i=1; i<=30; i++) view.innerHTML += `<div class="card" onclick="alert('جاري التحميل...')">الجزء ${i}</div>`;
        } else if(page === 'azkar') {
            view.innerHTML = '<h3>الأذكار</h3><div class="card">أذكار الصباح</div><div class="card">أذكار المساء</div>';
        } else if(page === 'sebha') {
            view.innerHTML = '<div style="text-align:center; padding:50px;"><h1>0</h1><p>سبّح لله</p></div>';
        }
    }

    function onIncompletePayment(payment) { }
    function toggleTheme() { 
        const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
    }

    window.onload = init;
</script>
</body>
</html>
