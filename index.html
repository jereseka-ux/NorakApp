<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norak App</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#121212;
  color:#fff;
  text-align:center;
}
button {
  padding:15px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#6c5ce7;
  color:#fff;
  font-size:16px;
}
</style>
</head>

<body>

<h2>🌙 تطبيق نورك</h2>

<button onclick="loginPi()">تسجيل الدخول</button>
<button onclick="pay()">ادفع 1 Pi</button>

<p id="status">الحالة: ...</p>

<script>
let user = null;

// ✅ تأكد إنك في Pi Browser
if (typeof Pi === "undefined") {
  document.getElementById("status").innerText =
    "❌ افتحي من Pi Browser";
} else {

  Pi.init({
    version: "2.0",
    sandbox: true
  });

  document.getElementById("status").innerText =
    "✅ جاهز للاتصال";
}

// ✅ تسجيل الدخول
async function loginPi() {
  try {
    const scopes = ['username', 'payments'];

    const auth = await Pi.authenticate(scopes, function(payment) {
      console.log(payment);
    });

    user = auth.user;

    document.getElementById("status").innerText =
      "👤 " + user.username;

  } catch(e) {
    console.error(e);
  }
}

// ✅ الدفع
function pay() {

  if (!user) {
    alert("اعملي تسجيل دخول الأول");
    return;
  }

  Pi.createPayment({
    amount: 1,
    memo: "Norak Payment",
    metadata: { type: "app" }
  }, {

    onReadyForServerApproval: function(id) {
      console.log("Approve:", id);
    },

    onReadyForServerCompletion: function(id, txid) {
      document.getElementById("status").innerText =
        "✅ تم الدفع";
    },

    onCancel: function() {
      document.getElementById("status").innerText =
        "❌ اتلغى";
    },

    onError: function(err) {
      console.error(err);
    }

  });
}
</script>

</body>
</html>
