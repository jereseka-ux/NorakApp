<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - Norak</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #ffffff; --txt: #212121; --card: #f8f9fa; --p: #4a148c; --accent: #ffa000; }
        [data-theme="dark"] { --bg: #121212; --txt: #e0e0e0; --card: #1e1e1e; --p: #bb86fc; --accent: #ffb300; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 80px; transition: 0.3s; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--card); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .main-container { padding: 25px; max-width: 600px; margin: 20px auto; background: var(--card); border-radius: 20px; min-height: 60vh; }
        #s-name { font-size: 26px; font-weight: bold; color: var(--p); border-bottom: 2px solid var(--p); padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        #s-content { font-size: 22px; line-height: 1.8; text-align: justify; white-space: pre-wrap; }
        #lib-ui { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; padding: 20px; overflow-y: auto; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .btn { border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; background: #eee; color: var(--txt); }
        .btn-pay { background: var(--accent); color: #000; }
        .btn-main { background: var(--p); color: #fff; }
    </style>
</head>
<body data-theme="light">

    <div class="header">
        <button class="btn" onclick="toggleLib(true)">☰ الفهرس</button>
        <h2 style="margin:0">نورك</h2>
        <button class="btn" onclick="toggleMode()">☀️/🌙</button>
    </div>

    <div id="lib-ui">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3>المكتبة الخارجية</h3>
            <button class="btn btn-main" onclick="toggleLib(false)">إغلاق ×</button>
        </div>
        <div style="padding:15px; border-bottom:1px solid #ddd; cursor:pointer;" onclick="updateContent('سورة الفاتحة', 'بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ (1) الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ (2) الرَّحْمَنِ الرَّحِيمِ (3) مَالِكِ يَوْمِ الدِّينِ (4) إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ (5) اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ (6) صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ (7)')">سورة الفاتحة</div>
        <div style="padding:15px; border-bottom:1px solid #ddd; cursor:pointer;" onclick="updateContent('أذكار الصباح', 'أصبحنا وأصبح الملك لله...')">أذكار الصباح</div>
    </div>

    <div class="main-container">
        <div id="s-name">مرحباً بك</div>
        <div id="s-content">اختر محتوى من الفهرس للبدء..</div>
    </div>

    <div class="nav-bar">
        <button class="btn" onclick="savePlace()">📌 حفظ</button>
        <button class="btn" onclick="goBack()">🏠 العودة</button>
        <button class="btn btn-pay" id="payBtn">π تبرع</button>
    </div>

    <script>
        // التأكد من تحميل الـ SDK أولاً
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        function toggleLib(s) { document.getElementById('lib-ui').style.display = s ? 'block' : 'none'; }

        function updateContent(n, t) {
            document.getElementById('s-name').innerText = n;
            document.getElementById('s-content').innerText = t;
            toggleLib(false);
            window.scrollTo(0,0);
        }

        function savePlace() {
            const data = { n: document.getElementById('s-name').innerText, t: document.getElementById('s-content').innerText };
            localStorage.setItem('nrk_save', JSON.stringify(data));
            alert("تم الحفظ 📌");
        }

        function goBack() {
            const s = JSON.parse(localStorage.getItem('nrk_save'));
            if(s) {
                document.getElementById('s-name').innerText = s.n;
                document.getElementById('s-content').innerText = s.t;
            }
        }

        function toggleMode() {
            const b = document.body;
            const t = b.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            b.setAttribute('data-theme', t);
        }

        // ربط الزرار بطريقة مباشرة ومضمونة
        document.getElementById('payBtn').addEventListener('click', async () => {
            try {
                const auth = await Pi.authenticate(['payments'], (p) => {});
                if (auth) {
                    await Pi.createPayment({
                        amount: 0.1,
                        memo: "Support Norak App Development",
                        metadata: { orderId: "n_" + Date.now() }
                    }, {
                        onReadyForServerApproval: (id) => Pi.approvePayment(id),
                        onReadyForServerCompletion: (id, tx) => Pi.completePayment(id, tx),
                        onComplete: (id) => alert("تم التبرع بنجاح!"),
                        onError: (err) => alert("خطأ في العملية"),
                        onCancel: (id) => {}
                    });
                }
            } catch (e) {
                alert("افتح التطبيق من Pi Browser");
            }
        });

        window.onload = goBack;
    </script>
</body>
</html>
