<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - Norak</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p-purple: #673AB7; --bg: #f8f9fa; --txt: #2d3436; --card: #ffffff; }
        .dark-mode { --bg: #0f0c29; --txt: #f5f6fa; --card: #1b1448; }
        
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--txt); transition: 0.3s; margin: 0; padding-bottom: 80px; }
        .quran-text { font-family: 'Amiri', serif; line-height: 2.5; text-align: justify; text-align-last: center; }
        .card-custom { background: var(--card); border-radius: 20px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .active-tab { display: block; }
        
        /* زرار الإضاءة */
        .theme-toggle { position: fixed; top: 20px; left: 20px; z-index: 1000; background: var(--p-purple); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(0,0,0,0.1); z-index: 500; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: #a1a1a1; cursor: pointer; }
        .nav-item.active { color: var(--p-purple); font-weight: bold; }
        
        /* تحسين عرض الآيات */
        .ayah-num { color: var(--p-purple); font-weight: bold; font-family: 'Tajawal'; font-size: 0.8em; margin: 0 5px; border: 1px solid var(--p-purple); border-radius: 50%; padding: 2px 6px; display: inline-block; min-width: 30px; text-align: center; }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
    </div>

    <header class="p-8 pt-12 text-center" style="background: linear-gradient(135deg, #673AB7, #311B92); color: white; border-radius: 0 0 40px 40px;">
        <h1 class="text-4xl font-bold mb-2">نورك - Norak</h1>
        <p class="opacity-90">مرحباً بكِ يا ياسمين في تطبيقكِ الشامل</p>
    </header>

    <main class="container mx-auto px-4 mt-6">
        
        <section id="tab-quran" class="tab-content active-tab">
            <div class="flex bg-gray-200 dark:bg-gray-800 rounded-xl p-1 mb-6">
                <button onclick="switchQuranView('surah')" id="btn-surah" class="flex-1 py-2 rounded-lg font-bold bg-white text-purple-700 shadow">السور</button>
                <button onclick="switchQuranView('juz')" id="btn-juz" class="flex-1 py-2 rounded-lg font-bold text-gray-600">الأجزاء</button>
            </div>
            <div id="quran-list" class="grid grid-cols-1 gap-3">
                </div>
        </section>

        <section id="tab-settings" class="tab-content">
            <div class="card-custom p-6 mb-4 shadow-lg">
                <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-wallet text-purple-600"></i> تفعيل الخطوة 10</h3>
                <button onclick="handlePiPayment()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-4 rounded-2xl transition-all transform active:scale-95 shadow-md">
                    دفع 1 Pi للتفعيل النهائي
                </button>
                <p id="pay-status" class="text-center text-xs mt-3 text-gray-500">جاري الربط مع شبكة Pi Network..</p>
            </div>

            <div class="card-custom p-6 shadow-lg">
                <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-text-height text-purple-600"></i> تخصيص القراءة</h3>
                <label class="block text-sm mb-2 text-gray-500">حجم الخط الحالي: <span id="font-val">24</span>px</label>
                <input type="range" id="font-slider" min="16" max="40" value="24" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-purple-600">
            </div>
        </section>

        <section id="tab-azkar" class="tab-content text-center py-10">قريباً.. أذكار الصباح والمساء</section>
        <section id="tab-sebha" class="tab-content text-center py-10">قريباً.. المسبحة الإلكترونية الذكية</section>

    </main>

    <div id="reader-modal" class="fixed inset-0 bg-black bg-opacity-90 z-[2000] hidden flex flex-col">
        <div class="flex justify-between items-center p-4 bg-purple-900 text-white">
            <button onclick="closeReader()" class="text-2xl"><i class="fas fa-arrow-right"></i></button>
            <h2 id="reader-title" class="font-bold text-lg"></h2>
            <button onclick="saveBookmark()" class="text-xl"><i id="book-icon" class="far fa-bookmark"></i></button>
        </div>
        <div id="reader-body" class="flex-1 overflow-y-auto p-6 bg-white dark:bg-gray-900 quran-text">
            </div>
    </div>

    <nav class="bottom-nav">
        <div onclick="showTab('quran')" id="nav-quran" class="nav-item active"><i class="fas fa-quran text-xl mb-1"></i><span>القرآن</span></div>
        <div onclick="showTab('azkar')" id="nav-azkar" class="nav-item"><i class="fas fa-hand-holding-heart text-xl mb-1"></i><span>الأذكار</span></div>
        <div onclick="showTab('sebha')" id="nav-sebha" class="nav-item"><i class="fas fa-beads text-xl mb-1"></i><span>المسبحة</span></div>
        <div onclick="showTab('settings')" id="nav-settings" class="nav-item"><i class="fas fa-user-cog text-xl mb-1"></i><span>الإعدادات</span></div>
    </nav>

    <script>
        // تفعيل SDK الخاص بباي
        const Pi = window.Pi;
        Pi.init({ version: "1.5", sandbox: true });

        let currentFontSize = 24;

        // --- نظام التبديل بين التابات ---
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active-tab');
            document.getElementById('nav-' + tabId).classList.add('active');
            if(tabId === 'quran') loadSurahs();
        }

        // --- نظام الإضاءة (Dark Mode) ---
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        // --- نظام حجم الخط ---
        document.getElementById('font-slider').addEventListener('input', function(e) {
            currentFontSize = e.target.value;
            document.getElementById('font-val').innerText = currentFontSize;
            document.getElementById('reader-body').style.fontSize = currentFontSize + 'px';
        });

        // --- معالجة القرآن (منع التداخل) ---
        async function loadSurahs() {
            const list = document.getElementById('quran-list');
            list.innerHTML = '<p class="text-center opacity-50 p-10">جاري تحميل السور برباط سليم...</p>';
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await res.json();
                list.innerHTML = '';
                data.data.forEach(surah => {
                    list.innerHTML += `
                        <div onclick="openReader('surah', ${surah.number}, '${surah.name}')" class="card-custom p-4 flex justify-between items-center cursor-pointer hover:bg-purple-50 transition">
                            <div class="flex items-center gap-4">
                                <span class="bg-purple-100 text-purple-700 w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs">${surah.number}</span>
                                <div><h4 class="font-bold">${surah.name}</h4><p class="text-[10px] text-gray-400">${surah.englishName}</p></div>
                            </div>
                            <i class="fas fa-chevron-left text-gray-300"></i>
                        </div>`;
                });
            } catch (e) { list.innerHTML = "فشل التحميل، تأكدي من الإنترنت."; }
        }

        async function openReader(type, id, title) {
            const modal = document.getElementById('reader-modal');
            const body = document.getElementById('reader-body');
            document.getElementById('reader-title').innerText = title;
            body.innerHTML = '<div class="text-center p-20"><i class="fas fa-spinner fa-spin text-3xl text-purple-600"></i><br>جاري ترتيب الآيات بدقة...</div>';
            body.style.fontSize = currentFontSize + 'px';
            modal.classList.remove('hidden');

            const url = type === 'surah' ? `https://api.alquran.cloud/v1/surah/${id}` : `https://api.alquran.cloud/v1/juz/${id}/quran-uthmani`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                let fullText = "";
                const ayahs = type === 'surah' ? data.data.ayahs : data.data.ayahs;
                
                ayahs.forEach(ayah => {
                    // عرض الآية ثم رقمها بوضوح لمنع التداخل
                    fullText += `${ayah.text} <span class="ayah-num">${ayah.numberInSurah}</span> `;
                });
                
                body.innerHTML = fullText;
            } catch (e) { body.innerHTML = "حدث خطأ أثناء جلب الآيات."; }
        }

        function closeReader() { document.getElementById('reader-modal').classList.add('hidden'); }

        // --- نظام دفع Pi (الخطوة 10) ---
        async function handlePiPayment() {
            const status = document.getElementById('pay-status');
            status.innerText = "⏳ جاري الاتصال بمحفظتك في Pi Browser...";
            
            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "تفعيل تطبيق نورك - ياسمين",
                    metadata: { activation: "step_10" },
                }, {
                    onReadyForServerCompletion: (paymentId) => {
                        status.innerText = "✅ تم الدفع! جاري التفعيل التلقائي...";
                        alert("مبروك يا ياسمين! تم تفعيل الخطوة 10 بنجاح.");
                    },
                    onCancel: () => { status.innerText = "❌ تم إلغاء العملية."; },
                    onError: (error) => { status.innerText = "⚠️ افتحي التطبيق من داخل Pi Browser لتفعيل الدفع."; }
                });
            } catch (e) {
                status.innerText = "⚠️ تأكدي من استخدام متصفح Pi Browser.";
            }
        }

        // تشغيل افتراضي
        window.onload = () => { loadSurahs(); };
    </script>
</body>
</html>
