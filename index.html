<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك ✨</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #1a1a2e; color: white; padding: 20px; }
        .btn { background: linear-gradient(45deg, #6a11cb, #2575fc); color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 18px; margin: 10px; width: 80%; max-width: 300px; }
        .status { margin: 20px; padding: 10px; border-radius: 10px; background: #16213e; display: inline-block; }
    </style>
</head>
<body>

    <h1>✨ تطبيق نورك ✨</h1>
    
    <div id="user-info" class="status">
        <p id="status-text">جاري التحقق من الاتصال... ⏳</p>
    </div>

    <div id="controls">
        <button class="btn" onclick="login()">🔐 تسجيل الدخول عبر Pi</button>
        <button class="btn" onclick="initiatePiPayment()">🎁 مكافأة الولاء اليومية</button>
        <button class="btn" onclick="toggleTheme()">🌓 تبديل المظهر</button>
    </div>

    <script>
        const Pi = window.Pi;
        let currentUser = null;

        Pi.init({ version: "1.5", sandbox: false });

        async function login() {
            try {
                const scopes = ['username', 'payments'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                currentUser = auth.user;
                document.getElementById('status-text').innerHTML = `مرحباً، ${currentUser.username} 👋 <br> متصل وجاهز ✅`;
                Swal.fire('أهلاً بك يا ' + currentUser.username, 'تم تسجيل دخولك بنجاح في تطبيق نورك', 'success');
            } catch (err) {
                console.error(err);
                Swal.fire('خطأ', 'تأكدي من فتح التطبيق من Pi Browser', 'error');
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("عملية معلقة:", payment.identifier);
        }

        async function initiatePiPayment() {
            if (!currentUser) {
                Swal.fire('تنبيه', 'سجلي دخولك الأول يا بطلة', 'warning');
                return;
            }

            const paymentData = {
                amount: 0.01,
                memo: "دعم تطبيق نورك 🎉",
                metadata: { orderId: "norak_support_1" }
            };

            const callbacks = {
                onReadyForServerApproval: async (paymentId) => {
                    await fetch('/api/pay', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, action: "approve" })
                    });
                },
                onReadyForServerCompletion: async (paymentId, txid) => {
                    await fetch('/api/pay', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, txid, action: "complete" })
                    });
                    Swal.fire('تم بنجاح! 🎉', 'شكراً لدعمك يا ياسمين، نورتينا', 'success');
                },
                onCancel: (pId) => { console.log("إلغاء"); },
                onError: (err, p) => { 
                    console.error(err);
                    Swal.fire('عذراً', 'حاولي مرة ثانية من جوه باي براوزر', 'error');
                }
            };

            try {
                await Pi.createPayment(paymentData, callbacks);
            } catch (err) {
                console.error(err);
            }
        }

        function toggleTheme() {
            document.body.style.backgroundColor = document.body.style.backgroundColor === 'white' ? '#1a1a2e' : 'white';
            document.body.style.color = document.body.style.color === 'black' ? 'white' : 'black';
        }
    </script>
</body>
</html>
