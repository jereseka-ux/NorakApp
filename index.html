<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك | القرآن الكريم كاملًا</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark-bg: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--dark-bg); color: var(--text-color); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* شاشة التحميل الذكية */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.5s; }
        .loader { width: 60px; height: 60px; border: 5px solid #333; border-top: 5px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* الهيدر والتصميم */
        header { background: linear-gradient(180deg, #1a1a1a, var(--dark-bg)); padding: 40px 20px; border-bottom: 2px solid var(--gold); text-align: center; }
        h1 { font-family: 'Amiri', serif; color: var(--gold); font-size: 3rem; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .subtitle { color: #888; font-size: 1.1rem; margin-top: 10px; }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        /* كروت السور */
        .sura-card { background: var(--card-bg); border: 1px solid #333; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .sura-card:hover { border-color: var(--gold); transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .sura-card i { display: block; font-size: 0.8rem; color: var(--gold); margin-bottom: 10px; opacity: 0.7; }
        .sura-card span { font-family: 'Amiri', serif; font-size: 1.4rem; font-weight: bold; color: #fff; }
        
        /* عرض المصحف */
        #reader-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdf6e3; color: #333; z-index: 10000; overflow-y: auto; padding: 40px 20px; box-sizing: border-box; }
        .reader-header { display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto 30px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .close-btn { background: var(--gold); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .quran-text { max-width: 800px; margin: 0 auto; font-family: 'Amiri', serif; font-size: 1.8rem; line-height: 2.5; text-align: justify; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <p style="margin-top: 20px; color: var(--gold); font-size: 1.2rem;">جاري تشغيل نورك...</p>
    </div>

    <div id="app-content">
        <header>
            <h1>نورك</h1>
            <p class="subtitle">القرآن الكريم كاملاً - مشروع ياسمين التقني</p>
        </header>

        <div class="container">
            <div class="grid" id="quran-grid">
                </div>
        </div>
    </div>

    <div id="reader-view">
        <div class="reader-header">
            <h2 id="sura-name" style="font-family: 'Amiri'; margin: 0;">اسم السورة</h2>
            <button class="close-btn" onclick="closeReader()">إغلاق</button>
        </div>
        <div class="quran-text" id="quran-content">
            بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ... (جاري تحميل النص)
        </div>
    </div>

    <script>
        const suras = ["الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس", "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه", "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم", "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر", "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق", "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة", "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج", "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس", "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد", "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات", "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر", "المسد", "الإخلاص", "الفلق", "الناس"];

        const grid = document.getElementById('quran-grid');
        
        // بناء الشبكة
        suras.forEach((name, index) => {
            const card = document.createElement('div');
            card.className = 'sura-card';
            card.innerHTML = `<i>سورة رقم ${index + 1}</i><span>${name}</span>`;
            card.onclick = () => openReader(name);
            grid.appendChild(card);
        });

        function openReader(name) {
            document.getElementById('sura-name').innerText = name;
            document.getElementById('reader-view').style.display = 'block';
            document.body.style.overflow = 'hidden';
            // هنا ممكن نربط API حقيقي للقرآن مستقبلاً
            document.getElementById('quran-content').innerText = "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ. الحمد لله رب العالمين... النص الكامل لسورة " + name + " سيظهر هنا في التحديث القادم.";
        }

        function closeReader() {
            document.getElementById('reader-view').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // تهيئة Pi SDK مع نظام حماية من التعليق
        async function initPi() {
            try {
                if (window.Pi) {
                    await window.Pi.init({ version: "2.0", sandbox: true });
                    console.log("Pi SDK Ready");
                }
            } catch (e) {
                console.log("Not in Pi Browser or SDK Error");
            }
            hideLoading();
        }

        function hideLoading() {
            const loader = document.getElementById('loading-screen');
            loader.style.opacity = '0';
            setTimeout(() => loader.classList.add('hidden'), 500);
        }

        // أمان إضافي: لو عدا 4 ثواني والتحميل مخلصش، افتح التطبيق غصب عنه
        setTimeout(hideLoading, 4000);

        window.onload = initPi;
    </script>
</body>
</html>
