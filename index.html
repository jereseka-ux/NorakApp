<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f0a1a; --card: #1e162d; --accent: #bb86fc; --text: #e0e0e0; --pay: #fed900; }
        .light-mode { --bg: #f5f5f5; --card: #ffffff; --accent: #6200ee; --text: #121212; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; padding-bottom: 70px; }
        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .user-info { font-size: 0.8em; border: 1px solid var(--accent); padding: 5px 10px; border-radius: 15px; }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .fihris-item { display: flex; justify-content: space-between; align-items: center; }
        .quran-content { line-height: 2; font-size: 1.3em; text-align: center; white-space: pre-wrap; }
        .subha-container { text-align: center; margin-top: 50px; }
        .subha-btn { width: 180px; height: 180px; border: 10px solid var(--accent); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 4em; cursor: pointer; }
        .pay-btn { background: var(--pay); color: #000; border: none; padding: 15px 30px; border-radius: 25px; font-weight: bold; width: 100%; font-size: 1.1em; cursor: pointer; }
        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid var(--accent); }
        .nav-item { flex: 1; text-align: center; padding: 12px; font-size: 0.8em; cursor: pointer; color: #888; }
        .nav-item.selected { color: var(--accent); }
    </style>
</head>
<body id="mainBody">

<header>
    <div class="user-info" id="username_box">تحقق...</div>
    <div style="font-weight: bold; color: var(--accent);">نورك</div>
    <i class="fas fa-adjust" onclick="toggleTheme()" style="cursor: pointer;"></i>
</header>

<div id="quran-page" class="page active">
    <div id="quran-view" style="display:none;">
        <button onclick="closeQuran()" style="background:none; border:1px solid var(--accent); color:var(--text); padding:5px 15px; border-radius:5px; margin-bottom:10px;">رجوع</button>
        <div class="card quran-content" id="quran-text-box"></div>
    </div>
    <div id="fihris-box">
        <h3>الفهرس (30 جزء)</h3>
        <div id="dynamic-fihris"></div>
    </div>
</div>

<div id="azkar-page" class="page">
    <h3>الأذكار</h3>
    <div class="card" onclick="openAzkar('صباح')">أذكار الصباح</div>
    <div class="card" onclick="openAzkar('مساء')">أذكار المساء</div>
    <div class="card" onclick="openAzkar('رقية')">الرقية الشرعية</div>
</div>

<div id="subha-page" class="page">
    <div class="subha-container">
        <div class="subha-btn" id="s-count" onclick="pressSubha()">0</div>
        <p>سبح واستغفر</p>
        <button onclick="resetSubha()" style="background:none; border:none; color:#888; cursor:pointer;">تصفير</button>
    </div>
</div>

<div id="pay-page" class="page" style="text-align:center;">
    <div class="card" style="margin-top:40px;">
        <i class="fas fa-coins" style="font-size:3em; color:var(--pay);"></i>
        <h2>دعم التطبيق</h2>
        <p>تفعيل كافة المميزات بـ 0.1 Pi</p>
        <button class="pay-btn" onclick="initiatePayment()">تأكيد الدفع</button>
        <p id="p-status" style="margin-top:10px; font-size:0.8em;"></p>
    </div>
</div>

<nav>
    <div class="nav-item selected" onclick="tab('quran-page', this)"><i class="fas fa-book"></i><br>القرآن</div>
    <div class="nav-item" onclick="tab('azkar-page', this)"><i class="fas fa-heart"></i><br>الأذكار</div>
    <div class="nav-item" onclick="tab('subha-page', this)"><i class="fas fa-fingerprint"></i><br>المسبحة</div>
    <div class="nav-item" onclick="tab('pay-page', this)"><i class="fas fa-wallet"></i><br>الدفع</div>
</nav>

<script>
    const Pi = window.Pi;
    let count = parseInt(localStorage.getItem('nrk_s')) || 0;

    async function start() {
        try {
            await Pi.init({ version: "2.0", sandbox: false });
            const auth = await Pi.authenticate(['username', 'payments'], onIncomplete);
            document.getElementById('username_box').innerText = auth.user.username;
        } catch(e) { document.getElementById('username_box').innerText = "زائر"; }
        renderFihris();
        document.getElementById('s-count').innerText = count;
        if(localStorage.getItem('nrk_dark') === 'N') toggleTheme();
    }

    function renderFihris() {
        const box = document.getElementById('dynamic-fihris');
        for(let i=1; i<=30; i++) {
            box.innerHTML += `<div class="card fihris-item" onclick="openJuz(${i})">الجزء رقم ${i} <i class="fas fa-chevron-left"></i></div>`;
        }
    }

    function openJuz(id) {
        document.getElementById('fihris-box').style.display = 'none';
        const v = document.getElementById('quran-view');
        v.style.display = 'block';
        document.getElementById('quran-text-box').innerText = `بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ\n\n نَص الجزء رقم ${id} كاملاً يتم استدعاؤه هنا...`;
    }

    function openAzkar(type) {
        tab('quran-page');
        document.getElementById('fihris-box').style.display = 'none';
        document.getElementById('quran-view').style.display = 'block';
        const texts = {'صباح': "أذكار الصباح كاملة...", 'مساء': "أذكار المساء كاملة...", 'رقية': "الرقية الشرعية كاملة..."};
        document.getElementById('quran-text-box').innerText = texts[type];
    }

    function closeQuran() {
        document.getElementById('quran-view').style.display = 'none';
        document.getElementById('fihris-box').style.display = 'block';
    }

    function tab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('selected'));
            el.classList.add('selected');
        }
    }

    function pressSubha() {
        count++; document.getElementById('s-count').innerText = count;
        localStorage.setItem('nrk_s', count);
        if(navigator.vibrate) navigator.vibrate(50);
    }

    function resetSubha() { count = 0; document.getElementById('s-count').innerText = 0; localStorage.setItem('nrk_s', 0); }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('nrk_dark', document.body.classList.contains('light-mode') ? 'N' : 'Y');
    }

    async function initiatePayment() {
        const s = document.getElementById('p-status');
        s.innerText = "جاري الاتصال بالمحفظة...";
        try {
            await Pi.createPayment({
                amount: 0.1, memo: "دعم تطبيق نورك", metadata: { type: "support" }
            }, {
                onReadyForServerApproval: (id) => s.innerText = "تمت الموافقة، بانتظار الخادم...",
                onReadyForServerCompletion: (id, tx) => { s.innerText = "تم الدفع بنجاح!"; alert("شكراً لك!"); },
                onCancel: (id) => s.innerText = "تم الإلغاء.",
                onError: (e) => s.innerText = "خطأ في المحفظة."
            });
        } catch(e) { s.innerText = "افتح من متصفح Pi"; }
    }

    function onIncomplete(p) {}
    window.onload = start;
</script>
</body>
</html>
