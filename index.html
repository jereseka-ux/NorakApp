<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - Norak</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p-purple: #673AB7; --d-purple: #311B92; --bg: #f4f7f6; --txt: #2c3e50; --card: #ffffff; }
        .dark-mode { --bg: #1a1a2e; --txt: #e0e0e0; --card: #16213e; background: #1a1a2e; color: #e0e0e0; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--txt); transition: 0.3s; padding-bottom: 90px; }
        .quran-font { font-family: 'Amiri', serif; line-height: 2.2; }
        .card-custom { background: var(--card); border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.2s; }
        .dark-mode .card-custom { border: 1px solid #ffffff10; }
        .tab-content { display: none; }
        .active-tab { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; padding: 10px 0; z-index: 100; border-top: 1px solid #eee; }
        .dark-mode .bottom-bar { border-top: 1px solid #ffffff10; }
        .nav-btn { flex: 1; text-align: center; color: #888; font-size: 12px; border: none; background: none; outline: none !important; }
        .nav-btn.active { color: var(--p-purple); font-weight: bold; }
    </style>
</head>
<body>

    <header class="bg-[#311B92] text-white p-6 rounded-b-[30px] shadow-lg mb-6">
        <div class="flex justify-between items-center">
            <div><h1 class="text-3xl font-bold">نورك</h1><p class="text-xs opacity-80">تطبيقك الإسلامي المتكامل يا ياسمين</p></div>
            <button onclick="toggleLight()" class="text-2xl"><i id="light-icon" class="fas fa-moon"></i></button>
        </div>
    </header>

    <div class="container mx-auto px-4 max-w-lg">

        <section id="content-quran" class="tab-content active-tab">
            <div class="flex gap-2 mb-4">
                <button onclick="toggleQuranList('juz')" id="juz-btn" class="flex-1 py-2 bg-purple-600 text-white rounded-lg font-bold">الأجزاء</button>
                <button onclick="toggleQuranList('surah')" id="surah-btn" class="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold">السور</button>
            </div>
            
            <div id="juz-grid" class="grid grid-cols-2 gap-4"></div>
            <div id="surah-list" class="hidden space-y-2"></div>
        </section>

        <section id="content-azkar" class="tab-content">
            <div class="space-y-4">
                <div class="card-custom p-4 flex items-center gap-4 cursor-pointer" onclick="showAzkar('morning')">
                    <i class="fas fa-sun text-orange-400 text-2xl"></i><div><h3 class="font-bold">أذكار الصباح</h3></div>
                </div>
                <div class="card-custom p-4 flex items-center gap-4 cursor-pointer" onclick="showAzkar('evening')">
                    <i class="fas fa-moon text-blue-400 text-2xl"></i><div><h3 class="font-bold">أذكار المساء</h3></div>
                </div>
            </div>
        </section>

        <section id="content-sebha" class="tab-content text-center py-10">
            <div class="inline-block p-10 rounded-full border-8 border-purple-500 card-custom mb-8">
                <div id="sebha-count" class="text-6xl font-bold text-purple-600">0</div>
            </div><br>
            <button onclick="countSebha()" class="w-32 h-32 bg-[#673AB7] rounded-full text-white text-2xl shadow-lg active:scale-90 transition">سبّح</button>
        </section>

        <section id="content-settings" class="tab-content">
            <div id="bookmark-card" class="hidden card-custom p-4 mb-4 border-2 border-yellow-500 bg-yellow-50">
                <p id="bookmark-info" class="text-sm font-bold mb-2"></p>
                <button onclick="goToBookmark()" class="w-full bg-yellow-500 text-white py-2 rounded-lg text-sm font-bold">مواصلة القراءة</button>
            </div>
            <div class="card-custom p-6 mb-4">
                <h3 class="font-bold text-purple-700 mb-2">الخطوة 10 - Pi Network</h3>
                <button onclick="startPiPayment()" class="w-full bg-amber-400 hover:bg-amber-500 text-black font-bold py-3 rounded-xl shadow-md transition">دفع 1 Pi للتفعيل</button>
                <div id="payment-status" class="mt-2 text-center text-[11px] font-bold text-green-600">جاري الاتصال بالمحفظة...</div>
            </div>
            <div class="card-custom p-4">
                <label class="block mb-2 font-bold text-sm">حجم الخط: <span id="font-size-val">22</span>px</label>
                <input type="range" min="18" max="45" value="22" class="w-full accent-purple-600" id="font-slider">
            </div>
        </section>
    </div>

    <div id="reader-modal" class="fixed inset-0 bg-black/70 z-[200] hidden flex flex-col justify-end">
        <div class="bg-white dark-mode:bg-gray-900 w-full h-[92vh] rounded-t-[30px] p-6 overflow-hidden flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b pb-4">
                <div class="flex gap-4">
                    <button onclick="closeReader()" class="text-xl p-2"><i class="fas fa-times"></i></button>
                    <button onclick="saveCurrentPosition()" id="save-mark-btn" class="text-xl text-gray-400 p-2"><i class="fas fa-bookmark"></i></button>
                </div>
                <h3 id="modal-title" class="text-lg font-bold text-purple-800"></h3>
            </div>
            <div id="modal-content" class="overflow-y-auto quran-font text-center p-4"></div>
        </div>
    </div>

    <nav class="bottom-bar">
        <button onclick="switchTab('quran')" id="btn-quran" class="nav-btn active"><i class="fas fa-quran text-xl mb-1"></i><br>القرآن</button>
        <button onclick="switchTab('azkar')" id="btn-azkar" class="nav-btn"><i class="fas fa-pray text-xl mb-1"></i><br>الأذكار</button>
        <button onclick="switchTab('sebha')" id="btn-sebha" class="nav-btn"><i class="fas fa-beads text-xl mb-1"></i><br>المسبحة</button>
        <button onclick="switchTab('settings')" id="btn-settings" class="nav-btn"><i class="fas fa-cog text-xl mb-1"></i><br>الإعدادات</button>
    </nav>

    <script>
        const Pi = window.Pi; Pi.init({ version: "1.5", sandbox: true });
        let currentReadingData = { type: '', id: '', title: '' };

        // --- نظام القرآن ---
        function initQuran() {
            const juzGrid = document.getElementById('juz-grid');
            for(let i=1; i<=30; i++) {
                juzGrid.innerHTML += `<div class="card-custom p-4 text-center cursor-pointer border-r-4 border-purple-600" onclick="loadContent('juz', ${i}, 'الجزء ${i}')">
                    <span class="text-2xl font-bold text-purple-700">${i}</span></div>`;
            }
            fetch('https://api.alquran.cloud/v1/surah').then(res => res.json()).then(data => {
                const list = document.getElementById('surah-list');
                data.data.forEach(s => {
                    list.innerHTML += `<div class="card-custom p-3 flex justify-between items-center cursor-pointer px-6" onclick="loadContent('surah', ${s.number}, 'سورة ${s.name}')">
                        <span class="text-purple-700 font-bold">${s.number}. ${s.name}</span>
                        <span class="text-xs opacity-50">${s.englishName}</span></div>`;
                });
            });
        }

        async function loadContent(type, id, title) {
            const modal = document.getElementById('reader-modal');
            const content = document.getElementById('modal-content');
            currentReadingData = { type: type, id: id, title: title };
            document.getElementById('modal-title').innerText = title;
            content.innerHTML = `<i class="fas fa-spinner fa-spin text-2xl text-purple-500"></i>`;
            modal.classList.remove('hidden');
            document.getElementById('save-mark-btn').className = "text-xl text-gray-400 p-2";
            
            // تطبيق حجم الخط الحالي عند فتح المودال
            const currentSize = document.getElementById('font-slider').value + 'px';
            content.style.fontSize = currentSize;

            const url = type === 'juz' ? `https://api.alquran.cloud/v1/juz/${id}/quran-uthmani` : `https://api.alquran.cloud/v1/surah/${id}/quran-uthmani`;
            try {
                const res = await fetch(url); const data = await res.json();
                let txt = "";
                data.data.ayahs.forEach(a => { txt += ` ${a.text} <span class="text-purple-600 font-bold mx-1">﴿${a.numberInSurah}﴾</span> `; });
                content.innerHTML = `<div class="text-right">${txt}</div>`;
            } catch (e) { content.innerHTML = "حدث خطأ في الاتصال."; }
        }

        function toggleQuranList(type) {
            document.getElementById('juz-grid').classList.toggle('hidden', type !== 'juz');
            document.getElementById('surah-list').classList.toggle('hidden', type !== 'surah');
            document.getElementById('juz-btn').className = type === 'juz' ? 'flex-1 py-2 bg-purple-600 text-white rounded-lg font-bold' : 'flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold';
            document.getElementById('surah-btn').className = type === 'surah' ? 'flex-1 py-2 bg-purple-600 text-white rounded-lg font-bold' : 'flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold';
        }

        // --- الميكانيكا (التصحيحات الجديدة) ---
        // تصحيح ربط حجم الخط، دلوقتي بيغير الخط فعلاً
        document.getElementById('font-slider').oninput = function() {
            const val = this.value + 'px';
            document.getElementById('modal-content').style.fontSize = val;
            document.getElementById('font-size-val').innerText = this.value;
        };

        function saveCurrentPosition() {
            localStorage.setItem('noork_save', JSON.stringify(currentReadingData));
            document.getElementById('save-mark-btn').className = "text-xl text-yellow-500 p-2";
            alert('تم الحفظ!'); checkBookmark();
        }

        function checkBookmark() {
            const saved = localStorage.getItem('noork_save');
            if(saved) {
                const data = JSON.parse(saved);
                document.getElementById('bookmark-card').classList.remove('hidden');
                document.getElementById('bookmark-info').innerText = "واصل قراءة: " + data.title;
            }
        }

        function goToBookmark() {
            const d = JSON.parse(localStorage.getItem('noork_save'));
            loadContent(d.type, d.id, d.title);
        }

        // --- الوظائف الباقية (مسبحة، تابات، دفع) ---
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-'+t).classList.add('active-tab');
            document.getElementById('btn-'+t).classList.add('active');
            if(t==='settings') checkBookmark();
        }

        let cCount = 0; function countSebha() { cCount++; document.getElementById('sebha-count').innerText = cCount; }
        function toggleLight() { document.body.classList.toggle('dark-mode'); }
        function closeReader() { document.getElementById('reader-modal').classList.add('hidden'); }
        
        // تصحيح زرار الدفع لتفعيله
        async function startPiPayment() {
            document.getElementById('payment-status').innerText = "⏳ جاري تحضير المحفظة..";
            try { await Pi.createPayment({ amount: 1, memo: "تفعيل نورك (ياسمين)", metadata: { type: "activation" } }, {
                onReadyForServerCompletion: () => { document.getElementById('payment-status').innerText = "✅ تم التفعيل بنجاح! راجعي الـ Checklist."; alert("مبروك! تمت العملية."); }
            }); } catch(e) { document.getElementById('payment-status').innerText = "⚠️ تأكدي من فتح التطبيق في Pi Browser."; }
        }

        window.onload = () => { initQuran(); checkBookmark(); };
    </script>
</body>
</html>
