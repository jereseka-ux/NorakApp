<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f4; }
        .box { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .main-btn { background-color: #673ab7; color: white; padding: 15px 35px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>تطبيق نورك (الربط)</h1>
        <button class="main-btn" onclick="connectPi()">اضغطي هنا للربط</button>
        <div id="status" style="margin-top:15px; color: #555;"></div>
    </div>
    <script>
        window.onload = function() { if (window.Pi) { window.Pi.init({ version: "2.0", sandbox: true }); } };
        async function connectPi() {
            if (window.Pi) {
                try {
                    const auth = await window.Pi.authenticate(['payments', 'username'], function(p){});
                    alert("تم الربط بنجاح يا " + auth.user.username);
                } catch (e) { alert("خطأ: " + e.message); }
            } else { alert("افتحي من Pi Browser"); }
        }
    </script>
</body>
</html>
