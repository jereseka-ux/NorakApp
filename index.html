<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق Norak للقرآن الكريم</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #f4f7f6;
            --accent-color: #27ae60;
            --font-color: #333;
            --bg-color: #ffffff;
            --sidebar-bg: #ffffff;
        }

        .dark-mode {
            --primary-color: #1a252f;
            --secondary-color: #2c3e50;
            --font-color: #ecf0f1;
            --bg-color: #34495e;
            --sidebar-bg: #2c3e50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--font-color);
            transition: 0.3s;
            overflow: hidden;
        }

        #app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 100;
        }

        #side-menu {
            width: 250px;
            background-color: var(--sidebar-bg);
            border-left: 1px solid #ddd;
            position: fixed;
            right: -250px;
            top: 0;
            height: 100%;
            transition: 0.3s;
            z-index: 1000;
            overflow-y: auto;
            padding-top: 60px;
        }

        #side-menu.open {
            right: 0;
        }

        .surah-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: block;
            text-decoration: none;
            color: var(--font-color);
        }

        .surah-item:hover {
            background-color: var(--secondary-color);
        }

        #main-content {
            flex-grow: 1;
            padding: 80px 20px 20px;
            overflow-y: auto;
            text-align: center;
        }

        .ayah {
            font-size: 1.4em;
            line-height: 2.2;
            margin-bottom: 15px;
            display: inline-block;
        }

        button {
            background: none;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 500;
        }

        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="side-menu">
            <div id="surah-list"></div>
        </div>

        <div class="overlay" id="overlay"></div>

        <div id="main-content">
            <header>
                <button onclick="toggleMenu()">☰</button>
                <h2>Norak</h2>
                <button onclick="toggleTheme()">🌙</button>
            </header>

            <div id="reading-area">
                <h3 id="surah-title">اختر سورة من القائمة</h3>
                <div id="content-body"></div>
            </div>
        </div>
    </div>

    <script>
        // تفعيل الـ Pi SDK
        const Pi = window.Pi;
        if (Pi) { Pi.init({ version: "2.0", sandbox: true }); }

        const surahList = document.getElementById('surah-list');
        const contentBody = document.getElementById('content-body');
        const surahTitle = document.getElementById('surah-title');
        const sideMenu = document.getElementById('side-menu');
        const overlay = document.getElementById('overlay');

        // جلب قائمة السور
        async function getSurahs() {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            surahList.innerHTML = data.data.map(s => `
                <div class="surah-item" onclick="getAyahs(${s.number}, '${s.name}')">
                    ${s.number}. ${s.name}
                </div>
            `).join('');
        }

        // جلب آيات السورة
        async function getAyahs(num, name) {
            toggleMenu();
            surahTitle.innerText = name;
            contentBody.innerHTML = "جاري التحميل...";
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}`);
            const data = await res.json();
            contentBody.innerHTML = data.data.ayahs.map(a => `
                <span class="ayah">${a.text} ﴿${a.numberInSurah}﴾</span>
            `).join(' ');
            document.getElementById('main-content').scrollTop = 0;
        }

        function toggleMenu() {
            sideMenu.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        overlay.onclick = toggleMenu;

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }

        getSurahs();
    </script>
</body>
</html>
