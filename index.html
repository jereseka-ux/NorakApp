<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نورك - Norak</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #212121;
            --card-bg: #f9f9f9;
            --accent-color: #4a148c;
        }
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --accent-color: #bb86fc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.3s;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 500px;
            margin-bottom: 20px;
        }
        #s-content {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
            line-height: 2;
            font-size: 20px;
            text-align: justify;
        }
        .controls {
            margin-top: 25px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            background-color: var(--accent-color);
            color: white;
        }
    </style>
</head>
<body data-theme="light">

    <div class="header">
        <h2 id="s-name">نورك</h2>
        <button onclick="toggleTheme()">🌙/☀️</button>
    </div>

    <div id="s-content">
        جاري تحميل المحتوى...
    </div>

    <div class="controls">
        <button onclick="saveBookmark()">حفظ العلامة 📌</button>
        <button onclick="pay()" style="background-color: #ffa000;">تبرع (Pi) π</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        // 1. نظام الـ Dark Mode
        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
        }

        // 2. نظام الـ Bookmark (حفظ مكان القراءة)
        function saveBookmark() {
            const data = {
                n: document.getElementById('s-name').innerText,
                c: document.getElementById('s-content').innerHTML,
                t: Date.now()
            };
            localStorage.setItem('user_mark', JSON.stringify(data));
            alert("تم حفظ مكانك بنجاح! 📌");
        }

        // 3. تحميل البيانات عند الفتح
        function loadM() {
            // استرجاع الثيم
            const savedTheme = localStorage.getItem('theme');
            if(savedTheme) document.body.setAttribute('data-theme', savedTheme);

            // استرجاع المحتوى
            const saved = JSON.parse(localStorage.getItem('user_mark'));
            if (saved) {
                document.getElementById('s-name').innerText = saved.n;
                document.getElementById('s-content').innerHTML = saved.c;
            }
        }

        // 4. كود الدفع الذكي (النسخة الاحترافية النهائية)
        async function pay() {
            try {
                const auth = await Pi.authenticate(['payments'], (p) => {
                    console.log("Incomplete payment found", p);
                });

                if (auth) {
                    Pi.createPayment({
                        amount: 0.1,
                        memo: "Support Norak App",
                        metadata: { orderId: "n_" + Date.now() }
                    }, {
                        onReadyForServerApproval: (id) => Pi.approvePayment(id),
                        onReadyForServerCompletion: (id, tx) => Pi.completePayment(id, tx),
                        onComplete: (id) => alert("تقبل الله، تم التبرع بنجاح."),
                        onError: (err) => console.error(err),
                        onCancel: (id) => console.log("Cancelled", id)
                    });
                }
            } catch (e) {
                alert("برجاء فتح التطبيق من خلال Pi Browser.");
            }
        }

        window.onload = loadM;
    </script>
</body>
</html>
