<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - Norak</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        /* ستايل سريع عشان الصور تظهر والواجهة تبقى مريحة */
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 8px rgba(0,0,0,0.1); }
        img { max-width: 100%; height: auto; border-radius: 10px; margin-bottom: 20px; }
        button { background-color: #6d28d9; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 18px; width: 100%; margin-top: 20px; }
        button:hover { background-color: #5b21b6; }
        .status { margin-top: 10px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="شعار نورك" onerror="this.src='https://via.placeholder.com/150?text=Norak+Logo'">
        
        <h1>مرحباً بكم في تطبيق نورك</h1>
        <p>تطبيقك الإيماني المتكامل على شبكة Pi</p>

        <div id="user-info" class="status">جاري التحقق من اتصالك بشبكة باي...</div>

        <button onclick="transferPi()">دعم بـ 1 Pi</button>

        <div id="payment-status" class="status"></div>
    </div>

    <script>
        // 2. إعدادات البداية - ركزي هنا "sandbox: true" هي اللي هتفتح الخطوة 6
        Pi.init({ version: "2.0", sandbox: true });

        // 3. تسجيل دخول المستخدم تلقائياً عند فتح التطبيق
        const scopes = ['username', 'payments'];

        function onIncompletePaymentFound(payment) {
            console.log("يوجد عملية دفع معلقة:", payment);
            // هنا ممكن نكلم السيرفر بتاعنا لو عايزين نسجل العملية
        };

        Pi.authenticate(scopes, onIncompletePaymentFound).then(function(auth) {
            document.getElementById('user-info').innerText = "أهلاً بك يا " + auth.user.username;
            console.log("تم تسجيل الدخول بنجاح!");
        }).catch(function(error) {
            document.getElementById('user-info').innerText = "يرجى فتح التطبيق من داخل Pi Browser الرسمي";
            console.error(error);
        });

        // 4. وظيفة الدفع الفعلي (التي تظهر في الصورة اللي بعتيها)
        function transferPi() {
            const paymentData = {
                amount: 1,
                memo: "دعم تطوير تطبيق نورك",
                metadata: { orderId: 12345 }
            };

            const callbacks = {
                onReadyForServerApproval: function(paymentId) {
                    console.log("الدفع جاهز للموافقة:", paymentId);
                    // في مرحلة الـ Mainnet هنحتاج سيرفر يوافق، حالياً الساند بوكس هيعديها
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    console.log("اكتمل الدفع بنجاح! رقم العملية:", txid);
                    document.getElementById('payment-status').innerText = "شكراً لدعمك! تم التحويل بنجاح.";
                },
                onCancel: function(paymentId) { console.log("تم إلغاء العملية"); },
                onError: function(error, payment) { console.error("خطأ في الدفع:", error); }
            };

            Pi.createPayment(paymentData, callbacks);
        }
    </script>

</body>
</html>
