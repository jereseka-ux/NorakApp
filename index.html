<script>
// ================= PI INIT =================
Pi.init({
    version: "2.0",
    sandbox: true   // مهم جداً لخطوة 10
});

let currentUser = null;

// ================= LOGIN =================
async function login() {
    try {
        const scopes = ['username'];
        currentUser = await Pi.authenticate(scopes);
        alert("تم تسجيل الدخول: " + currentUser.user.username);
    } catch (e) {
        alert("فشل تسجيل الدخول");
    }
}

// ================= PAYMENT =================
function pay() {

    if (!currentUser) {
        alert("سجل الدخول الأول");
        return;
    }

    const payment = {
        amount: 1,
        memo: "Support NorakApp",
        metadata: { type: "donation" }
    };

    const callbacks = {

        onReadyForServerApproval: function(paymentId) {
            console.log("approval", paymentId);

            // fake server approval (sandbox)
            setTimeout(() => {
                console.log("approved");
            }, 1000);
        },

        onReadyForServerCompletion: function(paymentId, txid) {
            console.log("complete", txid);
        },

        onCancel: function() {
            alert("تم إلغاء الدفع");
        },

        onError: function(err) {
            console.error(err);
        }
    };

    Pi.createPayment(payment, callbacks);
}
