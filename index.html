<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - NOURK</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --primary-color: #6d28d9;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --accent: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 20px;
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), #4c1d95);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .logo { width: 80px; border-radius: 50%; border: 3px solid #fff; }

        .container { width: 90%; max-width: 500px; margin-top: 20px; }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .counter-val { font-size: 3rem; font-weight: bold; color: var(--accent); margin: 10px 0; }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin: 5px 0;
        }

        button:active { transform: scale(0.95); }

        .btn-vip {
            background: linear-gradient(45deg, #f59e0b, #d97706);
            font-weight: bold;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
        }

        .surah-list { text-align: right; list-style: none; padding: 0; }
        .surah-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://norak-app.vercel.app/logo.png" alt="Nourk Logo" class="logo" onerror="this.src='https://via.placeholder.com/80'">
        <h1>نورك (NOURK)</h1>
        <p id="user-status">جاري الاتصال بشبكة باي...</p>
    </div>

    <div class="container">
        <div class="card">
            <h3>السبحة الإلكترونية</h3>
            <div id="counter" class="counter-val">0</div>
            <button onclick="count()">تسبيح</button>
            <button style="background: #ef4444; width: auto; font-size: 0.8rem;" onclick="reset()">تصفير</button>
        </div>

        <div class="card">
            <h3>مميزات الـ VIP</h3>
            <p>فعل العضوية الآن بـ 3.14 باي فقط</p>
            <button class="btn-vip" onclick="payWithPi()">تفعيل VIP الآن 💎</button>
        </div>

        <div class="card">
            <h3>فهرس السور</h3>
            <ul class="surah-list">
                <li class="surah-item"><span>1. سورة الفاتحة</span> <span>7 آيات</span></li>
                <li class="surah-item"><span>2. سورة البقرة</span> <span>286 آية</span></li>
            </ul>
        </div>
    </div>

    <script>
        // 1. تعريف المتغيرات والسبحة
        let countVal = 0;
        const counterEl = document.getElementById('counter');
        function count() { countVal++; counterEl.innerText = countVal; }
        function reset() { countVal = 0; counterEl.innerText = countVal; }

        // 2. ربط Pi SDK
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        // 3. تسجيل دخول المستخدم تلقائياً
        async function authenticateUser() {
            try {
                const scopes = ['username', 'payments'];
                const user = await Pi.authenticate(scopes, (payment) => {
                    console.log("Payment incomplete:", payment);
                });
                document.getElementById('user-status').innerText = "مرحباً، " + user.user.username + " ✅";
            } catch (err) {
                document.getElementById('user-status').innerText = "فشل الاتصال بالشبكة";
                console.error(err);
            }
        }
        authenticateUser();

        // 4. دالة الدفع الذكية
        async function payWithPi() {
            try {
                const payment = await Pi.createPayment({
                    amount: 3.14,
                    memo: "عضوية VIP - تطبيق نورك",
                    metadata: { itemId: "vip_01" },
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        console.log("الطلب بانتظار الموافقة:", paymentId);
                        // هنا التطبيق "بينطق" ويفهم إن المفتاح جاهز
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("مبروك! تم تفعيل الـ VIP بنجاح 🎉");
                    },
                    onCancel: (pId) => console.log("تم الإلغاء"),
                    onError: (error) => {
                        console.error(error);
                        alert("عذراً، تأكد من فتح التطبيق من Sandbox في Pi Browser");
                    }
                });
            } catch (err) {
                alert("حدث خطأ تقني، حاول مرة أخرى");
            }
        }
    </script>
</body>
</html>
