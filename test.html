<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نورك - الدفع</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .logo { width: 100px; margin-bottom: 20px; }
        .main-btn { background-color: #673ab7; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .pay-btn { background-color: #ff9800; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
        #status { margin-top: 15px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>تطبيق نورك</h1>
    <button class="main-btn" onclick="connectPi()">1. ربط المحفظة</button>
    <button class="pay-btn" onclick="transferPi()">2. دفع 1 Pi (تجريبي)</button>
    <div id="status">جاهز...</div>
</div>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true });

    async function connectPi() {
        try {
            const auth = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
            document.getElementById('status').innerText = "أهلاً يا " + auth.user.username;
        } catch (e) {
            alert("افتحي من Pi Browser");
        }
    }

    async function transferPi() {
        try {
            const payment = await Pi.createPayment({
                amount: 1,
                memo: "تجربة دفع في تطبيق نورك",
                metadata: { orderId: 123 }
            }, {
                onReadyForServerApproval: (paymentId) => { console.log("جاهز للموافقة:", paymentId); },
                onReadyForServerCompletion: (paymentId, txid) => { console.log("اكتمل الدفع:", txid); },
                onCancel: (paymentId) => { document.getElementById('status').innerText = "تم إلغاء الدفع"; },
                onError: (error, payment) => { console.error("خطأ:", error); }
            });
            document.getElementById('status').innerText = "تم الدفع بنجاح!";
        } catch (e) {
            document.getElementById('status').innerText = "فشل الدفع";
        }
    }

    function onIncompletePaymentFound(payment) { /* للمدفوعات المعلقة */ };
</script>

</body>
</html>
