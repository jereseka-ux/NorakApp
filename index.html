<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تطبيق نُورك - Norak v2.0</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #151515; --accent: #bb86fc; --text: #e0e0e0; --sub: #999; --gold: #ffcc00; }
        [data-theme="light"] { --bg: #f5f5f5; --card: #ffffff; --accent: #6200ee; --text: #1a1a1a; --sub: #666; --gold: #b8860b; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 90px; transition: 0.3s; }
        .header { background: var(--card); padding: 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--accent); }
        .user-tag { font-size: 0.8rem; color: var(--accent); font-weight: bold; border: 1.5px solid var(--accent); padding: 4px 12px; border-radius: 20px; }
        .controls-bar { display: flex; justify-content: space-around; background: var(--card); padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-tool { border: none; background: none; color: var(--accent); font-size: 1.4rem; cursor: pointer; }
        .container { padding: 15px; max-width: 650px; margin: 0 auto; min-height: 75vh; }
        .card { background: var(--card); margin-bottom: 12px; padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .quran-text { line-height: 2.6; text-align: justify; padding: 20px; font-size: 1.5rem; background: var(--card); border-radius: 15px; }
        .ayah-num { color: var(--accent); font-weight: bold; border: 1px solid var(--accent); border-radius: 50%; padding: 2px 8px; font-size: 0.85rem; margin: 0 6px; display: inline-block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; padding: 12px 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.4); }
        .nav-link { flex: 1; border: none; background: none; color: var(--sub); text-align: center; font-size: 0.85rem; cursor: pointer; }
        .nav-link.active { color: var(--accent); font-weight: bold; }
        .nav-link i { display: block; font-size: 1.6rem; margin-bottom: 4px; }
        .sebha-circle { width: 200px; height: 200px; border-radius: 50%; border: 8px solid var(--accent); margin: 40px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; background: radial-gradient(circle, var(--card), var(--bg)); }
        .back-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; margin-bottom: 20px; cursor: pointer; font-weight: bold; }
        .category-title { color: var(--accent); border-right: 4px solid var(--accent); padding-right: 10px; margin: 20px 0; }
    </style>
</head>
<body data-theme="dark">

<div class="header">
    <div class="user-tag" id="user_display">تحميل...</div>
    <h2 style="margin:0; color:var(--accent);">نُورك</h2>
    <i class="fas fa-moon" id="theme_toggle" onclick="toggleTheme()" style="font-size: 1.5rem; cursor: pointer; color: var(--accent);"></i>
</div>

<div class="controls-bar" id="reading_tools" style="display:none;">
    <button class="btn-tool" onclick="adjustFont(2)"><i class="fas fa-plus-circle"></i></button>
    <button class="btn-tool" onclick="adjustFont(-2)"><i class="fas fa-minus-circle"></i></button>
    <button class="btn-tool" onclick="saveBookmark()"><i class="fas fa-bookmark"></i></button>
    <button class="btn-tool" onclick="loadBookmark()"><i class="fas fa-history"></i></button>
</div>

<div class="container" id="view_area"></div>

<nav class="nav-bar">
    <button class="nav-link" onclick="loadPage('quran', this)"><i class="fas fa-book-quran"></i>القرآن</button>
    <button class="nav-link" onclick="loadPage('azkar', this)"><i class="fas fa-hands-praying"></i>الأذكار</button>
    <button class="nav-link" onclick="loadPage('sebha', this)"><i class="fas fa-fingerprint"></i>المسبحة</button>
    <button class="nav-link" onclick="handlePay()" style="color: var(--gold);"><i class="fas fa-heart"></i>دعم نُورك</button>
</nav>

<script>
const Pi = window.Pi;
// تنبيه: لو بتجربي على رابط Vercel خارجي، Sandbox ساعات بيمنع الـ Auth
Pi.init({ version: "2.0", sandbox: true });

let appState = {
    font: parseInt(localStorage.getItem('noork_font')) || 24,
    count: parseInt(localStorage.getItem('noork_count')) || 0,
    currentJuz: null,
    user: null
};

const azkarData = {
    'أذكار الصباح': ["أصبحنا وأصبح الملك لله، والحمد لله", "يا حي يا قيوم برحمتك أستغيث", "اللهم بك أصبحنا، وبك أمسينا"],
    'أذكار المساء': ["أمسينا وأمسى الملك لله، والحمد لله", "اللهم ما أمسى بي من نعمة فمنك وحدك"],
    'أدعية قرآنية': ["ربنا آتنا في الدنيا حسنة وفي الآخرة حسنة", "رب إني لما أنزلت إلي من خير فقير"]
};

const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

async function onIncompletePayment(payment) {
    console.log("Handling incomplete payment...", payment.identifier);
    return fetch('/api/complete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
    });
}

// الدالة المسؤولة عن سحب اليوزر نيم فوراً
async function init() {
    try {
        const auth = await Pi.authenticate(['username', 'payments'], onIncompletePayment);
        appState.user = auth.user;
        document.getElementById('user_display').innerText = auth.user.username;
        console.log("User authenticated:", auth.user.username);
    } catch(e) {
        console.error("Auth failed:", e);
        document.getElementById('user_display').innerText = "زائر";
    }
    loadPage('quran', document.querySelectorAll('.nav-link')[0]);
}

function loadPage(page, btn) {
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    if(btn) btn.classList.add('active');
    const view = document.getElementById('view_area');
    document.getElementById('reading_tools').style.display = (page === 'quran')? 'flex' : 'none';

    if(page === 'quran') {
        view.innerHTML = '<h3 class="category-title">الفهرس</h3>';
        for(let i=1; i<=114; i++) {
            view.innerHTML += `<div class="card" onclick="fetchQuran(${i})">
                <span><i class="fas fa-book" style="margin-left:10px; color:var(--accent)"></i> ${i}. سورة ${surahNames[i-1]}</span>
                <i class="fas fa-chevron-left"></i>
            </div>`;
        }
    } else if(page === 'azkar') {
        view.innerHTML = '<h3 class="category-title">مكتبة نُورك للأذكار</h3>';
        Object.keys(azkarData).forEach(key => {
            view.innerHTML += `<div class="card" onclick="showAzkarList('${key}')"><span><b>${key}</b></span><i class="fas fa-book-open-reader"></i></div>`;
        });
    } else if(page === 'sebha') {
        view.innerHTML = `<div style="text-align:center;"><div class="sebha-circle" onclick="pressSebha()"><span style="font-size:1rem; color:var(--sub)">تسبيح</span><h1 id="s_num">${appState.count}</h1></div><button class="back-btn" style="background:#ff4444;" onclick="resetSebha()">إعادة التصفير</button></div>`;
    }
}

async function fetchQuran(id) {
    const view = document.getElementById('view_area');
    view.innerHTML = '<p style="text-align:center;">جاري التحميل...</p>';
    appState.currentJuz = id;
    try {
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}/quran-uthmani`);
        const data = await res.json();
        let html = `<button class="back-btn" onclick="loadPage('quran', document.querySelectorAll('.nav-link')[0])">← الفهرس</button><div class="quran-text" id="q_content" style="font-size:${appState.font}px">`;
        html += data.data.ayahs.map(a => a.text + `<span class="ayah-num">${a.numberInSurah}</span>`).join(' ');
        view.innerHTML = html + '</div>';
        window.scrollTo(0,0);
    } catch(e) { view.innerHTML = '<p>خطأ في الشبكة</p>'; }
}

async function handlePay() {
    if(!appState.user) {
        alert("برجاء الانتظار حتى يتم التعرف على حسابك في باي أولاً.");
        return;
    }
    try {
        await Pi.createPayment({
            amount: 0.1,
            memo: "دعم تطبيق نُورك 💖",
            metadata: { type: "donation" }
        }, {
            onReadyForServerApproval: (paymentId) => fetch('/api/approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId })
            }).then(r => r.json()),
            onReadyForServerCompletion: (paymentId, txid) => fetch('/api/complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId, txid })
            }).then(r => r.json()),
            onCancel: (id) => console.log("Cancelled", id),
            onError: (error) => alert("خطأ: " + error.message)
        });
    } catch(e) {
        alert("تأكد من فتح الرابط داخل Pi Browser");
    }
}

function pressSebha() { appState.count++; document.getElementById('s_num').innerText = appState.count; localStorage.setItem('noork_count', appState.count); }
function resetSebha() { appState.count = 0; document.getElementById('s_num').innerText = 0; localStorage.setItem('noork_count', 0); }
function toggleTheme() { 
    const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', t);
}
function adjustFont(v) { appState.font += v; document.getElementById('q_content').style.fontSize = appState.font + 'px'; }

window.onload = init;
</script>
</body>
</html>
