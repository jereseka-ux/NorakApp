<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>نُورك - Norak Full Edition</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #151515; --accent: #bb86fc; --text: #e0e0e0; --gold: #ffcc00; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .user-tag { font-size: 0.8rem; color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; border-radius: 15px; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); margin-bottom: 10px; padding: 18px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; padding: 10px 0; }
        .nav-link { flex: 1; text-align: center; color: #999; font-size: 0.8rem; background: none; border: none; }
        .nav-link i { display: block; font-size: 1.5rem; }
        .nav-link.active { color: var(--accent); }
        .back-btn { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="user-tag" id="user_display">جاري التحقق...</div>
    <h2 style="margin:0; color:var(--accent);">نُورك</h2>
    <i class="fas fa-moon" style="font-size: 1.3rem;"></i>
</div>

<div class="container" id="view_area"></div>

<nav class="nav-bar">
    <button class="nav-link" onclick="loadPage('quran')"><i class="fas fa-book-quran"></i>القرآن</button>
    <button class="nav-link" onclick="loadPage('azkar')"><i class="fas fa-hands-praying"></i>الأذكار</button>
    <button class="nav-link" onclick="loadPage('sebha')"><i class="fas fa-fingerprint"></i>المسبحة</button>
    <button class="nav-link" onclick="handlePay()" style="color: var(--gold);"><i class="fas fa-heart"></i>دعم نُورك</button>
</nav>

<script>
    const Pi = window.Pi;
    async function init() {
        try {
            await Pi.init({ version: "2.0", sandbox: false });
            const auth = await Pi.authenticate(['username', 'payments'], onIncompletePayment);
            if (auth) document.getElementById('user_display').innerText = auth.user.username;
        } catch(e) { document.getElementById('user_display').innerText = "زائر"; }
        loadPage('quran');
    }

    // جزء الدفع - الإصلاح اللي هيخلي الزرار يشتغل فعلاً
    async function handlePay() {
        try {
            const payment = await Pi.createPayment({
                amount: 0.1,
                memo: "دعم تطبيق نُورك",
                metadata: { type: "donation" }
            }, {
                onReadyForServerApproval: (paymentId) => {
                    // هنا بنقول للشبكة إننا وافقنا على الطلب من طرفنا
                    console.log("Payment Approved:", paymentId);
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    alert("شكراً لدعمك يا طيب! تم بنجاح.");
                },
                onCancel: (paymentId) => { console.log("Cancelled"); },
                onError: (error, payment) => { alert("خطأ في العملية: " + error.message); }
            });
        } catch(e) { alert("يرجى الفتح من Pi Browser"); }
    }

    function onIncompletePayment(payment) { /* للتعامل مع العمليات المعلقة */ }

    function loadPage(page) {
        const view = document.getElementById('view_area');
        if(page === 'quran') {
            view.innerHTML = '<h3>الفهرس</h3>';
            for(let i=1; i<=30; i++) view.innerHTML += `<div class="card" onclick="alert('قريباً')">الجزء ${i}</div>`;
        } else if(page === 'azkar') {
            view.innerHTML = '<h3>الأذكار</h3><div class="card">أذكار الصباح</div><div class="card">أذكار المساء</div>';
        } else if(page === 'sebha') {
            view.innerHTML = '<div style="text-align:center; padding:50px;"><h1>0</h1><p>اضغط للتسبيح</p></div>';
        }
    }

    window.onload = init;
</script>
</body>
</html>
